              else toAnchor = 1 - easeInOut((cycleT - 0.78) / 0.22);
              const dx = (anchor + oscillation) * toAnchor;
              const dy = Math.sin(sec * 0.45 + i * 0.2) * 0.8 * toAnchor + Math.sin(sec * 0.35 + i * 0.15) * 0.4;
              const alpha = 0.76 + Math.sin(sec * 0.4 + i * 0.2) * 0.08;
              return { dx, dy, alpha };
            };
          } else if (holdSentenceStyle === "invisible-volume") {
            // 80. 보이지 않는 부피 감지 — 글자가 보이지 않는 형태 주위에서 밀려남
            wavePerChar = (i, total) => {
              // 가상의 부피(타원체)가 화면 중앙에 있다고 가정. 글자가 그 외곽을 더듬음
              // 부피의 크기는 시간에 따라 호흡 (있다 → 더 큼 → 다시 작아짐)
              const volumeRadius = 14 + Math.sin(sec * 0.25) * 6;
              // 각 글자 본 위치에서 가상의 중심까지의 각도/거리 (인덱스 기반 분포)
              const myAngle = (i / Math.max(1, total)) * Math.PI * 2 + sec * 0.08;
              // 글자가 부피의 외곽에 살짝 밀려남 (외곽선 더듬기)
              const pushX = Math.cos(myAngle) * volumeRadius;
              const pushY = Math.sin(myAngle) * volumeRadius * 0.55;
              // 미세 떨림 (감지의 망설임)
              const tremor = Math.sin(sec * 1.5 + i * 0.5) * 0.5;
              const dx = pushX + tremor;
              const dy = pushY + Math.cos(sec * 1.3 + i * 0.4) * 0.4;
              const alpha = 0.72 + Math.sin(sec * 0.4 + i * 0.2) * 0.10;
              return { dx, dy, alpha };
            };
          }
          else { // "breathe" 기본 (79용)
            // 흐릿한 안개에서 나타남 → 일제히 호흡 → 다시 안개로
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const center = (total - 1) / 2;
              const distFromCenter = Math.abs(i - center) / Math.max(1, center);
              let intensity, scale, alpha;
              if (ph.stage === "appear") {
                intensity = easeOutCubic(ph.t);
                scale = 0.6 + intensity * 0.4;
                alpha = intensity * 0.92;
              } else if (ph.stage === "hold") {
                const breath = Math.sin(sec * 0.85 + b.phase);
                scale = 1 + breath * 0.10;
                alpha = 0.78 + breath * 0.18;
                intensity = 1;
              } else {
                intensity = 1 - easeInCubic(ph.t);
                scale = 0.6 + intensity * 0.4;
                alpha = intensity * 0.92;
              }
              const blurAmt = (1 - intensity) * 4;
              const dx = Math.sin(sec * 0.7 + i * 0.2) * blurAmt;
              const dy = Math.cos(sec * 0.6 + i * 0.3) * blurAmt + (1 - intensity) * (distFromCenter - 0.5) * 4;
              return { dx, dy, alpha, scale };
            };
          }

          // ─── 텍스트 컬러: 베이스 검정 + 채도 영역 위는 밝아짐 (성능 우선) ───
          //  목표:
          //    (a) 글자가 reveal 이미지 채도 영역 위에 있을 때 → 밝아짐 (핑크 톤)
          //    (b) 글자가 흰 배경 / reveal 바깥에 있을 때 → 거의 검정 그대로
          //
          //  구현 (픽셀 처리 없음, blend mode 한 번):
          //    1) 베이스 글자 검정을 source-over로 깔기
          //    2) 임시 캔버스에 글자 모양 안 reveal 이미지 클리핑
          //    3) 임시 캔버스를 메인에 'screen' 합성 (전체 알파 낮춤)
          //       → 채도 영역: reveal 색이 베이스에 더해져 핑크/밝은 톤
          //       → 흰 영역: 알파가 낮아서 베이스 검정이 거의 그대로 보임
          if (!sentTempCanvas) {
            sentTempCanvas = document.createElement("canvas");
            sentTempCtx = sentTempCanvas.getContext("2d");
          }
          if (sentTempCanvas.width !== sentenceCanvas.width ||
              sentTempCanvas.height !== sentenceCanvas.height) {
            sentTempCanvas.width  = sentenceCanvas.width;
            sentTempCanvas.height = sentenceCanvas.height;
          }
          sentTempCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
          sentTempCtx.imageSmoothingEnabled = true;
          sentTempCtx.imageSmoothingQuality = "high";

          // ── 1) 베이스 글자 검정 (source-over) ──
          sentenceCtx.save();
          sentenceCtx.setTransform(1, 0, 0, 1, 0, 0);
          sentenceCtx.globalAlpha = opacity;
          sentenceCtx.globalCompositeOperation = "source-over";
          sentenceCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
          sentenceCtx.translate(cx + swayX, cyBase + y);
          sentenceCtx.scale(scale, scale);
          sentenceCtx.fillStyle = INK_HOLD;
          sentenceCtx.font = `${FONT_PX}px Pica10Pitch`;
          sentenceCtx.textBaseline = "middle";
          drawWrappedTextPerChar(
            sentenceCtx, b.text, 0, 0,
            MAX_WIDTH, FONT_PX, LINE_HEIGHT, wavePerChar
          );
          sentenceCtx.restore();

          // ── 2) 임시 캔버스: 글자 모양 안에 reveal 이미지 클리핑 ──
          sentTempCtx.save();
          sentTempCtx.setTransform(1, 0, 0, 1, 0, 0);
          sentTempCtx.clearRect(0, 0, sentTempCanvas.width, sentTempCanvas.height);
          sentTempCtx.restore();

          sentTempCtx.save();
          sentTempCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
          sentTempCtx.translate(cx + swayX, cyBase + y);
          sentTempCtx.scale(scale, scale);
          sentTempCtx.fillStyle = "#ffffff";
          sentTempCtx.font = `${FONT_PX}px Pica10Pitch`;
          sentTempCtx.textBaseline = "middle";
          drawWrappedTextPerChar(
            sentTempCtx, b.text, 0, 0,
            MAX_WIDTH, FONT_PX, LINE_HEIGHT, wavePerChar
          );
          sentTempCtx.restore();

          if (canvas && canvas.width > 0) {
            sentTempCtx.save();
            sentTempCtx.setTransform(1, 0, 0, 1, 0, 0);
            sentTempCtx.globalCompositeOperation = "source-in";
            sentTempCtx.drawImage(canvas,
              0, 0, canvas.width, canvas.height,
              0, 0, sentTempCanvas.width, sentTempCanvas.height);
            sentTempCtx.restore();
          }

          // ── 3) 임시 캔버스를 메인에 'multiply'로 합성 ──
          //   multiply: 픽셀별 채널 곱셈
          //   - 흰 픽셀 (255,255,255) × 베이스 = 베이스 그대로 → 흰 영역에선 검정 유지
          //   - 빨강 픽셀 × 베이스 = 어두운 자주/적색 (빨강 영향)
          //   - 파랑 픽셀 × 베이스 = 어두운 보라 (파랑 영향)
          //   - 노랑 픽셀 × 베이스 = 자주 + 노랑 = 갈색/올리브
          //   → 이미지의 각 색상마다 글자에 다른 색조가 입혀짐
          sentenceCtx.save();
          sentenceCtx.setTransform(1, 0, 0, 1, 0, 0);
          sentenceCtx.globalAlpha = opacity;
          sentenceCtx.globalCompositeOperation = "multiply";
          sentenceCtx.drawImage(sentTempCanvas, 0, 0);
          sentenceCtx.restore();
        }
      }

      function teardownSentenceText() {
        if (sentenceRafId) { cancelAnimationFrame(sentenceRafId); sentenceRafId = 0; }
        if (sentenceRoot && sentenceRoot.parentNode) {
          sentenceRoot.parentNode.removeChild(sentenceRoot);
        }
        sentenceRoot = null;
        sentenceStage = null;
        sentenceCanvas = null;
        sentenceCtx = null;
        sentenceBlocks = [];
        sentenceList = [];
      }

      function stopHold() {
        if (!isHolding) return;
        isHolding = false;

        if (frameLoopTimer) { clearInterval(frameLoopTimer); frameLoopTimer = null; }

        if (holdSentence) {
          lastHoldMotionImage = renderCanvasContainSnapshot(sentenceCanvas);
          teardownSentenceText();
        }

        if (fullText && fullText.trim().length > 0) {
          isVolumeMode = true;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (baseCtx && baseCanvas) {
            baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
          }
          trail.length = 0;
          if (outroMode === "decay" ||
              outroMode === "coordinates" ||
              outroMode === "outline" ||
              outroMode === "gravity" ||
              outroMode === "residue" ||
              outroMode.startsWith("o-")) {
            buildDecayText(fullText);
          } else if (outroMode === "ripple") {
            buildRippleText(fullText);
          } else {
            buildVolumeText(fullText);
          }
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              lastAfterMotionImage = renderActiveTextMotionSnapshot();
            });
          });
        }
      }

      function isInside(x, y) {
        if (!interactive && !expandable) return false;
        const r = imgArea.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      }

      // 사진이 충분히 드러났는지 검사 — trail에 충분한 페인트가 쌓였는지 (이미지 영역 안)
      // 트레일 점은 imgArea 좌표 (sx, sy로 변환된 값)에 저장됨
      // 즉, 0 <= x <= size, 0 <= y <= size 안에 있는 alive 트레일 점들 카운트
      function isRevealed() {
        if (!trail || trail.length === 0) return false;
        // pigment 종류의 alive 점 (트레일 메인 도장)을 카운트
        // 너무 많은 점이 살아 있으면 사진이 드러난 것
        let aliveCount = 0;
        for (let i = 0; i < trail.length; i++) {
          const p = trail[i];
          if (p.age < p.maxAge * 0.85) {  // 거의 사라지지 않은 점
            aliveCount++;
            if (aliveCount >= 15) return true;  // 임계값 15
          }
        }
        return false;
      }

      let expandImageFile = "";
      let expandText = "";
      function setExpandData(filename, text) {
        expandImageFile = filename || "";
        expandText = text || "";
      }
      function getExpandData() {
        return { filename: expandImageFile, text: expandText };
      }

      const trail = [];
      let prevMX = -9999, prevMY = -9999;

      function pushTrailPoints(fromX, fromY, toX, toY) {
        const dx = toX - fromX, dy = toY - fromY;
        const dist = Math.hypot(dx, dy);
        // 더 촘촘하게 (이전 6 → 5) — 물감이 끊김 없이 흐르게
        const steps = Math.max(1, Math.ceil(dist / 5));
        // mouse 진행 방향 (점들의 흐름 방향 기본값)
        const moveAngle = dist > 0.1 ? Math.atan2(dy, dx) : Math.random() * Math.PI * 2;

        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          const cx = fromX + dx * t;
          const cy = fromY + dy * t;

          // ── wash (큰 물자국) — 종이에 번진 물 ──
          //   큰 반경, 낮은 알파, 부드러운 그라데이션, drift 큼
          //   flowDir: mouse 방향에 약간의 랜덤 편차 — 잔상이 진행 방향으로 흐름
          trail.push({
            kind: "wash",
            x: cx + (Math.random() - 0.5) * 14,
            y: cy + (Math.random() - 0.5) * 14,
            age: 0,
            maxAge: POINT_LIFE * 1.1 + Math.random() * 25,
            radius: POINT_RADIUS * (1.05 + Math.random() * 0.25),
            driftSeed: Math.random() * Math.PI * 2,
            driftAmt:  14 + Math.random() * 10,
            alphaPeak: 0.32 + Math.random() * 0.12,
            squashX: 0.9 + Math.random() * 0.25,
            squashY: 0.9 + Math.random() * 0.25,
            rot: Math.random() * Math.PI * 2,
            // 잔상 흐름: mouse 방향 + 편차, 시간당 픽셀 이동 속도
            flowAngle: moveAngle + (Math.random() - 0.5) * 0.6,
            flowSpeed: 0.45 + Math.random() * 0.25,  // px per frame
            growth: 0.35 + Math.random() * 0.20,     // 늙을수록 반경 증가량 (배율)
          });

          // ── pigment (안료 응집) — 물감 본체 ──
          trail.push({
            kind: "pigment",
            x: cx + (Math.random() - 0.5) * 5,
            y: cy + (Math.random() - 0.5) * 5,
            age: 0,
            maxAge: POINT_LIFE * 0.85 + Math.random() * 20,
            radius: POINT_RADIUS * (0.55 + Math.random() * 0.25),
            driftSeed: Math.random() * Math.PI * 2,
            driftAmt:  6 + Math.random() * 6,
            alphaPeak: 0.85 + Math.random() * 0.15,
            squashX: 0.85 + Math.random() * 0.3,
            squashY: 0.85 + Math.random() * 0.3,
            rot: Math.random() * Math.PI * 2,
            flowAngle: moveAngle + (Math.random() - 0.5) * 0.9,
            flowSpeed: 0.25 + Math.random() * 0.20,
            growth: 0.20 + Math.random() * 0.15,
          });

          // ── speck (작은 얼룩, 50% 확률) ──
          if (Math.random() < 0.5) {
            trail.push({
              kind: "speck",
              x: cx + (Math.random() - 0.5) * 28,
              y: cy + (Math.random() - 0.5) * 28,
              age: 0,
              maxAge: POINT_LIFE * 0.35 + Math.random() * 15,
              radius: POINT_RADIUS * (0.12 + Math.random() * 0.15),
              driftSeed: Math.random() * Math.PI * 2,
              driftAmt:  3 + Math.random() * 4,
              alphaPeak: 0.7 + Math.random() * 0.3,
              squashX: 0.7 + Math.random() * 0.45,
              squashY: 0.7 + Math.random() * 0.45,
              rot: Math.random() * Math.PI * 2,
              flowAngle: moveAngle + (Math.random() - 0.5) * 1.4,
              flowSpeed: 0.6 + Math.random() * 0.35,
              growth: 0.10 + Math.random() * 0.10,
            });
          }
        }
        if (trail.length > 1400) trail.splice(0, trail.length - 1400);
      }

      let wasInInfluence = false;
      let onInfluenceEnter = null;

      function tick() {
        // [FIX ①] isVolumeMode여도 영향권 감지는 계속 — 새 reveal에 들어가면 텍스트가 누적되어야 함
        const rect = imgArea.getBoundingClientRect();

        // 영향권 감지 (volume 모드든 아니든 항상 작동)
        {
          const dxInf = Math.max(rect.left - mouseX, 0, mouseX - rect.right);
          const dyInf = Math.max(rect.top  - mouseY, 0, mouseY - rect.bottom);
          const distOutsideInf = Math.hypot(dxInf, dyInf);
          const inInfluenceNow = distOutsideInf <= REVEAL_INFLUENCE;
          if (inInfluenceNow && !wasInInfluence) {
            if (typeof onInfluenceEnter === "function") {
              onInfluenceEnter(instance);
            }
          }
          wasInInfluence = inInfluenceNow;
        }

        if (isVolumeMode) {
          requestAnimationFrame(tick);
          return;
        }

        if (isHolding && holdSentence) {
          prevMX = -9999;
          prevMY = -9999;
          trail.length = 0;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (baseCtx && baseCanvas) {
            baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
          }
          requestAnimationFrame(tick);
          return;
        }

        // 일반 모드의 trail 생성 — 아래 inInfluence 변수는 위에서 계산된 값 재사용
        const dx = Math.max(rect.left - mouseX, 0, mouseX - rect.right);
        const dy = Math.max(rect.top  - mouseY, 0, mouseY - rect.bottom);
        const distOutside = Math.hypot(dx, dy);
        const inInfluence = distOutside <= REVEAL_INFLUENCE;

        const drawW = size, drawH = size;
        const sx = rect.width  > 0 ? drawW / rect.width  : 1;
        const sy = rect.height > 0 ? drawH / rect.height : 1;

        if (inInfluence) {
          const lx = (mouseX - rect.left) * sx;
          const ly = (mouseY - rect.top)  * sy;
          if (prevMX > -9000) {
            const plx = (prevMX - rect.left) * sx;
            const ply = (prevMY - rect.top)  * sy;
            pushTrailPoints(plx, ply, lx, ly);
          } else {
            pushTrailPoints(lx, ly, lx, ly);
          }
          prevMX = mouseX; prevMY = mouseY;
        } else {
          prevMX = -9999; prevMY = -9999;
        }

        const W = drawW, H = drawH;
        ctx.clearRect(0, 0, W, H);
        if (baseCtx) baseCtx.clearRect(0, 0, baseSize, baseSize);

        const frameImg = frames[currentFrame];
        const frameReady = frameImg && frameImg.complete && frameImg.naturalWidth > 0;

        let holdAlpha = 1;
        if (holdPulse && isHolding) {
          const elapsedHold = performance.now() - holdStartTime;
          const phase = (elapsedHold % HOLD_PULSE_PERIOD_MS) / HOLD_PULSE_PERIOD_MS;
          holdAlpha = 0.5 + 0.5 * Math.cos(phase * Math.PI * 2);
        }

        if (frameReady && trail.length > 0) {
          // 마스크/합성 캔버스 픽셀 밀도: 메인 캔버스 픽셀 비율과 동일
          // (NATIVE_MAX 상한선이 자동 적용됨)
          const px = resolveCanvasPixelSize();
          const dprForMask = px.w / size;

          if (!maskCanvas) {
            maskCanvas = document.createElement("canvas");
            maskCtx = maskCanvas.getContext("2d");
            maskCtx.imageSmoothingEnabled = true;
            maskCtx.imageSmoothingQuality = "high";
          }
          if (!compCanvas) {
            compCanvas = document.createElement("canvas");
            compCtx = compCanvas.getContext("2d");
            compCtx.imageSmoothingEnabled = true;
            compCtx.imageSmoothingQuality = "high";
          }

          function buildMask(boxW, boxH, offsetX, offsetY) {
            if (maskCanvas.width !== Math.round(boxW * dprForMask) ||
                maskCanvas.height !== Math.round(boxH * dprForMask)) {
              maskCanvas.width  = Math.round(boxW * dprForMask);
              maskCanvas.height = Math.round(boxH * dprForMask);
            }
            maskCtx.setTransform(dprForMask, 0, 0, dprForMask, 0, 0);
            maskCtx.imageSmoothingEnabled = true;
            maskCtx.imageSmoothingQuality = "high";
            maskCtx.clearRect(0, 0, boxW, boxH);

            for (const p of trail) {
              const life = p.age / p.maxAge;
              // alpha 라이프 — 빠르게 진해지고(0~10%), 잠깐 머무름(10~40%), 빠르게 사라짐(40~100%)
              // 이전보다 머무름 구간 단축, 후반 페이드 빠름 → 빨리 사라지는 느낌
              let alphaT;
              if (life < 0.10) {
                const u = life / 0.10;
                alphaT = 1 - Math.pow(1 - u, 2);  // easeOut
              } else if (life < 0.40) {
                alphaT = 1;  // 짧게 머무름
              } else {
                const u = (life - 0.40) / 0.60;
                alphaT = Math.pow(1 - u, 1.8);  // 빠르게 사라짐
              }
              const alpha = (p.alphaPeak || 0.7) * alphaT;
              if (alpha < 0.005) continue;

              // drift: 늙을수록 진폭 증가 (마르면서 일렁이는 느낌)
              const ageDriftBoost = 1 + life * 0.6;
              const drift  = p.driftAmt * Math.sin(p.driftSeed + p.age * 0.025) * ageDriftBoost;
              const drift2 = p.driftAmt * Math.cos(p.driftSeed * 1.3 + p.age * 0.02) * ageDriftBoost;
              const jitterX = Math.sin(p.driftSeed * 7.1 + p.age * 0.11) * 1.5;
              const jitterY = Math.cos(p.driftSeed * 5.7 + p.age * 0.09) * 1.5;

              // flow: 점이 한 방향으로 천천히 흘러감 (잔상의 핵심)
              //   age에 비례해 누적 이동, 후반에 살짝 가속
              const flowT = p.age * (1 + life * 0.5);
              const flowX = Math.cos(p.flowAngle || 0) * (p.flowSpeed || 0) * flowT;
              const flowY = Math.sin(p.flowAngle || 0) * (p.flowSpeed || 0) * flowT;

              const px = p.x + drift  * 0.7 + jitterX + flowX + offsetX;
              const py = p.y + drift2 * 0.7 + jitterY + flowY + offsetY;

              // growth: 늙을수록 반경 증가 (물감이 종이에 번지듯)
              const r  = p.radius * (1 + (p.growth || 0) * life);

              // 타원형 변형 + 회전
              maskCtx.save();
              maskCtx.translate(px, py);
              maskCtx.rotate(p.rot || 0);
              maskCtx.scale(p.squashX || 1, p.squashY || 1);

              const grad = maskCtx.createRadialGradient(0, 0, 0, 0, 0, r);

              if (p.kind === "wash") {
                grad.addColorStop(0,    `rgba(0,0,0,${alpha * 0.85})`);
                grad.addColorStop(0.25, `rgba(0,0,0,${alpha * 0.78})`);
                grad.addColorStop(0.55, `rgba(0,0,0,${alpha * 0.50})`);
                grad.addColorStop(0.78, `rgba(0,0,0,${alpha * 0.22})`);
                grad.addColorStop(0.92, `rgba(0,0,0,${alpha * 0.06})`);
                grad.addColorStop(1,    `rgba(0,0,0,0)`);
              } else if (p.kind === "pigment") {
                // 엣지 다크닝 — 가운데보다 가장자리(stop 0.72)가 더 짙음
                grad.addColorStop(0,    `rgba(0,0,0,${alpha * 0.95})`);
                grad.addColorStop(0.30, `rgba(0,0,0,${alpha * 0.92})`);
                grad.addColorStop(0.55, `rgba(0,0,0,${alpha * 0.88})`);
                grad.addColorStop(0.72, `rgba(0,0,0,${alpha * 1.0})`);
                grad.addColorStop(0.85, `rgba(0,0,0,${alpha * 0.55})`);
                grad.addColorStop(0.95, `rgba(0,0,0,${alpha * 0.15})`);
                grad.addColorStop(1,    `rgba(0,0,0,0)`);
              } else {
                grad.addColorStop(0,    `rgba(0,0,0,${alpha * 0.95})`);
                grad.addColorStop(0.45, `rgba(0,0,0,${alpha * 0.85})`);
                grad.addColorStop(0.75, `rgba(0,0,0,${alpha * 0.40})`);
                grad.addColorStop(1,    `rgba(0,0,0,0)`);
              }

              maskCtx.fillStyle = grad;
              maskCtx.fillRect(-r, -r, r * 2, r * 2);
              maskCtx.restore();
            }
          }

          for (let i = trail.length - 1; i >= 0; i--) {
            const p = trail[i];
            p.age++;
            if (p.age >= p.maxAge) trail.splice(i, 1);
          }

          function drawContain(target, img, boxW, boxH, srcW, srcH) {
            const iw = srcW || img.naturalWidth || 1;
            const ih = srcH || img.naturalHeight || 1;
            const s = Math.min(boxW / iw, boxH / ih);
            const dw = iw * s;
            const dh = ih * s;
            const dx = (boxW - dw) / 2;
            const dy = (boxH - dh) / 2;
            target.drawImage(img, dx, dy, dw, dh);
          }

          function compositeLayer(targetCtx, layerImg, boxW, boxH, layerAlpha, useLowRes, vignetteStrength) {
            if (!layerImg || layerImg._broken || !layerImg.complete || layerImg.naturalWidth === 0) return;
            if (compCanvas.width !== Math.round(boxW * dprForMask) ||
                compCanvas.height !== Math.round(boxH * dprForMask)) {
              compCanvas.width  = Math.round(boxW * dprForMask);
              compCanvas.height = Math.round(boxH * dprForMask);
            }
            compCtx.setTransform(dprForMask, 0, 0, dprForMask, 0, 0);
            compCtx.imageSmoothingEnabled = true;
            compCtx.imageSmoothingQuality = "high";
            compCtx.clearRect(0, 0, boxW, boxH);
            compCtx.globalCompositeOperation = "source-over";
            compCtx.drawImage(maskCanvas, 0, 0, boxW, boxH);
            compCtx.globalCompositeOperation = "source-in";

            if (useLowRes) {
              const elapsedHoldLR = performance.now() - holdStartTime;
              const phaseLR = (elapsedHoldLR % HOLD_LOWRES_PERIOD_MS) / HOLD_LOWRES_PERIOD_MS;
              const tLR = (1 - Math.cos(phaseLR * Math.PI * 2)) / 2;
              const eased = Math.pow(tLR, 1.6);
              const pixSize = Math.max(2, Math.round(
                HOLD_LOWRES_MAX_PX - (HOLD_LOWRES_MAX_PX - HOLD_LOWRES_MIN_PX) * eased
              ));
              if (!lowResCanvas) {
                lowResCanvas = document.createElement("canvas");
                lowResCtx = lowResCanvas.getContext("2d");
              }
              const iw = layerImg.naturalWidth || pixSize;
              const ih = layerImg.naturalHeight || pixSize;
              const ratio = iw / ih;
              let lw, lh;
              if (ratio >= 1) { lh = pixSize; lw = Math.max(2, Math.round(pixSize * ratio)); }
              else            { lw = pixSize; lh = Math.max(2, Math.round(pixSize / ratio)); }
              lowResCanvas.width  = lw;
              lowResCanvas.height = lh;
              lowResCtx.imageSmoothingEnabled = true;
              lowResCtx.clearRect(0, 0, lw, lh);
              lowResCtx.drawImage(layerImg, 0, 0, lw, lh);
              const prevSmoothing = compCtx.imageSmoothingEnabled;
              compCtx.imageSmoothingEnabled = false;
              drawContain(compCtx, lowResCanvas, boxW, boxH, lw, lh);
              compCtx.imageSmoothingEnabled = prevSmoothing;
            } else {
              drawContain(compCtx, layerImg, boxW, boxH);
            }

            if (vignetteStrength && vignetteStrength > 0) {
              const cx = boxW / 2, cy = boxH / 2;
              const minSide = Math.min(boxW, boxH);
              const innerR = minSide * Math.max(0.05, 0.32 - 0.18 * Math.min(1.5, vignetteStrength - 1));
              const outerR = minSide * Math.min(0.55, 0.52);
              const vg = compCtx.createRadialGradient(cx, cy, innerR, cx, cy, outerR);
              vg.addColorStop(0,   "rgba(0,0,0,1)");
              const midAlpha = vignetteStrength >= 2 ? 0.30 : 0.55;
              vg.addColorStop(0.6, `rgba(0,0,0,${midAlpha})`);
              vg.addColorStop(1,   "rgba(0,0,0,0)");
              compCtx.globalCompositeOperation = "destination-in";
              compCtx.fillStyle = vg;
              compCtx.fillRect(0, 0, boxW, boxH);
            }

            const prevAlpha = targetCtx.globalAlpha;
            const prevFilter = targetCtx.filter || "none";
            targetCtx.globalAlpha = Math.max(0, Math.min(1, layerAlpha)) * REVEAL_IMAGE_OPACITY;
            if ("filter" in targetCtx) targetCtx.filter = REVEAL_IMAGE_FILTER;
            targetCtx.drawImage(compCanvas, 0, 0, boxW, boxH);
            targetCtx.globalAlpha = prevAlpha;
            if ("filter" in targetCtx) targetCtx.filter = prevFilter;
          }

          const baseTargetCtx = baseCtx || ctx;
          const baseBoxW = baseCtx ? baseSize : W;
          const baseBoxH = baseCtx ? baseSize : H;
          const baseOff  = baseCtx ? (baseSize - size) / 2 : 0;
          buildMask(baseBoxW, baseBoxH, baseOff, baseOff);
          const vignStr = baseVignette ? (baseCtx ? 2.2 : 1) : 0;
          compositeLayer(baseTargetCtx, frameImg, baseBoxW, baseBoxH,
                         1, holdLowRes && isHolding, vignStr);

          if (overlayImg) {
            buildMask(W, H, 0, 0);
            const overlayAlpha = (holdPulse && isHolding) ? holdAlpha : 1;
            compositeLayer(ctx, overlayImg, W, H, overlayAlpha, false, 0);
          }
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      const instance = {
        loadFrameSeries,
        setText,
        getText: () => fullText,
        isInside,
        isRevealed,
        startHold,
        stopHold,
        expandable,
        setExpandData,
        getExpandData,
        name: config.name || "",
        setOnInfluenceEnter: (fn) => { onInfluenceEnter = fn; },
        getPrintMotionSnapshots: () => ({
          hold: lastHoldMotionImage || renderCanvasContainSnapshot(sentenceCanvas),
          after: lastAfterMotionImage || renderActiveTextMotionSnapshot(),
        }),
      };
      revealInstances.push(instance);
      return instance;
    }

    ];

    // 시드 기반 deterministic random (rowIndex로 일관된 jitter)
    function seededRandom(seed) {
      const s = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
      return s - Math.floor(s);  // 0~1
    }

    // 작성일자 파싱 (다양한 형식 허용: "2024-01-15", "2024/1/15", "2024.01.15")
    function parseSheetDate(str) {
      if (!str) return null;
      const cleaned = String(str).trim().replace(/[./]/g, "-");
      const d = new Date(cleaned);
      return isNaN(d.getTime()) ? null : d;
    }

    // 작성시간 파싱 ("14:30" → 14.5 시간 단위 0~24, "14:30:00"도 OK)
    function parseSheetTime(str) {
      if (!str) return null;
      const m = String(str).trim().match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
      if (!m) return null;
      const h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const s = m[3] ? parseInt(m[3], 10) : 0;
      return h + min / 60 + s / 3600;  // 0~24
    }

    // map 함수: value를 [inMin, inMax]에서 [outMin, outMax]로 매핑
    function mapRange(v, inMin, inMax, outMin, outMax) {
      if (inMax === inMin) return (outMin + outMax) / 2;
      const t = (v - inMin) / (inMax - inMin);
      return outMin + t * (outMax - outMin);
    }

    // 인스턴스들이 채워질 객체 (이름 → instance)
    const instanceByName = {};
    const allInstances = [];  // 기존 코드 호환 ({inst, row, fallback})
    let latestSheetRows = null;

    // 시트 row들에서 작성일자/시간을 읽어 min/max 계산 + 각 인스턴스 위치 계산
    function computePositionsFromSheet(rows) {
      // 시트의 J/K 컬럼에서 모든 valid 작성일자/시간 수집
      // header 인덱스로 컬럼 찾되, J/K 위치(0-indexed: 9, 10)도 폴백으로 사용
      const header = rows[0] || [];
      let dateColIdx = -1, timeColIdx = -1;
      for (let i = 0; i < header.length; i++) {
        const h = (header[i] || "").trim();
        if (h === "작성 일자" || h === "작성일자") dateColIdx = i;
        if (h === "작성 시간" || h === "작성시간") timeColIdx = i;
      }
      // 헤더에서 못 찾으면 J/K (인덱스 9, 10) 사용
      if (dateColIdx < 0) dateColIdx = 9;
      if (timeColIdx < 0) timeColIdx = 10;

      // 모든 valid 날짜의 timestamp 수집 (min/max 위해)
      const allDates = [];
      for (let r = 1; r < rows.length; r++) {
        const d = parseSheetDate(rows[r][dateColIdx]);
        if (d) allDates.push(d.getTime());
      }
      const minDate = allDates.length > 0 ? Math.min(...allDates) : 0;
      const maxDate = allDates.length > 0 ? Math.max(...allDates) : 1;

      console.info(`[positions] date range: ${new Date(minDate).toISOString().slice(0,10)} ~ ${new Date(maxDate).toISOString().slice(0,10)}`);

      // 각 인스턴스 config에 대해 해당 row 찾아 좌표 계산
      const positions = {};
      INSTANCE_CONFIGS.forEach((cfg, idx) => {
        const dataRow = rows[cfg.sheetRow - 1];
        if (!dataRow) {
          positions[cfg.name] = { leftPx: cfg.fallbackLeftPx, topPx: cfg.fallbackTopPx };
          return;
        }
        const date = parseSheetDate(dataRow[dateColIdx]);
        const time = parseSheetTime(dataRow[timeColIdx]);
        let x, y;
        if (date) {
          x = mapRange(date.getTime(), minDate, maxDate, DATA_X_MIN, DATA_X_MAX);
        } else {
          x = cfg.fallbackLeftPx;
        }
        if (time !== null) {
          // 0~24 시간 → 800~6200 y
          y = mapRange(time, 0, 24, DATA_Y_MIN, DATA_Y_MAX);
        } else {
          y = cfg.fallbackTopPx;
        }
        // jitter (rowIndex 기반 deterministic) — 축소된 월드에 맞춰 작게
        const jx = (seededRandom(cfg.sheetRow) - 0.5) * 160;       // ±80
        const jy = (seededRandom(cfg.sheetRow + 999) - 0.5) * 200; // ±100
        x += jx;
        y += jy;
        // 영역 안으로 클램프
        x = Math.max(DATA_X_MIN, Math.min(DATA_X_MAX, x));
        y = Math.max(DATA_Y_MIN, Math.min(DATA_Y_MAX, y));
        // size 만큼 좌상단 보정 (위치를 중심점으로 받았으니 좌상단으로)
        positions[cfg.name] = {
          leftPx: x - REVEAL_SIZE / 2,
          topPx:  y - REVEAL_SIZE / 2,
        };
      });
      return positions;
    }

    // 인스턴스 생성: 시트 위치 또는 fallback 위치 사용
    function buildInstances(positions) {
      INSTANCE_CONFIGS.forEach((cfg) => {
        const pos = positions[cfg.name] || {
          leftPx: cfg.fallbackLeftPx - REVEAL_SIZE / 2,
          topPx:  cfg.fallbackTopPx - REVEAL_SIZE / 2,
        };
        const inst = createRevealInstance({
          leftPx: pos.leftPx,
          topPx:  pos.topPx,
          size: REVEAL_SIZE,
          sheetRow: cfg.sheetRow,
          name: cfg.name,
          framesCount: cfg.framesCount,
          baseVignette: cfg.baseVignette,
          holdSentence: cfg.holdSentence,
          holdSentenceStyle: cfg.holdSentenceStyle,
          outroMode: cfg.outroMode,
          root,
        });
        instanceByName[cfg.name] = inst;
        allInstances.push({ inst, row: cfg.sheetRow, fallback: cfg.fallback });
      });
    }

    /* ─────────────────────────────────────────────

    let currentPanel = null;

    function showExpandedPanel(filename, text, originX, originY) {
      if (currentPanel) closeExpandedPanel();

      const dot = filename.lastIndexOf(".");
      const name = dot === -1 ? filename : filename.slice(0, dot);

      const panel = document.createElement("div");
      panel.className = "expanded-panel";

      const img = document.createElement("img");

      img.alt = "";

      const spotlight = document.createElement("div");

      panel.appendChild(img);
      panel.appendChild(spotlight);
      panel.appendChild(textWrap);

      let spotTargetX = 50, spotTargetY = 50;
      let spotCurrX   = 50, spotCurrY   = 50;
      const updateSpotlightTarget = (e) => {
        const r = panel.getBoundingClientRect();
        spotTargetX = ((e.clientX - r.left) / r.width)  * 100;
        spotTargetY = ((e.clientY - r.top)  / r.height) * 100;
      };
      panel.addEventListener("mousemove", updateSpotlightTarget);

      let spotRafId = 0;
      const tickSpotlight = () => {
        spotCurrX += (spotTargetX - spotCurrX) * 0.18;
        spotCurrY += (spotTargetY - spotCurrY) * 0.18;
        spotlight.style.backgroundImage =
          `radial-gradient(circle 280px at ${spotCurrX.toFixed(2)}% ${spotCurrY.toFixed(2)}%, ` +
          `rgba(255,255,255,0.85) 0%, ` +
          `rgba(255,255,255,0.55) 25%, ` +
          `rgba(255,255,255,0.25) 55%, ` +
          `rgba(255,255,255,0.05) 80%, ` +
          `rgba(255,255,255,0) 100%)`;
        spotRafId = requestAnimationFrame(tickSpotlight);
      };
      spotRafId = requestAnimationFrame(tickSpotlight);

      const positionPanel = () => {
        const naturalW = img.naturalWidth  || 800;
        const naturalH = img.naturalHeight || 600;
        const maxW = window.innerWidth  * 0.55;
        const maxH = window.innerHeight * 0.65;
        const ratio = Math.min(maxW / naturalW, maxH / naturalH, 1);
        const w = naturalW * ratio;
        const h = naturalH * ratio;
        panel.style.width  = `${w}px`;
        panel.style.height = `${h}px`;

        let px = (originX || window.innerWidth  / 2) - w / 2;
        let py = (originY || window.innerHeight / 2) - h / 2;
        px = Math.max(8, Math.min(window.innerWidth  - w - 8, px));
        py = Math.max(8, Math.min(window.innerHeight - h - 8, py));
        panel.style.left = `${px}px`;
        panel.style.top  = `${py}px`;
      };

      if (img.complete && img.naturalWidth > 0) {
        positionPanel();
      } else {
        img.addEventListener("load", positionPanel);
        img.addEventListener("error", positionPanel);
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => panel.classList.add("is-visible"));
      });

      let dragging = false;
      let dragOffsetX = 0, dragOffsetY = 0;
      panel.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        if (textWrap.contains(e.target)) {
          e.stopPropagation();
          return;
        }
        dragging = true;
        const r = panel.getBoundingClientRect();
        dragOffsetX = e.clientX - r.left;
        dragOffsetY = e.clientY - r.top;
        panel.classList.add("is-dragging");
        e.stopPropagation();
        e.preventDefault();
      });
      const onMove = (e) => {
        if (!dragging) return;
        const w = panel.offsetWidth;
        const h = panel.offsetHeight;
        let nx = e.clientX - dragOffsetX;
        let ny = e.clientY - dragOffsetY;
        nx = Math.max(80 - w, Math.min(window.innerWidth  - 80, nx));
        ny = Math.max(0,      Math.min(window.innerHeight - 40, ny));
        panel.style.left = `${nx}px`;
        panel.style.top  = `${ny}px`;
      };
      const onUp = () => {
        if (!dragging) return;
        dragging = false;
        panel.classList.remove("is-dragging");
      };
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);

      panel.addEventListener("wheel", (e) => e.stopPropagation());

      currentPanel = {
        el: panel,
        cleanup: () => {
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
          if (spotRafId) cancelAnimationFrame(spotRafId);
        },
      };
    }

    function closeExpandedPanel() {
      if (!currentPanel) return;
      const { el, cleanup } = currentPanel;
      el.classList.remove("is-visible");
      cleanup();
      currentPanel = null;
      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);

    function applyRowsToInstances(rows) {

        console.info(`[sheet] row ${row} →`, item);

      trajectory.push({ name: inst.name, text, t: Date.now() });
      feedFromInstance(inst);
      console.info(`[trajectory] entered ${inst.name}, total ${trajectory.length}, pendingText=${pendingText.length}`);
    }

    // [FIX] 인스턴스 생성 후에 콜백 연결 (buildInstances 안에서 revealInstances에 push되니까,

    /* ─────────────────────────────────────────────

    const printPanel = document.getElementById("print-panel");
    const printBtn = document.getElementById("print-btn");

    function updatePrintPanelDiscovery(clientX, clientY) {
      if (!printPanel) return;
      const r = printPanel.getBoundingClientRect();
      const dx = Math.max(r.left - clientX, 0, clientX - r.right);
      const dy = Math.max(r.top - clientY, 0, clientY - r.bottom);
      const distanceToPanel = Math.hypot(dx, dy);
      printPanel.classList.toggle("is-peeking", distanceToPanel <= 260 && distanceToPanel > 70);
      printPanel.classList.toggle("is-discovered", distanceToPanel <= 70);
    }

      updatePrintPanelDiscovery(e.clientX, e.clientY);

    function escapeHTML(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[ch]));
    }

    function resolvePrintImagePath(filename) {
      const src = String(filename || "").trim();
      if (!src) return "";
      if (/^(https?:|data:|blob:|\.\/|\/)/i.test(src)) return src;
      return `${IMAGE_BASE_PATH}${src}`;

    function getInstanceConfigByName(name) {

    const PRINT_SHEET_TEMPLATE = "./assets/printpage.png";
    const PRINT_TYPE_CANVAS_W = 1400;
    const PRINT_TYPE_CANVAS_H = 812;
    const PRINT_EMPTY = " ";

    function hashString(value) {
      let h = 2166136261;
      const str = String(value || "");
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function makeSeededRng(seedValue) {
      let t = seedValue >>> 0;
      return function() {
        t += 0x6D2B79F5;
        let r = t;
        r = Math.imul(r ^ (r >>> 15), r | 1);
        r ^= r + Math.imul(r ^ (r >>> 7), r | 61);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function createTypeMotionSnapshot(item, index, phase) {
      const canvas = document.createElement("canvas");
      canvas.width = PRINT_TYPE_CANVAS_W;
      canvas.height = PRINT_TYPE_CANVAS_H;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000000";
      ctx.strokeStyle = "#000000";
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      ctx.font = "22px Pica10Pitch, 'Courier New', monospace";

      const source = String(item.text || item.name || "Scenes Without Scenes")
        .replace(/\s+/g, " ")
        .trim();
      const text = source.length > 0 ? source : "Scenes Without Scenes";
      const chars = Array.from(text);
      const seedValue = hashString(`${item.name}|${item.typeStyle}|${phase}|${text}|${index}`);
      const rng = makeSeededRng(seedValue);
      const mode = (seedValue + (phase === "hold" ? 1 : 0)) % 5;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const maxGlyphs = Math.min(900, Math.max(180, chars.length * 10));
      const points = [];

      for (let i = 0; i < maxGlyphs; i++) {
        const ch = chars[i % chars.length];
        if (ch === " ") continue;
        const n = i / Math.max(1, maxGlyphs - 1);
        let x, y, rot = 0, scale = 1;

        if (mode === 0) {
          const cluster = i % 4;
          const angle = (cluster / 4) * Math.PI * 2 + rng() * 0.5;
          const anchorX = cx + Math.cos(angle) * 310;
          const anchorY = cy + Math.sin(angle) * 170;
          x = anchorX + (rng() - 0.5) * 210;
          y = anchorY + (rng() - 0.5) * 150;
          rot = (rng() - 0.5) * 0.28;
          scale = 0.78 + rng() * 0.42;
        } else if (mode === 1) {
          const cols = 24;
          const col = i % cols;
          const row = Math.floor(i / cols);
          const rowCount = Math.ceil(maxGlyphs / cols);
          x = cx + (col - (cols - 1) / 2) * 42 + Math.sin(row * 0.7 + index) * 8;
          y = cy + (row - (rowCount - 1) / 2) * 31 + Math.cos(col * 0.5 + index) * 5;
          rot = Math.sin(i * 0.19 + index) * 0.05;
          scale = 0.72 + ((i + index) % 5) * 0.07;
        } else if (mode === 2) {
          const angle = n * Math.PI * 9 + rng() * 0.4;
          const radius = 40 + n * 360;
          x = cx + Math.cos(angle) * radius;
          y = cy + Math.sin(angle) * radius * 0.52;
          rot = angle * 0.12;
          scale = 0.78 + Math.sin(n * Math.PI) * 0.32;
        } else if (mode === 3) {
          x = 120 + n * (canvas.width - 240);
          y = cy + Math.sin(n * Math.PI * 8 + index) * 150 + Math.sin(n * Math.PI * 21) * 24;
          rot = Math.cos(n * Math.PI * 6) * 0.13;
          scale = 0.78 + Math.sin(n * Math.PI * 2) * 0.16;
        } else {
          const nodeX = cx + (rng() - 0.5) * 940;
          const nodeY = cy + (rng() - 0.5) * 520;
          x = nodeX + Math.sin(i * 0.37) * 18;
          y = nodeY + Math.cos(i * 0.29) * 12;
          rot = (rng() - 0.5) * 0.18;
          scale = 0.62 + rng() * 0.42;
        }

        points.push({ ch, x, y, rot, scale, alpha: 0.46 + rng() * 0.48 });
      }

      if (mode === 4) {
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.lineWidth = 1;
        for (let i = 0; i < points.length - 1; i += 7) {
          const a = points[i];
          const b = points[(i + 13) % points.length];
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      for (const p of points) {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.scale(p.scale, p.scale);
        ctx.fillText(p.ch, 0, 0);
        ctx.restore();
      }

      return canvas.toDataURL("image/png");
    }

    function getSheetItemForPrint(cfg) {
      if (!latestSheetRows || !cfg) return null;
      return pickRowFromSheet(latestSheetRows, cfg.sheetRow);
    }

    function firstFilled(...values) {
      for (const value of values) {
        const str = String(value == null ? "" : value).trim();

      return PRINT_EMPTY;
    }

    function formatDateForPrint(value) {
      const raw = String(value || "").trim();
      if (!raw) return PRINT_EMPTY;
      const match = raw.match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
      if (!match) return raw;
      return `${match[1]}.${match[2].padStart(2, "0")}.${match[3].padStart(2, "0")}`;
    }

    function formatTimeForPrint(value) {
      const raw = String(value || "").trim();
      if (!raw) return PRINT_EMPTY;
      const match = raw.match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/);
      if (!match) return raw;
      let hour = parseInt(match[1], 10);
      const minute = match[2].padStart(2, "0");
      const second = (match[3] || "00").padStart(2, "0");
      const suffix = hour >= 12 ? "PM" : "AM";
      hour = hour % 12;
      if (hour === 0) hour = 12;
      return `${hour}:${minute}:${second}${suffix}`;
    }

      const raw = String(value || "").trim();
      if (!raw) return PRINT_EMPTY;
      const match = raw.match(/\d+/);
      if (!match) return raw;
      return spaced ? `${match[0]} / 4` : `${match[0]}/4`;

        const words = String(value || fallback || "")
          .replace(/\s+/g, " ")
          .trim()
          .split(" ")
          .filter(Boolean);
        if (words.length === 0) return PRINT_EMPTY;
        const lines = [];
        let current = "";
        for (const word of words) {
          const next = current ? `${current} ${word}` : word;
          if (next.length > CONTENTS_TITLE_CHARS_PER_LINE && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        }
        if (current) lines.push(current);
        return lines.join("\n");
      }

      function getContentsLineCount(title) {
        return Math.max(1, String(title || PRINT_EMPTY).split("\n").length);
      }

      function paginateContentsRows(rows) {
        const pages = [];
        let page = { left: [], right: [] };
        let side = "left";
        let usedLines = 0;

        function advanceColumn() {
          if (side === "left") {
            side = "right";
            usedLines = 0;
            return;
          }
          pages.push(page);
          page = { left: [], right: [] };
          side = "left";
          usedLines = 0;
        }

        for (const row of rows) {
          const rowLines = Math.max(1, Math.min(CONTENTS_LINES_PER_COLUMN, row.lines));
          if (usedLines > 0 && usedLines + rowLines > CONTENTS_LINES_PER_COLUMN) {
            advanceColumn();
          }
          page[side].push(row);
          usedLines += rowLines;
        }

        if (page.left.length || page.right.length || pages.length === 0) {
          pages.push(page);
        }

        return pages;
      }

        const title = wrapContentsTitle(item.memoryTitle, `Memory ${index + 1}`);
        return {
          index,

          lines: getContentsLineCount(title),
        };
      });
      const contentsPages = paginateContentsRows(contentsRows);
      const contentsPageCount = contentsPages.length;

  <main class="print-stack">${contentsHTML}${sheetHTML}</main>
  <script>
    function waitForImages() {
      var images = Array.prototype.slice.call(document.images);
      return Promise.all(images.map(function(img) {
        if (img.complete) return Promise.resolve();
        return new Promise(function(resolve) {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      }));
    }
    function waitForFonts() {
      if (!document.fonts) return Promise.resolve();
      return Promise.all([
        document.fonts.load('14pt Pica10Pitch'),
        document.fonts.load('8pt TGFrekMono'),
        document.fonts.load('48pt AdobeGaramondPro'),
        document.fonts.ready
      ]).catch(function() {});
    }
    window.addEventListener('load', function() {
      Promise.all([waitForImages(), waitForFonts()]).then(function() {
        setTimeout(function() {
          window.focus();
          window.print();
        }, 350);
      });
    });
  <\/script>
</body>
</html>`;
    }

    async function openPrintDocument() {
      await preparePrintAssets();
      const items = getPrintableItems();
      const printWindow = window.open("", "_blank");
      if (!printWindow) {
        alert("Print preview could not open. Please allow pop-ups for this page.");
        return;
      }
      printWindow.document.open();
      printWindow.document.write(buildPrintSheetDocumentHTML(items));
      printWindow.document.close();
    }

    printBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      e.preventDefault();
      printBtn.classList.add("is-busy");
      try {
        await openPrintDocument();
      } finally {
        printBtn.classList.remove("is-busy");
      }
    });

    printBtn.addEventListener("mousedown", (e) => e.stopPropagation());

    /* ─────────────────────────────────────────────
       캡처 시스템
       ───────────────────────────────────────────── */
    const captureBtn = document.getElementById("capture-btn");

    async function captureScreen() {
      // 캡처 전에 사용할 모든 폰트가 로드되었는지 보장 (캔버스에 그릴 때 fallback 방지)
      try {
        await Promise.all([
          document.fonts.load("14px Pica10Pitch"),
          document.fonts.load("14px AntiquaMixed"),
          document.fonts.load(`${MIXED_TEXT_FONT_PX}px AntiquaMixed`),
          document.fonts.load(`${MIXED_TEXT_FONT_PX + MIXED_TEXT_CAP_EXTRA_PX}px AntiquaMixed`),
        ]);
      } catch (e) {
        console.warn("[capture] font load failed:", e);
      }

      const W = window.innerWidth;
      const H = window.innerHeight;

      const dpr = window.devicePixelRatio || 1;
      const SF = Math.max(2, dpr * 2);

      // 캡처 시점 scale 고정 — 폰트 크기 유지의 기준
      const scale = distance / 100;
      const cx_view = W / 2;
      const cy_view = H / 2;

      // 화면 좌표 ↔ world 좌표 변환 (현재 화면 기준)
      function worldToScreen(wx, wy) {
        return {
          x: (wx - cx_view) * scale + cx_view + posX,
          y: (wy - cy_view) * scale + cy_view + posY,
        };
      }
      function screenToWorldLocal(sx, sy) {
        return {
          x: (sx - cx_view - posX) / scale + cx_view,
          y: (sy - cy_view - posY) / scale + cy_view,
        };
      }

      console.info(`[capture] pendingText.length=${pendingText.length}, pathPts.length=${pathPts.length}`);

      // ─────────────────────────────────────────────
      // [캡처 공간 = 화면(viewport) 그대로]
      // 캔버스 크기 = W × H (현재 보고 있는 화면 그대로)
      // 모든 좌표는 화면(client) 좌표 그대로 사용 → 글자 크기는 14px 고정
      // 화면 밖으로 나간 궤적은 잘림 (의도된 동작)
      // ─────────────────────────────────────────────

      const canvasW = W;
      const canvasH = H;
      const effSF = SF;

      console.info(`[capture] canvas=${canvasW}x${canvasH} (SF=${effSF.toFixed(2)})`);

      const out = document.createElement("canvas");
      out.width = Math.round(canvasW * effSF);
      out.height = Math.round(canvasH * effSF);
      const octx = out.getContext("2d");
      octx.imageSmoothingEnabled = true;
      octx.imageSmoothingQuality = "high";
      octx.scale(effSF, effSF);
      octx.fillStyle = "#ffffff";
      octx.fillRect(0, 0, canvasW, canvasH);

      // 좌표 매핑: 화면 좌표 그대로 캔버스 좌표로 (1:1)
      function worldToCanvas(wx, wy) {
        // 궤적은 world 좌표로 저장돼 있으니 worldToScreen 거쳐 화면 좌표 = 캔버스 좌표
        return worldToScreen(wx, wy);
      }
      function screenToCanvas(sx, sy) {
        return { x: sx, y: sy };
      }

      // 궤적 텍스트 → reveal/글리프/HUD 순으로 그림 (캔버스 = viewport)
      octx.globalCompositeOperation = "source-over";

      // 궤적 따라 흐르는 텍스트 — AntiquaMixed
      // 폰트는 화면에서 보이는 그대로의 크기(14px)로 고정 → 줌아웃해도 작아지지 않음
      if (pendingText && pathPts.length >= 2) {
        const fontPx = MIXED_TEXT_FONT_PX;
        const capFontPx = MIXED_TEXT_FONT_PX + MIXED_TEXT_CAP_EXTRA_PX;
        const letterGap = fontPx * MIXED_TEXT_LETTER_GAP_EM;
        const capGap = fontPx * MIXED_TEXT_CAP_GAP_EM;
        const wordSpace = fontPx * MIXED_TEXT_WORD_SPACE_EM;
        const isCapChar = (ch) => /^[A-Z]$/.test(ch);
        const isLowerChar = (ch) => /^[a-z]$/.test(ch);
        if (fontPx >= 4) {
          octx.textBaseline = "middle";
          octx.textAlign = "left";
          octx.fillStyle = INK_OUTRO;  // 캡처 시 궤적 텍스트 컬러: 검정

          // sampleAt: 캔버스 좌표계로 반환 (worldToCanvas 사용)
          function sampleAt(s) {
            if (s <= pathPts[0].sScreen) {
              const p0 = pathPts[0];
              const p1 = pathPts[1] || p0;
              const a = worldToCanvas(p0.worldX, p0.worldY);
              const b = worldToCanvas(p1.worldX, p1.worldY);
              return { x: a.x, y: a.y, ang: Math.atan2(b.y - a.y, b.x - a.x) };
            }
            for (let i = 1; i < pathPts.length; i++) {
              if (pathPts[i].sScreen >= s) {
                const p0 = pathPts[i - 1];
                const p1 = pathPts[i];
                const span = p1.sScreen - p0.sScreen;
                const t = span > 0 ? (s - p0.sScreen) / span : 0;
                const a = worldToCanvas(p0.worldX, p0.worldY);
                const b = worldToCanvas(p1.worldX, p1.worldY);
                return {
                  x: a.x + (b.x - a.x) * t,
                  y: a.y + (b.y - a.y) * t,
                  ang: Math.atan2(b.y - a.y, b.x - a.x),
                };
              }
            }
            const last = pathPts[pathPts.length - 1];
            const prev = pathPts[pathPts.length - 2] || last;
            const a = worldToCanvas(prev.worldX, prev.worldY);
            const b = worldToCanvas(last.worldX, last.worldY);
            return { x: b.x, y: b.y, ang: Math.atan2(b.y - a.y, b.x - a.x) };
          }

          const pathScreenLen = pathPts[pathPts.length - 1].sScreen;

          if (pendingText.length > 0) {
            const loop = pendingText + "  ";
            let s = 0;
            let i = 0;
            let safety = 0;
            const safetyMax = 50000;
            while (s <= pathScreenLen && safety < safetyMax) {
              safety++;
              const ch = loop[i % loop.length];
              const nextCh = loop[(i + 1) % loop.length];
              const cap = isCapChar(ch);
              octx.font = `${cap ? capFontPx : fontPx}px AntiquaMixed`;
              const chW = ch === " " ? wordSpace : (octx.measureText(ch).width || 4);
              if (ch !== " ") {
                const sample = sampleAt(s);
                octx.save();
                octx.translate(sample.x, sample.y);
                octx.rotate(sample.ang);
                octx.fillText(ch, 0, 0);
                octx.restore();
              }
              s += chW + letterGap + (cap && isLowerChar(nextCh) ? capGap : 0);
              i++;
            }
          }

          octx.textAlign = "start";
          octx.textBaseline = "top";
        }
      }

      // (2) reveal 이미지 캔버스 + sentence 캔버스를 궤적 위에 합성
      //     각 reveal의 화면 위치를 캔버스 좌표로 변환해서 그림
      const revealCanvases = document.querySelectorAll(
        ".reveal-base-area canvas, .reveal-img-area canvas, .text-sentence canvas"
      );
      for (const c of revealCanvases) {
        const r = c.getBoundingClientRect();
        if (r.width <= 0 || r.height <= 0) continue;
        // 화면 좌표 → 캔버스 좌표 (좌상단, 우하단을 따로 변환해서 크기 정확히 계산)
        const tl = screenToCanvas(r.left, r.top);
        const br = screenToCanvas(r.right, r.bottom);
        const drawW = br.x - tl.x;
        const drawH = br.y - tl.y;
        if (drawW <= 0 || drawH <= 0) continue;
        try {
          octx.drawImage(c, tl.x, tl.y, drawW, drawH);
        } catch (e) {}
      }

      // 동적 글리프들 — Pica10Pitch (volume/decay/ripple 모션)
      // 폰트는 화면에서 보이는 14px 그대로 (줌 무관)
      const glyphs = document.querySelectorAll(
        ".text-volume-glyph, .text-decay-glyph, .text-ripple-glyph"
      );
      const glyphFontPx = 14;
      octx.font = `${glyphFontPx}px Pica10Pitch`;
      octx.textBaseline = "top";
      for (const g of glyphs) {
        const r = g.getBoundingClientRect();
        const cs = window.getComputedStyle(g);
        const op = parseFloat(cs.opacity);
        if (!isFinite(op) || op <= 0.01) continue;
        // 캔버스 영역 안에 있는지 확인 (캔버스 좌표 기준)
        const pos = screenToCanvas(r.left, r.top);
        if (pos.x > canvasW || pos.x + r.width * 0 < -50 || pos.y > canvasH || pos.y < -50) {
          // 글리프는 작으니 매우 보수적으로 클리핑
        }
        octx.globalAlpha = op;
        octx.fillStyle = cs.color || INK_COLOR;
        octx.fillText(g.textContent, pos.x, pos.y);
      }
      octx.globalAlpha = 1;

      // reveal-text-content (흰 배경 박스) — Pica10Pitch, 일반 모드
      // 폰트와 패딩은 화면 px 그대로 (14, 16) — 줌 무관
      const textBlocks = document.querySelectorAll(".reveal-text-content");
      const textBoxFontPx = 14;
      octx.font = `${textBoxFontPx}px Pica10Pitch`;
      octx.fillStyle = INK_COLOR;
      for (const tb of textBlocks) {
        const txt = tb.textContent;
        if (!txt) continue;
        const r = tb.getBoundingClientRect();
        if (r.width <= 0 || r.height <= 0) continue;
        const tl = screenToCanvas(r.left, r.top);
        const br = screenToCanvas(r.right, r.bottom);
        const boxW = br.x - tl.x;
        const lineHeight = textBoxFontPx * PICA_LINE_HEIGHT;
        const maxWidth = boxW - 32;
        const words = txt.split(/(\s+)/);
        let line = "";
        let y = tl.y + 14;
        for (const w of words) {
          const testLine = line + w;
          const m = octx.measureText(testLine);
          if (m.width > maxWidth && line.length > 0) {
            octx.fillText(line, tl.x + 16, y);
            y += lineHeight;
            line = w.replace(/^\s+/, "");
          } else {
            line = testLine;
          }
        }
        if (line) octx.fillText(line, tl.x + 16, y);
      }

      // HUD — AntiquaMixed (캔버스 좌하단에 고정 배치)
      const hudEl = document.getElementById("hud");
      if (hudEl && getComputedStyle(hudEl).display !== "none") {
        octx.font = "15px AntiquaMixed";
        const lines = hudEl.innerText.split("\n").filter(Boolean);
        const hudLineHeight = 15 * ANTIQUA_LINE_HEIGHT;
        let hy = canvasH - 14 - (lines.length - 1) * hudLineHeight - 4;
        for (const ln of lines) {
          octx.fillStyle = ln.startsWith("Position") ? INK_OUTRO : INK_COLOR;
          octx.fillText(ln, 16, hy);
          hy += hudLineHeight;
        }
      }

      return out;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    captureBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      e.preventDefault();
      if (captureBtn.classList.contains("is-busy")) return;
      captureBtn.classList.add("is-busy");

      try {
        const canvas = await captureScreen();
        const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
        await new Promise((resolve) => {
          canvas.toBlob((blob) => {
            if (blob) downloadBlob(blob, `Scenes without Scenes.png`);
            resolve();
          }, "image/png");
        });
      } catch (err) {
        console.error("[capture] failed:", err);
      } finally {
        captureBtn.classList.remove("is-busy");
      }
    });

    captureBtn.addEventListener("mousedown", (e) => e.stopPropagation());

          return res.text();

          const rows = parseCSV(text);
          // 1) 시트의 작성일자/시간으로 좌표 계산
