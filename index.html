<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ─────────
       두 가지만 사용:
       - Vicentino: 본문/동적 텍스트 모두
       - CelestiaAntiqua: HUD (POSITION / DISTANCE) 전용
    */
    @font-face {
      font-family: 'Vicentino';
      src: url('./assets/1522 Vicentino W01 Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'CelestiaAntiqua';
      src: url('./assets/celestia-antiqua-small-caps.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* ───────── 공통 색상 변수 ───────── */
    :root {
      --ink: #776c54;       /* 모든 텍스트 공통 색상 */
      --ink-deep: #776c54;  /* multiply 블렌드용 (동일 색) */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      cursor: grab;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      touch-action: none;
    }

    #world {
      position: fixed;
      inset: 0;
      transform-origin: 50% 50%;
      will-change: transform;
      pointer-events: none;
    }
    #reveal-root {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* ───────── 우상단 캡처 버튼 ───────── */
    #capture-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--ink);
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 100;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }
    #capture-btn:hover { transform: scale(1.18); }
    #capture-btn:active { transform: scale(0.92); }
    #capture-btn.is-busy { opacity: 0.5; pointer-events: none; }

    /* ───────── 좌측 하단 HUD ─────────
       HUD만 CelestiaAntiqua 사용
    */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: var(--ink);
      font-family: 'CelestiaAntiqua';
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      white-space: nowrap;
      text-transform: uppercase;
    }
    .hud .row { display: block; }

    /* ───────── Reveal Image ───────── */
    .reveal {
      position: fixed;
      z-index: 5;
      pointer-events: none;
    }
    .reveal-img-area {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .reveal-img-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .reveal-text-box {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      background: #ffffff;
      overflow: hidden;
      pointer-events: none;
      transform-origin: top left;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
    }
    .reveal-text-content {
      padding: 14px 16px;
      font-family: 'Vicentino';
      font-size: 14px;
      line-height: 1.55;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .reveal-text-content .caret {
      display: inline-block;
      width: 0.5em;
      height: 1em;
      margin-left: 1px;
      background: var(--ink);
      vertical-align: -0.12em;
      animation: reveal-caret-blink 0.9s steps(2) infinite;
    }
    @keyframes reveal-caret-blink {
      to { opacity: 0; }
    }
    .reveal-img-source {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ───────── 부피 텍스트 클라우드 ───────── */
    .text-volume {
      position: absolute;
      pointer-events: none;
      z-index: 4;
      perspective: 900px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-volume-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .text-volume-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vicentino';
      font-size: 14px;
      line-height: 1;
      color: var(--ink-deep);
      white-space: pre;
      transform-origin: 0 0;
      will-change: transform, opacity;
    }

    /* ───────── 붕괴(decay) 텍스트 모션 ───────── */
    .text-decay {
      position: absolute;
      pointer-events: none;
      z-index: 4;
      perspective: 550px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-decay-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }
    .text-decay-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vicentino';
      font-size: 14px;
      line-height: 1;
      color: var(--ink-deep);
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── Ripple(파동) 텍스트 모션 ───────── */
    .text-ripple {
      position: absolute;
      pointer-events: none;
      z-index: 4;
      will-change: transform;
    }
    .text-ripple-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      will-change: transform;
    }
    .text-ripple-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Vicentino';
      font-size: 14px;
      line-height: 1;
      color: var(--ink-deep);
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── 문장 단위 호흡 텍스트 (hold 중에만 표시) ───────── */
    .text-sentence {
      position: absolute;
      pointer-events: none;
      z-index: 10;          /* reveal-text-box(1)와 reveal-img-area(2)보다 위 */
      will-change: transform;
    }
    /* sentence는 캔버스 기반이라 stage/block CSS는 더 이상 필요 없음 */

    /* ───────── 확장 패널 ───────── */
    .expanded-panel {
      position: fixed;
      z-index: 50;
      pointer-events: auto;
      max-width: 90vw;
      max-height: 90vh;
      cursor: grab;
      opacity: 0;
      transform: scale(0.94);
      transition:
        opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .expanded-panel.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .expanded-panel.is-dragging { cursor: grabbing; }

    .expanded-panel-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    }

    .expanded-panel-spotlight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: lighten;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-image: radial-gradient(circle 280px at 50% 50%,
        rgba(255,255,255,0.85) 0%,
        rgba(255,255,255,0.55) 25%,
        rgba(255,255,255,0.25) 55%,
        rgba(255,255,255,0.05) 80%,
        rgba(255,255,255,0)    100%);
    }

    .expanded-panel-text-wrap {
      position: absolute;
      left: 12%;
      top:  14%;
      width: 76%;
      height: 72%;
      overflow-y: auto;
      overflow-x: hidden;
      cursor: text;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .expanded-panel-text-wrap::-webkit-scrollbar { display: none; }

    .expanded-panel-text {
      padding: 12px 18px 50px 18px;
      font-family: 'Vicentino';
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink-deep);
      white-space: pre-wrap;
      word-break: keep-all;
      mix-blend-mode: multiply;
    }
  </style>
</head>
<body>

  <div id="world">
    <div id="reveal-root"></div>
  </div>

  <div class="hud" id="hud">
    <span class="row">DISTANCE <span class="num" id="num-distance">100%</span></span>
    <span class="row">POSITION X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <button id="capture-btn" type="button" aria-label="Capture trajectory"></button>

  <script>
    /* ─────────────────────────────────────────────
       잉크 색상 상수 (캔버스 캡처용)
       ───────────────────────────────────────────── */
    const INK_COLOR = "#776c54";   // 모든 텍스트 공통
    const INK_DEEP  = "#776c54";   // multiply 블렌드용 (동일)

    /* ─────────────────────────────────────────────
       상태값
       ───────────────────────────────────────────── */
    let distance = 100;
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    const worldEl = document.getElementById("world");

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
      const scale = distance / 100;
      worldEl.style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale.toFixed(4)})`;
    }
    renderHUD();

    function screenToWorld(clientX, clientY) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const scale = distance / 100;
      return {
        x: (clientX - cx - posX) / scale + cx,
        y: (clientY - cy - posY) / scale + cy,
      };
    }

    /* ─────────────────────────────────────────────
       1) 마우스 드래그 → Position
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;

    const revealInstances = [];
    let activeHoldInstance = null;

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;

      if (currentPanel) {
        if (e.target.closest && e.target.closest(".expanded-panel")) return;
        closeExpandedPanel();
      }

      for (const inst of revealInstances) {
        if (inst.isInside(e.clientX, e.clientY)) {
          if (inst.expandable) {
            const data = inst.getExpandData();
            showExpandedPanel(data.filename, data.text, e.clientX, e.clientY);
            return;
          }
          activeHoldInstance = inst;
          inst.startHold();
          return;
        }
      }

      isDragging = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (activeHoldInstance) {
        activeHoldInstance.stopHold();
        activeHoldInstance = null;
      }

      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    window.addEventListener("blur", () => {
      if (activeHoldInstance) {
        activeHoldInstance.stopHold();
        activeHoldInstance = null;
      }
    });

    /* ─────────────────────────────────────────────
       2) wheel 이벤트 분기
       ───────────────────────────────────────────── */
    function applyZoomAt(clientX, clientY, factor) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const oldScale = distance / 100;
      const newDistance = Math.max(5, distance * factor);
      const newScale = newDistance / 100;
      const worldX = (clientX - cx - posX) / oldScale + cx;
      const worldY = (clientY - cy - posY) / oldScale + cy;
      posX = clientX - cx - (worldX - cx) * newScale;
      posY = clientY - cy - (worldY - cy) * newScale;
      distance = newDistance;
    }

    window.addEventListener("wheel", (e) => {
      e.preventDefault();

      // 줌 비활성화: 트랙패드 두 손가락 패닝만 허용, 마우스 휠/핀치 줌은 무시
      const isTrackpadPan =
        Math.abs(e.deltaX) > 0 ||
        (e.deltaMode === 0 && Math.abs(e.deltaY) < 50 && !e.ctrlKey);

      if (isTrackpadPan) {
        posX -= e.deltaX;
        posY -= e.deltaY;
        renderHUD();
      }
      // ctrl+wheel(핀치 줌) 및 마우스 휠 줌은 모두 무시
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치
       ───────────────────────────────────────────── */
    let touchMode = null;
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
      // 핀치 줌 비활성화 — 두 손가락 터치는 무시
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      }
      // 핀치 줌 비활성화
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    window.addEventListener("contextmenu", (e) => e.preventDefault());

    /* ─────────────────────────────────────────────
       5) Google Sheet 연동
       ───────────────────────────────────────────── */
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1pintIO8VNpryzS56eqXaNjqzx5f3EeAV/gviz/tq?tqx=out:csv&gid=0";

    const SHEET_TARGET_ROW = 80;
    const SHEET_TARGET_COL_NAME = "기억 주제";

    const IMAGE_BASE_PATH = "./assets/";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') { cell += '"'; i++; }
          else if (ch === '"') { inQuotes = false; }
          else { cell += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ",") { row.push(cell); cell = ""; }
          else if (ch === "\n") { row.push(cell); cell = ""; rows.push(row); row = []; }
          else if (ch === "\r") { /* 무시 */ }
          else { cell += ch; }
        }
      }
      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function pickRowFromSheet(rows, targetRow) {
      if (!rows || rows.length === 0) return null;
      const header = rows[0];
      const dataRow = rows[targetRow - 1];
      if (!dataRow) {
        console.warn(`[sheet] ${targetRow}행이 비어 있습니다.`);
        return null;
      }
      const obj = {};
      for (let i = 0; i < header.length; i++) {
        const key = (header[i] || "").trim();
        if (!key) continue;
        obj[key] = (dataRow[i] || "").trim();
      }
      return obj;
    }

    /* ─────────────────────────────────────────────
       Reveal 인스턴스 시스템
       ───────────────────────────────────────────── */

    const REVEAL_SIZE = 350;

    const FRAME_COUNT = 8;
    const FRAME_INTERVAL_MS = 280;
    const TYPE_INTERVAL_MS  = 50;
    const TEXT_BOX_W = 280;
    const TEXT_BOX_H = 200;
    const REVEAL_INFLUENCE = 90;
    const POINT_LIFE = 140;
    const POINT_RADIUS = 75;

    const HOLD_PULSE_PERIOD_MS = 700;
    const HOLD_LOWRES_PERIOD_MS = 1400;
    const HOLD_LOWRES_MIN_PX = 6;
    const HOLD_LOWRES_MAX_PX = 90;

    let mouseX = -9999, mouseY = -9999;

    /* ─────────────────────────────────────────────
       텍스트 궤적 시스템 (캡처용)
       ───────────────────────────────────────────── */
    const pathPts = [];
    let totalArcLen = 0;
    let lastPathScreenX = -9999, lastPathScreenY = -9999;
    let pendingText = "";

    function addPathPoint(clientX, clientY) {
      let segLen = 0;
      if (lastPathScreenX > -9000) {
        const dx = clientX - lastPathScreenX;
        const dy = clientY - lastPathScreenY;
        segLen = Math.hypot(dx, dy);
        if (segLen < 1.5) return;
      }
      totalArcLen += segLen;
      const w = screenToWorld(clientX, clientY);
      pathPts.push({ worldX: w.x, worldY: w.y, sScreen: totalArcLen });
      lastPathScreenX = clientX;
      lastPathScreenY = clientY;
    }

    function feedFromInstance(inst) {
      const text = (inst.getText && inst.getText()) || "";
      if (!text) return;
      const norm = text.replace(/\s+/g, " ").trim();
      if (pendingText.length > 0) pendingText += "  ";
      pendingText += norm;
    }

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      addPathPoint(e.clientX, e.clientY);
    });

    function createRevealInstance(config) {
      const { leftPct, topPct, size, sheetRow, root } = config;
      const interactive = config.interactive !== false;
      const expandable  = config.expandable === true;
      const framesCount = (config.framesCount != null) ? config.framesCount : FRAME_COUNT;
      const holdPulse   = config.holdPulse === true;
      const holdLowRes  = config.holdLowRes === true;
      const holdSentence = config.holdSentence === true;
      // sentence 모션 캐릭터: "wave" (좌→우 시간차), "breath" (가운데→가장자리 호흡), "drift" (글자별 자유 표류)
      const holdSentenceStyle = config.holdSentenceStyle || "wave";
      const baseVignette = config.baseVignette === true;
      const outroMode   = config.outroMode || "volume";

      const wrap = document.createElement("div");
      wrap.className = "reveal";
      wrap.style.left   = `${leftPct}%`;
      wrap.style.top    = `${topPct}%`;
      wrap.style.width  = `${size}px`;
      wrap.style.height = `${size}px`;

      const textBox = document.createElement("div");
      textBox.className = "reveal-text-box";
      textBox.style.zIndex = "1";
      const textInner = document.createElement("div");
      textInner.className = "reveal-text-content";
      textBox.appendChild(textInner);

      const imgArea = document.createElement("div");
      imgArea.className = "reveal-img-area";
      imgArea.style.zIndex = "2";
      const canvas = document.createElement("canvas");
      imgArea.appendChild(canvas);

      const baseScale = (typeof config.baseScale === "number" && config.baseScale > 0)
        ? config.baseScale : 1;
      const baseSize = Math.round(size * baseScale);
      let baseCanvas = null;
      let baseCtx = null;
      let baseArea = null;
      if (baseScale !== 1) {
        baseArea = document.createElement("div");
        baseArea.className = "reveal-base-area";
        baseArea.style.position = "absolute";
        baseArea.style.left = `${(size - baseSize) / 2}px`;
        baseArea.style.top  = `${(size - baseSize) / 2}px`;
        baseArea.style.width  = `${baseSize}px`;
        baseArea.style.height = `${baseSize}px`;
        baseArea.style.pointerEvents = "none";
        baseArea.style.zIndex = "1";
        baseCanvas = document.createElement("canvas");
        baseCanvas.style.position = "absolute";
        baseCanvas.style.inset = "0";
        baseCanvas.style.width  = "100%";
        baseCanvas.style.height = "100%";
        baseArea.appendChild(baseCanvas);
        baseCtx = baseCanvas.getContext("2d");
      }

      wrap.appendChild(textBox);
      if (baseArea) wrap.appendChild(baseArea);
      wrap.appendChild(imgArea);
      wrap.style.overflow = "visible";
      root.appendChild(wrap);

      const ctx = canvas.getContext("2d");

      let overlayImg = null;
      const overlayFilename = config.overlayFilename || null;
      if (overlayFilename) {
        const oi = new Image();
        try { oi.crossOrigin = "anonymous"; } catch(e) {}
        oi.onerror = () => { oi._broken = true; };
        oi.src = IMAGE_BASE_PATH + overlayFilename;
        overlayImg = oi;
      }

      let maskCanvas = null;
      let maskCtx = null;
      let compCanvas = null;
      let compCtx = null;

      // 이미지의 실제 픽셀 해상도를 캔버스에 그대로 사용 → 화질 보존
      // (단, 너무 큰 이미지는 성능 보호를 위해 상한선 적용)
      let nativeImgW = 0;
      let nativeImgH = 0;
      const NATIVE_MAX = 1024; // 캔버스 픽셀 최대 크기 (성능 보호)

      function resolveCanvasPixelSize() {
        const dpr = window.devicePixelRatio || 1;
        if (nativeImgW <= 0 || nativeImgH <= 0) {
          return { w: Math.round(size * dpr), h: Math.round(size * dpr) };
        }
        // 자연 해상도 사용. 단 너무 크면 비율 유지하면서 NATIVE_MAX로 다운
        const longEdge = Math.max(nativeImgW, nativeImgH);
        if (longEdge <= NATIVE_MAX) {
          return { w: nativeImgW, h: nativeImgH };
        }
        const k = NATIVE_MAX / longEdge;
        return { w: Math.round(nativeImgW * k), h: Math.round(nativeImgH * k) };
      }

      function resizeCanvas() {
        const px = resolveCanvasPixelSize();
        canvas.width  = px.w;
        canvas.height = px.h;
        // 그리기 좌표계는 size 기준 (스타일 크기)으로 매핑
        ctx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        if (baseCanvas && baseCtx) {
          // base 영역은 size 대비 baseSize 비율로 동일 픽셀 밀도 적용
          const baseTW = Math.round(px.w * (baseSize / size));
          const baseTH = Math.round(px.h * (baseSize / size));
          baseCanvas.width  = baseTW;
          baseCanvas.height = baseTH;
          baseCtx.setTransform(baseTW / baseSize, 0, 0, baseTH / baseSize, 0, 0);
          baseCtx.imageSmoothingEnabled = true;
          baseCtx.imageSmoothingQuality = "high";
        }
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const frames = [];
      let currentFrame = 0;
      let frameLoopTimer = null;

      function loadFrameSeries(baseFilename) {
        const dot = baseFilename.lastIndexOf(".");
        const name = dot === -1 ? baseFilename : baseFilename.slice(0, dot);
        const ext  = dot === -1 ? ""           : baseFilename.slice(dot);
        frames.length = 0;
        for (let i = 0; i < framesCount; i++) {
          const fname = (i === 0) ? `${name}${ext}` : `${name}-${i}${ext}`;
          const img = new Image();
          try { img.crossOrigin = "anonymous"; } catch(e) {}
          img.onerror = () => { img._broken = true; };
          // 첫 프레임 로드되면 자연 해상도 기준으로 캔버스 리사이즈
          img.onload = (function(idx, im) {
            return function() {
              if (idx === 0 && im.naturalWidth > 0) {
                nativeImgW = im.naturalWidth;
                nativeImgH = im.naturalHeight;
                resizeCanvas();
              }
            };
          })(i, img);
          img.src = IMAGE_BASE_PATH + fname;
          frames.push(img);
        }
        currentFrame = 0;
        console.info(`[reveal] frames for "${baseFilename}":`,
                     frames.map(im => im.src));
      }

      function nextValidFrame(from) {
        const n = frames.length;
        if (n === 0) return -1;
        for (let i = 1; i <= n; i++) {
          const idx = (from + i) % n;
          const im = frames[idx];
          if (!im._broken && im.complete && im.naturalWidth > 0) return idx;
          if (!im._broken && !im.complete) return idx;
        }
        const base = frames[0];
        if (base && !base._broken) return 0;
        return -1;
      }

      let fullText = "";
      let typedLen = 0;
      let typeTimer = null;

      function setText(text) {
        fullText = text || "";
        typedLen = 0;
        renderTypedText();
      }
      function renderTypedText() {
        const visible = fullText.slice(0, typedLen);
        textInner.textContent = visible;
        if (typedLen < fullText.length || isHolding) {
          const caret = document.createElement("span");
          caret.className = "caret";
          textInner.appendChild(caret);
        }
      }
      function startTyping() {
        if (typeTimer) return;
        typeTimer = setInterval(() => {
          if (typedLen < fullText.length) {
            typedLen++;
            renderTypedText();
          }
        }, TYPE_INTERVAL_MS);
      }
      function stopTyping() {
        if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
      }

      let isHolding = false;
      let isVolumeMode = false;
      let holdStartTime = 0;

      function startHold() {
        if (!interactive) return;
        if (isHolding) return;
        if (isVolumeMode) return;
        isHolding = true;
        holdStartTime = performance.now();

        if (!frameLoopTimer && framesCount > 1) {
          const interval = holdPulse ? 90 : FRAME_INTERVAL_MS;
          frameLoopTimer = setInterval(() => {
            if (frames.length > 0) {
              const next = nextValidFrame(currentFrame);
              if (next !== -1) currentFrame = next;
            }
          }, interval);
        }

        if (holdSentence) {
          buildSentenceText(fullText);
        }
      }

      let lowResCanvas = null;
      let lowResCtx = null;

      let volumeRoot = null;
      let volumeStage = null;
      let volumeGlyphs = [];
      let volumeStartTime = 0;
      let volumeRafId = 0;
      let volX = 0, volY = 0;

      function buildVolumeText(text) {
        teardownVolumeText();
        if (!text || text.trim().length === 0) return;

        volumeRoot = document.createElement("div");
        volumeRoot.className = "text-volume";
        // wrap과 같은 위치(world 좌표계의 wrap 중심)에 둠
        volumeRoot.style.left = `calc(${leftPct}% + ${size / 2}px)`;
        volumeRoot.style.top  = `calc(${topPct}% + ${size / 2}px)`;
        volumeRoot.style.width  = "0px";
        volumeRoot.style.height = "0px";

        volumeStage = document.createElement("div");
        volumeStage.className = "text-volume-stage";
        volumeRoot.appendChild(volumeStage);
        // body가 아닌 reveal-root(=#world의 자식)에 붙임 → multiply가 캔버스와 블렌드됨
        root.appendChild(volumeRoot);

        const measure = document.createElement("span");
        measure.className = "text-volume-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        let runningX = 0;
        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch;
          const w = measure.getBoundingClientRect().width;
          charWidths.push(w);
        }
        document.body.removeChild(measure);
        const totalW = charWidths.reduce((a, b) => a + b, 0);
        const startX = -totalW / 2;

        volumeGlyphs = [];
        let cx = startX;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const el = document.createElement("span");
          el.className = "text-volume-glyph";
          el.textContent = ch;
          volumeStage.appendChild(el);

          const flatX = cx;
          const flatY = 0;
          cx += charWidths[i];

          const u = Math.random();
          const v = Math.random();
          const theta = 2 * Math.PI * u;
          const phi   = Math.acos(2 * v - 1);
          const baseR = 80;
          const radiusMod = 1 + Math.sin(phi - 0.3) * 0.15
                              + Math.cos(theta * 2) * 0.06;
          const R = baseR * radiusMod;
          const sx = R * Math.sin(phi) * Math.cos(theta);
          const sy = R * Math.cos(phi) - 8;
          const sz = R * Math.sin(phi) * Math.sin(theta);

          volumeGlyphs.push({
            el,
            flatX, flatY,
            sphereX: sx, sphereY: sy, sphereZ: sz,
            phase: Math.random() * Math.PI * 2,
            flowSeed: Math.random() * 1000,
          });
        }

        volumeStartTime = performance.now();
        const tickVol = (now) => {
          if (!volumeRoot) return;
          updateVolume(now);
          volumeRafId = requestAnimationFrame(tickVol);
        };
        volumeRafId = requestAnimationFrame(tickVol);
      }

      function updateVolume(now) {
        // alightworld 스타일: 한 줄 문장의 글자들이 본 위치(flatX) 주변에서
        //  - 인트로: 흩어진 위치(sphere)에서 본 위치로 부드럽게 모이며 페이드인
        //  - 그 후 무한 루프:
        //     - 각 낱자가 wave + 미세 회전 + alpha 호흡
        //     - 문장 라인 자체가 sin 곡선으로 살짝 휘어짐 (시간에 따라 변형)
        //     - 문장 전체도 천천히 표류

        const elapsed = (now - volumeStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);

        // 인트로 동안 stage가 살짝 회전했다가 정상 위치로 (alightworld는 정적이지만 부드러운 인트로 효과)
        const introRotY = (1 - introEased) * 6;       // 6deg → 0deg
        const introRotX = Math.sin(introT * Math.PI) * 3;
        volumeStage.style.transform =
          `rotateX(${introRotX.toFixed(2)}deg) rotateY(${introRotY.toFixed(2)}deg)`;

        // 문장 라인이 곡선으로 살짝 휘는 정도 (시간에 따라 변형)
        // → 글자 인덱스에 비례한 sin → 문장 전체가 부드러운 곡선
        const curveAmpY = 6 + Math.sin(elapsed * 0.25) * 3;  // 곡률 진폭 천천히 변동
        const curveFreq = 1.2 + Math.sin(elapsed * 0.18) * 0.3; // 곡선 주기도 변동

        // 문장 전체 표류
        const driftX = Math.sin(elapsed * 0.16) * 4 + Math.sin(elapsed * 0.07) * 2;
        const driftY = Math.cos(elapsed * 0.21) * 3 + Math.sin(elapsed * 0.10) * 1.5;

        const totalGlyphs = volumeGlyphs.length;
        for (let idx = 0; idx < totalGlyphs; idx++) {
          const g = volumeGlyphs[idx];

          // 글자별 위치 비율 (0~1)
          const posRatio = totalGlyphs > 1 ? idx / (totalGlyphs - 1) : 0.5;
          // 곡선 휘어짐: posRatio * 2π * curveFreq → 문장 전체에 sin 곡선
          const curveY = Math.sin(posRatio * Math.PI * 2 * curveFreq + elapsed * 0.4) * curveAmpY;

          // 글자별 phase
          const wavePhase = posRatio * Math.PI * 2;
          const personalPhase = g.phase;

          // 글자별 wave (decay보다 살짝 큰 진폭 — volume은 더 공간적)
          const dy = Math.sin(elapsed * 1.5 - wavePhase * 1.2 + personalPhase) * 2.0
                   + Math.sin(elapsed * 0.55 + personalPhase * 1.8) * 1.0;
          const dx = Math.cos(elapsed * 0.95 - wavePhase * 0.7 + personalPhase) * 1.4
                   + Math.sin(elapsed * 0.4 + personalPhase) * 0.7;

          // 글자별 미세 회전
          const rot = Math.sin(elapsed * 0.8 - wavePhase * 0.5 + personalPhase) * 0.03;

          // alpha 호흡
          const alphaBreath = 0.80 + Math.sin(elapsed * 0.95 - wavePhase * 0.6 + personalPhase * 1.4) * 0.20;
          const opacity = introEased * alphaBreath;

          // 인트로: 흩어진 sphere 위치 → 본 위치(flatX, flatY)로 모임
          // 이 때 sphere 위치를 너무 강하게 안 쓰고 30% 정도만 (alightworld는 미묘하게)
          const arrivalDelay = (g.flowSeed % 1) * 0.4;
          const arrival = Math.max(0, Math.min(1,
            (introT - arrivalDelay) / Math.max(0.01, 1 - arrivalDelay)
          ));
          const arrivalEased = 1 - Math.pow(1 - arrival, 3);
          const startOffsetX = (g.sphereX * 0.3) * (1 - arrivalEased);
          const startOffsetY = (g.sphereY * 0.3) * (1 - arrivalEased);

          // 최종 위치
          const x = g.flatX + dx + driftX + startOffsetX;
          const y = g.flatY + dy + curveY + driftY + startOffsetY;

          // 미세 스케일 호흡
          const scale = 0.96 + Math.sin(elapsed * 0.65 + personalPhase) * 0.035;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      function teardownVolumeText() {
        if (volumeRafId) { cancelAnimationFrame(volumeRafId); volumeRafId = 0; }
        if (volumeRoot && volumeRoot.parentNode) {
          volumeRoot.parentNode.removeChild(volumeRoot);
        }
        volumeRoot = null;
        volumeStage = null;
        volumeGlyphs = [];
      }

      let decayRoot = null;
      let decayStage = null;
      let decayGlyphs = [];
      let decayWords = [];
      let decayRafId = 0;
      let decayStartTime = 0;
      let decayLoopCount = 0;
      let decayLoopStart = 0;
      let decayCycleDuration = 0;

      function generateSilhouettePoints(count, variant) {
        const points = [];
        const baseScale = 4.2;

        const outlineCount = Math.floor(count * 0.50);
        const fillCount = count - outlineCount;

        for (let i = 0; i < outlineCount; i++) {
          const t = i / outlineCount;
          const a = t * Math.PI * 2;
          const sx = 16 * Math.pow(Math.sin(a), 3);
          const sy = -(13 * Math.cos(a)
                      - 5  * Math.cos(2 * a)
                      - 2  * Math.cos(3 * a)
                      - 1  * Math.cos(4 * a));
          const x = sx * baseScale;
          const y = sy * baseScale - 5;
          const z = (Math.random() - 0.5) * 10;
          points.push({ x, y, z });
        }

        let placed = 0;
        let safety = 0;
        while (placed < fillCount && safety < fillCount * 30) {
          safety++;
          const rx = (Math.random() - 0.5) * 2;
          const ry = (Math.random() - 0.5) * 2;
          const X = rx;
          const Y = -ry;
          const lhs = Math.pow(X * X + Y * Y - 1, 3) - X * X * Y * Y * Y;
          if (lhs <= 0) {
            const x = rx * 65;
            const y = ry * 60 - 5;
            const z = (Math.random() - 0.5) * 14;
            points.push({ x, y, z });
            placed++;
          }
        }
        while (placed < fillCount) {
          const a = Math.random() * Math.PI * 2;
          const sx = 16 * Math.pow(Math.sin(a), 3);
          const sy = -(13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a));
          points.push({ x: sx * baseScale, y: sy * baseScale - 5, z: 0 });
          placed++;
        }

        return points;
      }

      function buildDecayText(text) {
        teardownDecayText();
        if (!text || text.trim().length === 0) return;

        decayRoot = document.createElement("div");
        decayRoot.className = "text-decay";
        decayRoot.style.left = `calc(${leftPct}% + ${size / 2}px)`;
        decayRoot.style.top  = `calc(${topPct}% + ${size / 2}px)`;
        decayRoot.style.width  = "0px";
        decayRoot.style.height = "0px";

        decayStage = document.createElement("div");
        decayStage.className = "text-decay-stage";
        decayRoot.appendChild(decayStage);
        root.appendChild(decayRoot);

        const CORE_WORDS = new Set([
          "see", "lost", "loved", "one", "relive", "quicker"
        ]);

        decayWords = [];
        {
          let i = 0;
          while (i < text.length) {
            while (i < text.length && /\s/.test(text[i])) i++;
            if (i >= text.length) break;
            const startIdx = i;
            while (i < text.length && !/\s/.test(text[i])) i++;
            const endIdx = i;
            const wordRaw = text.slice(startIdx, endIdx);
            const wordKey = wordRaw.replace(/[^A-Za-z]/g, "").toLowerCase();
            const isCore = CORE_WORDS.has(wordKey);
            decayWords.push({ startIdx, endIdx, isCore });
          }
        }

        const measure = document.createElement("span");
        measure.className = "text-decay-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        const LINE_WIDTH = 360;
        const LINE_HEIGHT = 24;

        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch === " " ? "\u00a0" : ch;
          charWidths.push(measure.getBoundingClientRect().width);
        }
        document.body.removeChild(measure);

        const layout = [];
        let curX = 0;
        let curY = 0;
        for (let w = 0; w < decayWords.length; w++) {
          const word = decayWords[w];
          let wordWidth = 0;
          for (let i = word.startIdx; i < word.endIdx; i++) {
            wordWidth += charWidths[i];
          }
          const spaceCh = (w === 0) ? "" : " ";
          const spaceW = (w === 0) ? 0 : charWidths[word.startIdx - 1] || 4;
          if (curX + spaceW + wordWidth > LINE_WIDTH && curX > 0) {
            curX = 0;
            curY += LINE_HEIGHT;
          } else if (w > 0) {
            layout.push({
              ch: " ", lineX: curX, lineY: curY,
              isSpace: true, wordIdx: -1, isCore: false,
            });
            curX += spaceW;
          }
          for (let i = word.startIdx; i < word.endIdx; i++) {
            layout.push({
              ch: text[i], lineX: curX, lineY: curY,
              isSpace: false, wordIdx: w, isCore: word.isCore,
            });
            curX += charWidths[i];
          }
        }

        const totalH = curY + LINE_HEIGHT;
        const offsetX = -LINE_WIDTH / 2;
        const offsetY = -totalH / 2;

        decayGlyphs = [];
        for (let i = 0; i < layout.length; i++) {
          const it = layout[i];
          if (it.isSpace) continue;

          const el = document.createElement("span");
          el.className = "text-decay-glyph";
          el.textContent = it.ch;
          decayStage.appendChild(el);

          const baseX = it.lineX + offsetX;
          const baseY = it.lineY + offsetY;

          const scatterTheta = Math.random() * Math.PI * 2;
          const scatterPhi = Math.acos(2 * Math.random() - 1);
          const scatterDist = 140 + Math.random() * 100;
          const scatterX = scatterDist * Math.sin(scatterPhi) * Math.cos(scatterTheta);
          const scatterY = scatterDist * Math.cos(scatterPhi) * 0.6;
          const scatterZ = scatterDist * Math.sin(scatterPhi) * Math.sin(scatterTheta) * 0.6;

          const curveSeed = Math.random() * Math.PI * 2;
          const curveAmt = 30 + Math.random() * 40;

          decayGlyphs.push({
            el, ch: it.ch, wordIdx: it.wordIdx, isCore: it.isCore,
            baseX, baseY,
            scatterX, scatterY, scatterZ,
            curveSeed, curveAmt,
            phase: Math.random() * Math.PI * 2,
            wordIdxRand: Math.random(),
            arrivalDelay: Math.random() * 0.4,
            // 자유 군집 이동용 개별 시드 (물고기 떼처럼 자연스러운 noise 모션)
            flockSeedA: Math.random() * 1000,
            flockSeedB: Math.random() * 1000,
          });
        }

        // 형상 좌표 미리 계산 — 모든 글리프가 자리잡은 후
        // circle: 글자들이 원형으로 둘러서서 떠다님
        // wave: 글자들이 길게 늘어선 sin 파형
        const totalG = decayGlyphs.length;
        for (let gi = 0; gi < totalG; gi++) {
          const g = decayGlyphs[gi];
          g.glyphIdx = gi;

          // 1) Circle 형상 — 글자들이 원 둘레에 균등 분포
          const circleAngle = (gi / Math.max(1, totalG)) * Math.PI * 2;
          const circleRadius = 95;  // 원 반지름 (px)
          g.circleX = Math.cos(circleAngle) * circleRadius;
          g.circleY = Math.sin(circleAngle) * circleRadius * 0.65; // 살짝 납작한 타원
          g.circleAngle = circleAngle;

          // 2) Wave 형상 — 글자들이 sin 파도에 늘어서서 흐름
          const waveT = totalG > 1 ? gi / (totalG - 1) : 0.5;
          g.waveX = (waveT - 0.5) * 280;  // 가로로 -140~140 분포
          g.waveBaseY = 0;  // sine 진폭은 update에서 시간변화로 처리
          g.waveT = waveT;
        }

        decayStartTime = performance.now();
        decayLoopStart = decayStartTime;
        decayLoopCount = 0;
        decayCycleDuration = 8500;

        const tickDecay = (now) => {
          if (!decayRoot) return;
          updateDecay(now);
          decayRafId = requestAnimationFrame(tickDecay);
        };
        decayRafId = requestAnimationFrame(tickDecay);
      }

      let decayCachedSilhouette = null;
      let decayCachedVariant = -1;

      function updateDecay(now) {
        // ─── alightworld 스타일 + 다채로운 형상 변화 ───
        // 4단계 순환 (총 16초):
        //  0~3.0초 (페이즈 0): 본 문장에서 호흡
        //  3.0~6.5초 (페이즈 1): 자유 군집 이동 (물고기 떼처럼 부드럽게 흩어짐)
        //  6.5~10.0초 (페이즈 2): 원형 형상 (글자들이 둥글게 둘러섬)
        //  10.0~13.0초 (페이즈 3): 다시 자유 군집
        //  13.0~16.0초 (페이즈 4): wave 형상 (sin 파도)
        //  → 16초 후 본 문장으로 복귀하며 무한 반복
        // 모든 전환은 부드럽게 보간(easeInOutCubic), 글자별 시간차로 자연스럽게.

        const elapsed = (now - decayStartTime) / 1000;
        const CYCLE = 18.0;  // 한 사이클 18초
        const cycleT = (elapsed % CYCLE) / CYCLE;  // 0~1
        const cycleNum = Math.floor(elapsed / CYCLE);

        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);

        // 페이즈 경계 (cycleT 기준)
        const P0_END = 0.16;  // 본 문장 호흡 (~3초)
        const P1_END = 0.36;  // 자유 군집 (~3.6초)
        const P2_END = 0.56;  // 원형 (~3.6초)
        const P3_END = 0.72;  // 자유 군집2 (~2.9초)
        const P4_END = 0.88;  // wave (~2.9초)
        // 0.88~1.0: 본 문장으로 복귀 (~2.2초)

        // easeInOutCubic
        const easeInOut = (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        // 문장 전체 표류 (느린 sway)
        const driftX = Math.sin(elapsed * 0.16) * 5 + Math.sin(elapsed * 0.07) * 2.5;
        const driftY = Math.cos(elapsed * 0.20) * 4 + Math.sin(elapsed * 0.10) * 1.8;

        const totalG = decayGlyphs.length;

        for (let idx = 0; idx < totalG; idx++) {
          const g = decayGlyphs[idx];

          // 글자별 phase
          const personalPhase = g.phase;
          const wavePhase = (idx / Math.max(1, totalG - 1)) * Math.PI * 2;

          // 글자별 시간차 — 같은 형상이라도 글자마다 살짝 다르게 도달
          const stagger = g.arrivalDelay * 0.15;  // 0~0.06 정도

          // ─── 1. 현재 페이즈의 "타겟 위치" 계산 ───
          // 각 페이즈에서 글자가 가야 할 본 위치
          // sentence(본 문장) / flock(자유 군집) / circle / wave 좌표 중 하나
          let targetX, targetY;
          let phaseProgress;  // 페이즈 내 진행도 0~1

          // 형상별 좌표 (재사용)
          const sentX = g.baseX;
          const sentY = g.baseY;

          // 자유 군집: noise 기반으로 글자가 본 위치 주변 큰 영역에서 떠다님
          // 글자별 flockSeedA/B로 다른 궤적을 그림
          const flockX = g.baseX
            + Math.sin(elapsed * 0.4 + g.flockSeedA) * 50
            + Math.cos(elapsed * 0.27 + g.flockSeedA * 1.3) * 30;
          const flockY = g.baseY
            + Math.cos(elapsed * 0.35 + g.flockSeedB) * 40
            + Math.sin(elapsed * 0.31 + g.flockSeedB * 1.2) * 25;

          // 원형: glyph index 따라 둥글게 분포, 시간에 따라 천천히 회전
          const rotateAngle = elapsed * 0.25;  // 천천히 회전
          const circleA = g.circleAngle + rotateAngle;
          const circleX = Math.cos(circleA) * 95;
          const circleY = Math.sin(circleA) * 95 * 0.65;

          // wave: 가로로 늘어선 글자들이 sin 파도에 따라 위아래
          const waveAmp = 28 + Math.sin(elapsed * 0.4) * 6;
          const waveX = g.waveX;
          const waveY = Math.sin(g.waveT * Math.PI * 4 - elapsed * 1.5) * waveAmp;

          if (cycleT < P0_END) {
            // 페이즈 0: 본 문장
            targetX = sentX; targetY = sentY;
            phaseProgress = cycleT / P0_END;
          } else if (cycleT < P1_END) {
            // 페이즈 1: 자유 군집 (sentence → flock 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P0_END) / (P1_END - P0_END) - stagger));
            const eu = easeInOut(u);
            targetX = sentX * (1 - eu) + flockX * eu;
            targetY = sentY * (1 - eu) + flockY * eu;
            phaseProgress = u;
          } else if (cycleT < P2_END) {
            // 페이즈 2: 원형 (flock → circle 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P1_END) / (P2_END - P1_END) - stagger));
            const eu = easeInOut(u);
            targetX = flockX * (1 - eu) + circleX * eu;
            targetY = flockY * (1 - eu) + circleY * eu;
            phaseProgress = u;
          } else if (cycleT < P3_END) {
            // 페이즈 3: 자유 군집2 (circle → flock 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P2_END) / (P3_END - P2_END) - stagger));
            const eu = easeInOut(u);
            targetX = circleX * (1 - eu) + flockX * eu;
            targetY = circleY * (1 - eu) + flockY * eu;
            phaseProgress = u;
          } else if (cycleT < P4_END) {
            // 페이즈 4: wave (flock → wave 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P3_END) / (P4_END - P3_END) - stagger));
            const eu = easeInOut(u);
            targetX = flockX * (1 - eu) + waveX * eu;
            targetY = flockY * (1 - eu) + waveY * eu;
            phaseProgress = u;
          } else {
            // 페이즈 5: 다시 본 문장으로 복귀 (wave → sentence 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P4_END) / (1 - P4_END) - stagger));
            const eu = easeInOut(u);
            targetX = waveX * (1 - eu) + sentX * eu;
            targetY = waveY * (1 - eu) + sentY * eu;
            phaseProgress = u;
          }

          // ─── 2. 미세 wave / 회전 / alpha 호흡 (alightworld 호흡감) ───
          const microDy = Math.sin(elapsed * 1.4 - wavePhase * 1.1 + personalPhase) * 1.6
                        + Math.sin(elapsed * 0.6 + personalPhase * 1.7) * 0.8;
          const microDx = Math.cos(elapsed * 1.0 - wavePhase * 0.8 + personalPhase) * 1.0
                        + Math.sin(elapsed * 0.45 + personalPhase) * 0.5;
          const rot = Math.sin(elapsed * 0.85 - wavePhase * 0.6 + personalPhase) * 0.03;

          const alphaBreath = 0.82 + Math.sin(elapsed * 0.9 - wavePhase * 0.7 + personalPhase * 1.3) * 0.18;
          const opacity = introEased * alphaBreath;

          // 인트로 페이드인용 시작 흩어짐 (첫 사이클에만)
          let startOffsetX = 0, startOffsetY = 0;
          if (cycleNum === 0 && introT < 1) {
            const arrival = Math.max(0, Math.min(1,
              (introT - g.arrivalDelay * 0.4) / (1 - g.arrivalDelay * 0.4)
            ));
            const arrivalEased = 1 - Math.pow(1 - arrival, 3);
            startOffsetX = (g.scatterX * 0.3) * (1 - arrivalEased);
            startOffsetY = (g.scatterY * 0.3) * (1 - arrivalEased);
          }

          // ─── 3. 최종 위치 = 형상 좌표 + 미세 wave + 표류 + 인트로 오프셋 ───
          const x = targetX + microDx + driftX + startOffsetX;
          const y = targetY + microDy + driftY + startOffsetY;

          // 미세 스케일 호흡
          const scale = 0.97 + Math.sin(elapsed * 0.7 + personalPhase) * 0.025;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      function teardownDecayText() {
        if (decayRafId) { cancelAnimationFrame(decayRafId); decayRafId = 0; }
        if (decayRoot && decayRoot.parentNode) {
          decayRoot.parentNode.removeChild(decayRoot);
        }
        decayRoot = null;
        decayStage = null;
        decayGlyphs = [];
        decayWords = [];
        decayCachedSilhouette = null;
      }

      let rippleRoot = null;
      let rippleStage = null;
      let rippleGlyphs = [];
      let rippleRafId = 0;
      let rippleStartTime = 0;

      function buildRippleText(text) {
        teardownRippleText();
        if (!text || text.trim().length === 0) return;

        rippleRoot = document.createElement("div");
        rippleRoot.className = "text-ripple";
        rippleRoot.style.left = `calc(${leftPct}% + ${size / 2}px)`;
        rippleRoot.style.top  = `calc(${topPct}% + ${size / 2}px)`;
        rippleRoot.style.width  = "0px";
        rippleRoot.style.height = "0px";

        rippleStage = document.createElement("div");
        rippleStage.className = "text-ripple-stage";
        rippleRoot.appendChild(rippleStage);
        root.appendChild(rippleRoot);

        const measure = document.createElement("span");
        measure.className = "text-ripple-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch === " " ? " " : ch;
          charWidths.push(measure.getBoundingClientRect().width);
        }
        document.body.removeChild(measure);

        const LINE_WIDTH  = 360;
        const LINE_HEIGHT = 24;

        const words = [];
        {
          let i = 0;
          while (i < text.length) {
            while (i < text.length && /\s/.test(text[i])) i++;
            if (i >= text.length) break;
            const startIdx = i;
            while (i < text.length && !/\s/.test(text[i])) i++;
            words.push({ startIdx, endIdx: i });
          }
        }

        const layout = [];
        let curX = 0;
        let curY = 0;
        for (let w = 0; w < words.length; w++) {
          const word = words[w];
          let wordWidth = 0;
          for (let i = word.startIdx; i < word.endIdx; i++) {
            wordWidth += charWidths[i];
          }
          const spaceW = (w === 0) ? 0 : (charWidths[word.startIdx - 1] || 4);
          if (curX + spaceW + wordWidth > LINE_WIDTH && curX > 0) {
            curX = 0;
            curY += LINE_HEIGHT;
          } else if (w > 0) {
            curX += spaceW;
          }
          for (let i = word.startIdx; i < word.endIdx; i++) {
            layout.push({ ch: text[i], lineX: curX, lineY: curY });
            curX += charWidths[i];
          }
        }

        const totalH = curY + LINE_HEIGHT;
        const offsetX = -LINE_WIDTH / 2;
        const offsetY = -totalH / 2;

        rippleGlyphs = [];
        for (let i = 0; i < layout.length; i++) {
          const it = layout[i];
          const el = document.createElement("span");
          el.className = "text-ripple-glyph";
          el.textContent = it.ch;
          rippleStage.appendChild(el);

          const baseX = it.lineX + offsetX;
          const baseY = it.lineY + offsetY;

          rippleGlyphs.push({
            el,
            baseX, baseY,
            phaseX: (it.lineX / LINE_WIDTH) * Math.PI * 2,
            phaseY: (it.lineY / LINE_HEIGHT) * 0.7,
            jitter: Math.random() * 0.3,
            jitterSeed: Math.random() * 1000,
          });
        }

        rippleStartTime = performance.now();
        const tickRipple = (now) => {
          if (!rippleRoot) return;
          updateRipple(now);
          rippleRafId = requestAnimationFrame(tickRipple);
        };
        rippleRafId = requestAnimationFrame(tickRipple);
      }

      function updateRipple(now) {
        const t = (now - rippleStartTime) / 1000;

        const intro = Math.min(1, t / 1.2);
        const introEased = 1 - Math.pow(1 - intro, 3);

        const waveSpeed = 1.6;
        const waveAmpY  = 7;
        const waveAmpX  = 2.5;
        const rotAmp    = 0.18;

        for (const g of rippleGlyphs) {
          const wave = Math.sin(t * waveSpeed - g.phaseX * 1.4 + g.phaseY);
          const wave2 = Math.sin(t * waveSpeed * 0.55 - g.phaseX * 0.7 + g.jitterSeed * 0.001);

          const dy = wave * waveAmpY * introEased
                   + wave2 * waveAmpY * 0.35 * introEased;
          const dx = Math.cos(t * waveSpeed * 0.7 - g.phaseX) * waveAmpX * introEased;
          const rot = wave * rotAmp * 0.6 + wave2 * rotAmp * 0.4;

          const x = g.baseX + dx;
          const y = g.baseY + dy;

          const alphaWave = 0.78 + wave * 0.18 + wave2 * 0.06;
          const opacity = Math.max(0.25, Math.min(1, alphaWave)) * introEased;

          const scale = 0.94 + wave * 0.06;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(3)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      function teardownRippleText() {
        if (rippleRafId) { cancelAnimationFrame(rippleRafId); rippleRafId = 0; }
        if (rippleRoot && rippleRoot.parentNode) {
          rippleRoot.parentNode.removeChild(rippleRoot);
        }
        rippleRoot = null;
        rippleStage = null;
        rippleGlyphs = [];
      }

      let sentenceRoot = null;
      let sentenceStage = null;
      let sentenceList = [];
      let sentenceBlocks = [];
      let sentenceRafId = 0;
      let sentenceStartTime = 0;
      let sentenceCurIdx = 0;
      let sentenceCurStart = 0;

      const SENT_FADE_IN  = 1200;
      const SENT_HOLD     = 2600;
      const SENT_FADE_OUT = 1300;
      const SENT_TOTAL    = SENT_FADE_IN + SENT_HOLD + SENT_FADE_OUT;
      const SENT_OVERLAP  = 700;

      function splitSentences(text) {
        if (!text) return [];
        const raw = text.replace(/\s+/g, " ").trim();
        if (!raw) return [];
        const parts = raw.match(/[^.!?\n]+[.!?]?/g) || [raw];
        return parts.map(s => s.trim()).filter(s => s.length > 0);
      }

      // ─────────────────────────────────────────────
      //  캔버스 기반 sentence 시스템
      //  - 별도의 sentence 캔버스를 reveal 캔버스 위에 깔고
      //  - 글자를 캔버스에 직접 그린 후 reveal 이미지를 color-burn으로 합성
      //  - 픽셀 단위 컬러번 블렌딩 (일러스트와 동일)
      // ─────────────────────────────────────────────
      let sentenceCanvas = null;
      let sentenceCtx = null;

      function buildSentenceText(text) {
        teardownSentenceText();
        sentenceList = splitSentences(text);
        if (sentenceList.length === 0) return;

        sentenceRoot = document.createElement("div");
        sentenceRoot.className = "text-sentence";
        // reveal 이미지와 정확히 같은 위치에 배치
        sentenceRoot.style.left = `${leftPct}%`;
        sentenceRoot.style.top  = `${topPct}%`;
        sentenceRoot.style.width  = `${size}px`;
        sentenceRoot.style.height = `${size}px`;

        // 캔버스 생성: reveal 캔버스와 동일한 픽셀 해상도
        sentenceCanvas = document.createElement("canvas");
        sentenceCanvas.style.position = "absolute";
        sentenceCanvas.style.inset = "0";
        sentenceCanvas.style.width = "100%";
        sentenceCanvas.style.height = "100%";
        sentenceCanvas.style.pointerEvents = "none";
        const px = resolveCanvasPixelSize();
        sentenceCanvas.width  = px.w;
        sentenceCanvas.height = px.h;
        sentenceCtx = sentenceCanvas.getContext("2d");
        sentenceCtx.imageSmoothingEnabled = true;
        sentenceCtx.imageSmoothingQuality = "high";
        // 그리기 좌표계는 size 기준으로 매핑
        sentenceCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
        sentenceRoot.appendChild(sentenceCanvas);
        root.appendChild(sentenceRoot);

        sentenceBlocks = [];
        sentenceCurIdx = 0;
        sentenceCurStart = performance.now();
        sentenceStartTime = sentenceCurStart;

        spawnSentenceBlock(sentenceCurStart, sentenceList[0], 0);

        const tick = (now) => {
          if (!sentenceRoot) return;
          updateSentence(now);
          sentenceRafId = requestAnimationFrame(tick);
        };
        sentenceRafId = requestAnimationFrame(tick);
      }

      function spawnSentenceBlock(startTime, text, idxInLoop) {
        const phase = Math.random() * Math.PI * 2;
        sentenceBlocks.push({
          text, startTime, phase,
          settleY: -8 + (Math.random() - 0.5) * 6,
          enterY: 32 + Math.random() * 8,
          exitY: -22 - Math.random() * 8,
          swayAmp: 3 + Math.random() * 2,
          swaySpeed: 0.7 + Math.random() * 0.4,
          settleScale: 0.99 + Math.random() * 0.04,
        });
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }
      function easeInCubic(t) {
        return t * t * t;
      }

      // 캔버스에 한 줄/여러 줄 텍스트를 가운데 정렬로 그림 (자동 줄바꿈)
      function drawWrappedText(c, text, cx, cy, maxWidth, fontPx, lineHeight) {
        const words = text.split(/(\s+)/);
        const lines = [];
        let line = "";
        for (const w of words) {
          const test = line + w;
          if (c.measureText(test).width > maxWidth && line.length > 0) {
            lines.push(line.trimEnd());
            line = w.replace(/^\s+/, "");
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        const totalH = lines.length * lineHeight;
        let y = cy - totalH / 2 + lineHeight / 2;
        for (const ln of lines) {
          const w = c.measureText(ln).width;
          c.fillText(ln, cx - w / 2, y);
          y += lineHeight;
        }
      }

      // 글자(낱자)별로 변환을 적용하며 그리는 wrapper.
      // perCharFn(charIndex, totalChars) → {dy, alpha, rot} 를 반환하면
      // 각 글자가 그 변환으로 그려짐. (alightworld 스타일 wave/breath)
      function drawWrappedTextPerChar(c, text, cx, cy, maxWidth, fontPx, lineHeight, perCharFn) {
        // 줄바꿈 계산
        const words = text.split(/(\s+)/);
        const lines = [];
        let line = "";
        for (const w of words) {
          const test = line + w;
          if (c.measureText(test).width > maxWidth && line.length > 0) {
            lines.push(line.trimEnd());
            line = w.replace(/^\s+/, "");
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);

        // 전체 글자 수 계산 (낱자별 인덱스 부여용)
        let totalChars = 0;
        for (const ln of lines) totalChars += ln.length;

        const totalH = lines.length * lineHeight;
        let y = cy - totalH / 2 + lineHeight / 2;
        let charIdx = 0;
        const baseAlpha = c.globalAlpha;

        for (let li = 0; li < lines.length; li++) {
          const ln = lines[li];
          const lineWidth = c.measureText(ln).width;
          let xCursor = cx - lineWidth / 2;
          for (let i = 0; i < ln.length; i++) {
            const ch = ln[i];
            const chWidth = c.measureText(ch).width;
            const t = perCharFn ? perCharFn(charIdx, totalChars, li, lines.length) : null;
            if (t) {
              c.save();
              if (typeof t.alpha === "number") {
                c.globalAlpha = baseAlpha * Math.max(0, Math.min(1, t.alpha));
              }
              const cxChar = xCursor + chWidth / 2;
              const cyChar = y;
              c.translate(cxChar + (t.dx || 0), cyChar + (t.dy || 0));
              if (t.rot) c.rotate(t.rot);
              if (typeof t.scale === "number" && t.scale !== 1) c.scale(t.scale, t.scale);
              c.fillText(ch, -chWidth / 2, 0);
              c.restore();
            } else {
              c.fillText(ch, xCursor, y);
            }
            xCursor += chWidth;
            charIdx++;
          }
          y += lineHeight;
        }
        c.globalAlpha = baseAlpha;
      }

      // 임시 작업용 오프스크린 캔버스 (sentence 합성용)
      let sentTempCanvas = null;
      let sentTempCtx = null;

      function updateSentence(now) {
        const sinceCurStart = now - sentenceCurStart;
        const fadeOutStart = SENT_FADE_IN + SENT_HOLD;
        if (sinceCurStart >= fadeOutStart - SENT_OVERLAP) {
          const lastBlock = sentenceBlocks[sentenceBlocks.length - 1];
          const expectedNextStart = sentenceCurStart + (fadeOutStart - SENT_OVERLAP);
          const lastIsCurrent = lastBlock && Math.abs(lastBlock.startTime - sentenceCurStart) < 1;
          if (lastIsCurrent) {
            const nextIdx = (sentenceCurIdx + 1) % sentenceList.length;
            spawnSentenceBlock(expectedNextStart, sentenceList[nextIdx], nextIdx);
          }
        }
        if (sinceCurStart >= SENT_TOTAL) {
          sentenceCurIdx = (sentenceCurIdx + 1) % sentenceList.length;
          sentenceCurStart = sentenceCurStart + (SENT_TOTAL - SENT_OVERLAP);
        }

        if (!sentenceCtx || !sentenceCanvas) return;

        // 메인 sentence 캔버스 클리어
        sentenceCtx.save();
        sentenceCtx.setTransform(1, 0, 0, 1, 0, 0);
        sentenceCtx.clearRect(0, 0, sentenceCanvas.width, sentenceCanvas.height);
        sentenceCtx.restore();

        // 임시 캔버스 준비 (sentence 캔버스와 같은 크기)
        if (!sentTempCanvas) {
          sentTempCanvas = document.createElement("canvas");
          sentTempCtx = sentTempCanvas.getContext("2d");
        }
        if (sentTempCanvas.width !== sentenceCanvas.width ||
            sentTempCanvas.height !== sentenceCanvas.height) {
          sentTempCanvas.width  = sentenceCanvas.width;
          sentTempCanvas.height = sentenceCanvas.height;
        }
        const px = resolveCanvasPixelSize();
        sentTempCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
        sentTempCtx.imageSmoothingEnabled = true;
        sentTempCtx.imageSmoothingQuality = "high";

        const FONT_PX = 15;
        const LINE_HEIGHT = FONT_PX * 1.55;
        const MAX_WIDTH = size - 40;
        const cx = size / 2;
        const cyBase = size / 2;

        for (let i = sentenceBlocks.length - 1; i >= 0; i--) {
          const b = sentenceBlocks[i];
          const t = now - b.startTime;
          if (t < 0) continue;
          if (t >= SENT_TOTAL) {
            sentenceBlocks.splice(i, 1);
            continue;
          }

          let opacity, y, scale;
          if (t < SENT_FADE_IN) {
            const u = t / SENT_FADE_IN;
            const eu = easeOutCubic(u);
            opacity = eu;
            y = b.enterY * (1 - eu) + b.settleY * eu;
            scale = 0.97 + 0.02 * eu + (b.settleScale - 0.99) * eu;
          } else if (t < SENT_FADE_IN + SENT_HOLD) {
            opacity = 0.92 + Math.sin(t * 0.0018 + b.phase) * 0.08;
            y = b.settleY + Math.sin(t * 0.0011 + b.phase) * 0.8;
            scale = b.settleScale + Math.sin(t * 0.0009 + b.phase) * 0.005;
          } else {
            const u = (t - SENT_FADE_IN - SENT_HOLD) / SENT_FADE_OUT;
            const eu = easeInCubic(u);
            opacity = 1 - eu;
            y = b.settleY * (1 - eu) + b.exitY * eu;
            scale = b.settleScale * (1 - eu * 0.04);
          }

          const sec = t / 1000;
          const swayX = Math.sin(sec * b.swaySpeed + b.phase) * b.swayAmp;

          // ─── 1단계: 임시 캔버스에 글자 모양 안에 reveal 이미지 클리핑 ───
          // (a) 임시 캔버스 클리어
          sentTempCtx.save();
          sentTempCtx.setTransform(1, 0, 0, 1, 0, 0);
          sentTempCtx.clearRect(0, 0, sentTempCanvas.width, sentTempCanvas.height);
          sentTempCtx.restore();

          // (b) 임시 캔버스에 글자를 #776c54로 그림 (마스크 역할)
          sentTempCtx.save();
          sentTempCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
          sentTempCtx.translate(cx + swayX, cyBase + y);
          sentTempCtx.scale(scale, scale);
          sentTempCtx.fillStyle = INK_COLOR;
          sentTempCtx.font = `${FONT_PX}px Vicentino`;
          sentTempCtx.textBaseline = "middle";
          // ─── 9가지 sentence 모션: 각자 다른 "낱자 → 문장" 변형 ───
          // 모든 모션이 cycleT(0~1) 사이클을 가지고:
          //   appearEnd ~ holdEnd: 글자가 자리 잡고 호흡
          //   holdEnd ~ 1.0: 사라지며 다시 처음부터
          // 각 모션은 글자가 어떻게 "등장하는지"가 명확히 다름.

          let wavePerChar;
          const CYCLE = 8.0;
          const cycleT = (sec % CYCLE) / CYCLE;
          const APPEAR_END = 0.35;  // 0~0.35: 등장
          const HOLD_END   = 0.78;  // 0.35~0.78: 호흡
          // 0.78~1.0: 페이드아웃

          // 글자별 random 시드 (i 기반, 매 프레임 동일)
          const seed = (i, mul) => {
            const s = Math.sin(i * mul) * 43758.5453;
            return s - Math.floor(s);  // 0~1
          };

          // 사이클 내 단계별 이징
          const phaseOf = (cycleT) => {
            if (cycleT < APPEAR_END) {
              return { stage: "appear", t: cycleT / APPEAR_END };
            } else if (cycleT < HOLD_END) {
              return { stage: "hold", t: (cycleT - APPEAR_END) / (HOLD_END - APPEAR_END) };
            } else {
              return { stage: "leave", t: (cycleT - HOLD_END) / (1 - HOLD_END) };
            }
          };

          if (holdSentenceStyle === "typewriter") {
            // 한 글자씩 차례로 타이핑 (왼쪽부터)
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const myT = total > 0 ? i / total : 0;
              let visible, dy = 0;
              if (ph.stage === "appear") {
                const just = ph.t - myT;
                visible = just < 0 ? 0 : (just < 0.05 ? just / 0.05 : 1);
                dy = visible < 1 ? (1 - visible) * 4 : 0;
              } else if (ph.stage === "hold") {
                visible = 1;
                dy = Math.sin(sec * 0.7 + i * 0.15) * 0.5;
              } else {
                visible = 1 - ph.t;
                dy = ph.t * 3;
              }
              const alpha = visible * (0.85 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13);
              return { dy, alpha };
            };
          } else if (holdSentenceStyle === "assemble") {
            // 사방에서 날아와 자리잡음 (각자 다른 방향에서)
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const angle = seed(i, 12.9898) * Math.PI * 2;
              const dist = 40 + seed(i, 78.233) * 30;
              const offX = Math.cos(angle) * dist;
              const offY = Math.sin(angle) * dist;
              const stagger = (i / Math.max(1, total - 1)) * 0.4;
              let amount, alpha, rot;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger * 0.5) / (1 - stagger * 0.5)));
                amount = 1 - easeOutCubic(t);  // 1(흩어짐) → 0(모임)
                alpha = (1 - amount) * 0.95;
                rot = amount * (seed(i, 31.4) - 0.5) * 0.6;
              } else if (ph.stage === "hold") {
                amount = 0;
                alpha = 0.85 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
                rot = Math.sin(sec * 0.6 + i * 0.3) * 0.012;
              } else {
                const t = Math.max(0, Math.min(1, (ph.t - stagger * 0.5) / (1 - stagger * 0.5)));
                amount = easeInCubic(t);
                alpha = (1 - amount) * 0.95;
                rot = amount * (seed(i, 31.4) - 0.5) * 0.6;
              }
              return { dx: offX * amount, dy: offY * amount, alpha, rot };
            };
          } else if (holdSentenceStyle === "cascade") {
            // 위에서 하나씩 떨어져 자리에 안착 (왼쪽부터)
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const myT = total > 0 ? i / total : 0;
              let dy = 0, alpha = 0;
              if (ph.stage === "appear") {
                const localT = (ph.t - myT * 0.6) / (1 - myT * 0.6);
                const t = Math.max(0, Math.min(1, localT));
                const eu = easeOutCubic(t);
                dy = -50 * (1 - eu) + 5 * Math.sin(t * Math.PI) * 2;  // 위에서 떨어지며 살짝 바운스
                alpha = eu;
              } else if (ph.stage === "hold") {
                dy = Math.sin(sec * 0.9 + i * 0.18) * 0.8;
                alpha = 0.88 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.10;
              } else {
                // 다시 떨어져 사라짐 (아래로)
                const eu = easeInCubic(ph.t);
                dy = 30 * eu;
                alpha = 1 - eu;
              }
              return { dy, alpha };
            };
          } else if (holdSentenceStyle === "swirl") {
            // 회전하며 안쪽으로 빨려들어와 모임
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const startAngle = seed(i, 23.7) * Math.PI * 2;
              const stagger = seed(i, 91.3) * 0.3;
              let amount, rot, alpha;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeOutCubic(t);
                amount = 1 - eu;  // 1=멀리 / 0=모임
                rot = (1 - eu) * Math.PI * 2 * (seed(i, 11.1) > 0.5 ? 1 : -1);  // 한 바퀴 회전
                alpha = eu * 0.95;
              } else if (ph.stage === "hold") {
                amount = 0;
                rot = Math.sin(sec * 0.7 + i * 0.2) * 0.02;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.12;
              } else {
                const t = ph.t;
                const eu = easeInCubic(t);
                amount = eu;
                rot = eu * Math.PI * 1.5 * (seed(i, 11.1) > 0.5 ? 1 : -1);
                alpha = (1 - eu) * 0.95;
              }
              const dist = amount * 60;
              return {
                dx: Math.cos(startAngle + rot) * dist,
                dy: Math.sin(startAngle + rot) * dist,
                rot: rot * 0.3,
                alpha,
              };
            };
          } else if (holdSentenceStyle === "materialize") {
            // 안개에서 흐릿하게 응결되며 또렷해짐
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              let condense;
              if (ph.stage === "appear") {
                condense = 1 - Math.pow(1 - ph.t, 2.5);
              } else if (ph.stage === "hold") {
                condense = 1;
              } else {
                condense = 1 - Math.pow(ph.t, 2);
              }
              const jitterAmt = (1 - condense) * 8;
              const dx = Math.sin(sec * 1.5 + seed(i, 31.9) * 10) * jitterAmt;
              const dy = Math.cos(sec * 1.3 + seed(i, 67.3) * 10) * jitterAmt;
              const alpha = condense * (0.78 + Math.sin(sec * 0.7 + i * 0.2 + b.phase) * 0.16);
              const rot = (1 - condense) * Math.sin(sec * 1.2 + i * 0.3) * 0.06;
              return { dx, dy, alpha, rot };
            };
          } else if (holdSentenceStyle === "flicker") {
            // 점멸 (불꽃놀이): 글자들이 무작위로 켜졌다 꺼짐, 다 켜지면 호흡
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              let visible;
              if (ph.stage === "appear") {
                // 글자별 켜지는 시점이 무작위
                const myFlickerStart = seed(i, 47.3) * 0.85;
                if (ph.t < myFlickerStart) {
                  // 아직 안 켜짐 — 빠른 깜빡임
                  visible = Math.sin(sec * 8 + i * 5) > 0.7 ? 0.4 : 0;
                } else {
                  const local = (ph.t - myFlickerStart) / (1 - myFlickerStart);
                  visible = easeOutCubic(local);
                }
              } else if (ph.stage === "hold") {
                // 모두 켜진 상태에서 미세 깜빡임
                visible = 0.85 + Math.sin(sec * (3 + seed(i, 91.7) * 2) + i) * 0.13;
              } else {
                // 무작위로 꺼져나감
                const myFlickerOut = seed(i, 13.1) * 0.6;
                if (ph.t < myFlickerOut) {
                  visible = 0.85 + Math.sin(sec * 5 + i) * 0.13;
                } else {
                  const local = (ph.t - myFlickerOut) / (1 - myFlickerOut);
                  visible = (1 - easeInCubic(local)) * 0.85;
                }
              }
              const alpha = Math.max(0, visible);
              return { alpha };
            };
          } else if (holdSentenceStyle === "slide") {
            // 좌우 양쪽에서 슬라이드되며 가운데로 모임
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              // 글자 인덱스 짝수/홀수 또는 절반 기준으로 좌/우에서 옴
              const fromLeft = (i % 2 === 0);
              const direction = fromLeft ? -1 : 1;
              const stagger = (i / Math.max(1, total - 1)) * 0.3;
              let dx = 0, alpha = 0;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeOutCubic(t);
                dx = direction * (1 - eu) * 80;
                alpha = eu;
              } else if (ph.stage === "hold") {
                dx = Math.sin(sec * 0.9 + i * 0.2) * 0.8 * direction;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
              } else {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeInCubic(t);
                dx = direction * eu * 80;
                alpha = 1 - eu;
              }
              return { dx, alpha };
            };
          } else if (holdSentenceStyle === "tumble") {
            // 회전하며 위에서 굴러떨어져 자리 잡음
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const stagger = (i / Math.max(1, total - 1)) * 0.4;
              const direction = seed(i, 11.1) > 0.5 ? 1 : -1;
              let dy = 0, rot = 0, alpha = 0;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger * 0.5) / (1 - stagger * 0.5)));
                const eu = easeOutCubic(t);
                dy = -60 * (1 - eu);
                rot = (1 - eu) * Math.PI * 1.5 * direction;
                alpha = eu;
              } else if (ph.stage === "hold") {
                dy = Math.sin(sec * 0.8 + i * 0.2) * 0.8;
                rot = Math.sin(sec * 0.7 + i * 0.3) * 0.02;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
              } else {
                const t = ph.t;
                const eu = easeInCubic(t);
                dy = 60 * eu;
                rot = eu * Math.PI * 1.5 * direction;
                alpha = 1 - eu;
              }
              return { dy, rot, alpha };
            };
          } else { // "breathe" 기본 (79용)
            // 흐릿한 안개에서 나타남 → 일제히 호흡 → 다시 안개로
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const center = (total - 1) / 2;
              const distFromCenter = Math.abs(i - center) / Math.max(1, center);
              let intensity, scale, alpha;
              if (ph.stage === "appear") {
                intensity = easeOutCubic(ph.t);
                scale = 0.6 + intensity * 0.4;
                alpha = intensity * 0.92;
              } else if (ph.stage === "hold") {
                const breath = Math.sin(sec * 0.85 + b.phase);
                scale = 1 + breath * 0.10;
                alpha = 0.78 + breath * 0.18;
                intensity = 1;
              } else {
                intensity = 1 - easeInCubic(ph.t);
                scale = 0.6 + intensity * 0.4;
                alpha = intensity * 0.92;
              }
              const blurAmt = (1 - intensity) * 4;
              const dx = Math.sin(sec * 0.7 + i * 0.2) * blurAmt;
              const dy = Math.cos(sec * 0.6 + i * 0.3) * blurAmt + (1 - intensity) * (distFromCenter - 0.5) * 4;
              return { dx, dy, alpha, scale };
            };
          }

          drawWrappedTextPerChar(
            sentTempCtx, b.text, 0, 0,
            MAX_WIDTH, FONT_PX, LINE_HEIGHT, wavePerChar
          );
          sentTempCtx.restore();

          // (c) 임시 캔버스에 reveal 이미지를 source-in으로 합성
          //     → 글자 모양 안에서, reveal 이미지가 있는 픽셀만 남김
          //     → reveal 이미지가 없는 곳(트레일 안 닿은 곳, 흰 배경)은 투명
          //     → 다음 단계 color-burn에서 투명 픽셀은 영향 없음 → 베이스 글자(#776c54) 그대로 유지
          if (canvas && canvas.width > 0) {
            sentTempCtx.save();
            sentTempCtx.setTransform(1, 0, 0, 1, 0, 0);
            sentTempCtx.globalCompositeOperation = "source-in";
            // reveal 캔버스를 sentence 캔버스 픽셀 크기에 맞춰 그림
            sentTempCtx.drawImage(canvas,
              0, 0, canvas.width, canvas.height,
              0, 0, sentTempCanvas.width, sentTempCanvas.height);
            // 수채화 느낌 강화: 같은 이미지를 multiply로 한 번 더 그려 색을 진하게
            // → 이후 color-burn 단계에서 더 풍부한 톤 변화
            sentTempCtx.globalCompositeOperation = "multiply";
            sentTempCtx.drawImage(canvas,
              0, 0, canvas.width, canvas.height,
              0, 0, sentTempCanvas.width, sentTempCanvas.height);
            sentTempCtx.restore();
          }

          // (d) 임시 캔버스 결과(글자모양 안의 reveal 이미지)를 메인에 color-burn 합성
          //     베이스 글자(#776c54)는 메인에 다음 단계에서 깔림
          // → 일러스트의 색상번 효과: 베이스 글자 색에 글자모양 안 이미지가 burn됨
          sentenceCtx.save();
          sentenceCtx.setTransform(1, 0, 0, 1, 0, 0);
          sentenceCtx.globalAlpha = opacity;

          // 1) 베이스 글자 (#776c54) 그리기 — source-over
          sentenceCtx.globalCompositeOperation = "source-over";
          sentenceCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
          sentenceCtx.translate(cx + swayX, cyBase + y);
          sentenceCtx.scale(scale, scale);
          sentenceCtx.fillStyle = INK_COLOR;
          sentenceCtx.font = `${FONT_PX}px Vicentino`;
          sentenceCtx.textBaseline = "middle";
          drawWrappedTextPerChar(
            sentenceCtx, b.text, 0, 0,
            MAX_WIDTH, FONT_PX, LINE_HEIGHT, wavePerChar
          );

          // 2) 그 위에 임시 캔버스(글자모양 안 이미지)를 color-burn으로 덮음
          //    → 픽셀 단위 컬러번 블렌딩 (일러스트와 동일)
          sentenceCtx.setTransform(1, 0, 0, 1, 0, 0);
          sentenceCtx.globalCompositeOperation = "color-burn";
          sentenceCtx.drawImage(sentTempCanvas, 0, 0);
          sentenceCtx.restore();
        }
      }

      function teardownSentenceText() {
        if (sentenceRafId) { cancelAnimationFrame(sentenceRafId); sentenceRafId = 0; }
        if (sentenceRoot && sentenceRoot.parentNode) {
          sentenceRoot.parentNode.removeChild(sentenceRoot);
        }
        sentenceRoot = null;
        sentenceStage = null;
        sentenceCanvas = null;
        sentenceCtx = null;
        sentenceBlocks = [];
        sentenceList = [];
      }

      function stopHold() {
        if (!isHolding) return;
        isHolding = false;

        if (frameLoopTimer) { clearInterval(frameLoopTimer); frameLoopTimer = null; }

        if (holdSentence) {
          teardownSentenceText();
        }

        if (fullText && fullText.trim().length > 0) {
          isVolumeMode = true;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (baseCtx && baseCanvas) {
            baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
          }
          trail.length = 0;
          if (outroMode === "decay") {
            buildDecayText(fullText);
          } else if (outroMode === "ripple") {
            buildRippleText(fullText);
          } else {
            buildVolumeText(fullText);
          }
        }
      }

      function isInside(x, y) {
        if (!interactive && !expandable) return false;
        const r = imgArea.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      }

      let expandImageFile = "";
      let expandText = "";
      function setExpandData(filename, text) {
        expandImageFile = filename || "";
        expandText = text || "";
      }
      function getExpandData() {
        return { filename: expandImageFile, text: expandText };
      }

      const trail = [];
      let prevMX = -9999, prevMY = -9999;

      function pushTrailPoints(fromX, fromY, toX, toY) {
        const dx = toX - fromX, dy = toY - fromY;
        const dist = Math.hypot(dx, dy);
        const steps = Math.max(1, Math.ceil(dist / 6));
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          trail.push({
            x: fromX + dx * t,
            y: fromY + dy * t,
            age: 0,
            maxAge: POINT_LIFE + (Math.random() - 0.5) * 40,
