<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SceneswithoutScenes</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ─────────
       두 가지만 사용:
       - Pica10Pitch: 본문/동적 텍스트 모두
       - AntiquaMixed: HUD / 버튼 / 프린트 UI (A-Z는 Monotype Corsiva, 나머지는 Vivaldi)
       - AGaramondPro: 기존 프린트 버튼 대체용
       - NeutronicHangeulLocal: Adobe Fonts 활성화/설치 폰트 우선 사용
    */
    /*
       Adobe Fonts에서 Web Project를 만들면 아래 형식의 링크를 여기에 추가하면 됨:
       <link rel="stylesheet" href="https://use.typekit.net/xxxxxxx.css">
    */
    @font-face {
      font-family: 'Pica10Pitch';
      src:
        local('Pica 10 Pitch'),
        local('Pica10PitchBT-Roman'),
        url('./assets/Pica%2010%20Pitch%20Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'AntiquaMixed';
      src: url('./assets/monotype-corsiva-italic.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0041-005A;
    }
    @font-face {
      font-family: 'AntiquaMixed';
      src:
        local('Vivaldi'),
        url('./assets/vivaldi.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      unicode-range: U+0000-0040, U+005B-10FFFF;
    }
    @font-face {
      font-family: 'AGaramondPro';
      src: url('./assets/AGaramondPro-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'NeutronicHangeulLocal';
      src:
        local('Neutronic Hangeul Narrow Thin'),
        local('NeutronicHangeul-NarrowThin'),
        local('뉴트로닉한글 Narrow Thin'),
        local('뉴트로닉한글 NarrowThin'),
        local('Neutronic Hangeul'),
        local('뉴트로닉한글');
      font-weight: 100;
      font-style: normal;
      font-display: swap;
    }

    /* ───────── 공통 색상 변수 ───────── */
    :root {
      --ink: #000000;       /* 모든 텍스트 통일 색상 */
      --ink-deep: #000000;
      --ink-hold: #000000;
      --ink-outro: #000000;
      --neutronic-font: 'neutronic-hangeul', 'NeutronicHangeulLocal', 'Neutronic Hangeul', '뉴트로닉한글', sans-serif;
      --pica-line-height: 1.28;
      --antiqua-line-height: 1.2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      cursor: grab;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
      touch-action: none;
    }

    #world {
      position: fixed;
      inset: 0;
      transform-origin: 50% 50%;
      will-change: transform;
      pointer-events: none;
    }
    #reveal-root {
      position: absolute;
      left: 0;
      top: 0;
      width: 12000px;
      height: 7200px;
      pointer-events: none;
    }

    /* ───────── 우상단 캡처 버튼 (텍스트 + 화살표) ───────── */
    #capture-btn {
      position: fixed;
      top: 16px;
      right: 18px;
      background: transparent;
      border: none;
      padding: 4px 2px;
      cursor: pointer;
      z-index: 100;
      font-family: 'AntiquaMixed';
      font-weight: 400;
      font-size: 16px;
      line-height: var(--antiqua-line-height);
      color: var(--ink);
      letter-spacing: 0.005em;
      text-transform: none;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
    #capture-btn .mixed-label {
      display: inline-flex;
      align-items: baseline;
      letter-spacing: 0.012em;
      line-height: 1;
    }
    #capture-btn .mixed-label .cap {
      font-size: calc(1em + 3pt);
      line-height: 1;
      margin-right: 0.018em;
    }
    #capture-btn .mixed-label .lower {
      line-height: 1;
    }
    #capture-btn .mixed-label .word-space {
      width: 0.36em;
      flex: 0 0 0.36em;
    }
    #capture-btn .arrow {
      display: inline-block;
      font-size: 0.92em;
      transform: translateY(3px);
    }
    #capture-btn:hover { opacity: 0.7; }
    #capture-btn:active { transform: scale(0.97); }
    #capture-btn.is-busy { opacity: 0.4; pointer-events: none; }

    #print-panel {
      position: absolute;
      left: 6000px;
      top: 6500px;
      width: min(760px, calc(100vw - 120px));
      aspect-ratio: 16 / 9;
      height: auto;
      z-index: 50;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.96);
      background-image: url('./assets/printingbutton.png');
      background-repeat: no-repeat;
      background-position: 33.4% 28.7%;
      background-size: 176.5% 174.2%;
      opacity: 0;
      filter: blur(18px);
      transition: opacity 0.42s ease, filter 0.42s ease, transform 0.42s ease;
    }
    #print-panel.is-peeking {
      opacity: 0.28;
      filter: blur(10px);
    }
    #print-panel.is-discovered {
      opacity: 1;
      filter: blur(0);
      transform: translate(-50%, -50%) scale(1);
    }

    #print-btn {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      pointer-events: none;
      font-family: 'AGaramondPro', Garamond, serif;
      font-weight: 400;
      font-size: 0;
      line-height: 1.2;
      color: transparent;
      letter-spacing: 0;
      text-transform: none;
      white-space: nowrap;
      display: block;
      opacity: 1;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.18s ease;
    }
    #print-panel.is-discovered #print-btn {
      pointer-events: auto;
    }
    #print-btn::before {
      content: "Print";
      position: absolute;
      left: 47.6%;
      top: 51.6%;
      font-family: 'AGaramondPro', Garamond, serif;
      font-weight: 400;
      font-size: 22px;
      line-height: 1;
      color: var(--ink);
    }
    #print-btn::after {
      content: "↗";
      position: absolute;
      left: calc(47.6% + 60px);
      top: 50.8%;
      font-family: 'AGaramondPro', Garamond, serif;
      font-weight: 400;
      font-size: 21px;
      line-height: 1;
      color: var(--ink);
    }
    #print-btn:active { transform: scale(0.97); }
    #print-btn.is-busy { pointer-events: none; }

    /* ───────── 좌측 하단 HUD ─────────
       HUD만 AntiquaMixed 사용
    */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      display: none;
      z-index: 10;
      pointer-events: none;
      color: var(--ink);
      font-family: 'AntiquaMixed';
      font-weight: 400;
      font-size: 15px;
      line-height: calc(15px * var(--antiqua-line-height));
      white-space: nowrap;
      text-transform: none;
    }
    .hud .row { display: block; }
    .hud .row-position { color: var(--ink-outro); }

    /* ───────── Reveal Image ───────── */
    :root {
      --reveal-image-opacity: 0.2;
      --reveal-image-filter: grayscale(100%);
    }
    .reveal {
      position: fixed;
      z-index: 5;
      pointer-events: none;
    }
    .reveal-img-area {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .reveal-img-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .reveal-base-area canvas,
    .reveal-img-area canvas {
      filter: var(--reveal-image-filter);
    }
    .reveal-text-box {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      background: #ffffff;
      overflow: hidden;
      pointer-events: none;
      transform-origin: top left;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
    }
    .reveal-text-content {
      padding: 14px 16px;
      font-family: 'Pica10Pitch';
      font-size: 14px;
      line-height: var(--pica-line-height);
      color: var(--ink);
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .reveal-text-content .caret {
      display: inline-block;
      width: 0.5em;
      height: 1em;
      margin-left: 1px;
      background: var(--ink);
      vertical-align: -0.12em;
      animation: reveal-caret-blink 0.9s steps(2) infinite;
    }
    @keyframes reveal-caret-blink {
      to { opacity: 0; }
    }
    .reveal-img-source {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ───────── 부피 텍스트 클라우드 ───────── */
    .text-volume {
      position: absolute;
      pointer-events: none;
      z-index: 4;
      perspective: 900px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-volume-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .text-volume-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Pica10Pitch';
      font-size: 14px;
      line-height: 1;
      color: var(--ink-outro);
      white-space: pre;
      transform-origin: 0 0;
      will-change: transform, opacity;
    }

    /* ───────── 붕괴(decay) 텍스트 모션 ───────── */
    .text-decay {
      position: absolute;
      pointer-events: none;
      z-index: 4;
      perspective: 550px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-decay-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }
    .text-decay-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Pica10Pitch';
      font-size: 14px;
      line-height: 1;
      color: var(--ink-outro);
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── Ripple(파동) 텍스트 모션 ───────── */
    .text-ripple {
      position: absolute;
      pointer-events: none;
      z-index: 4;
      will-change: transform;
    }
    .text-ripple-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      will-change: transform;
    }
    .text-ripple-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Pica10Pitch';
      font-size: 14px;
      line-height: 1;
      color: var(--ink-outro);
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── 문장 단위 호흡 텍스트 (hold 중에만 표시) ───────── */
    .text-sentence {
      position: absolute;
      pointer-events: none;
      z-index: 10;          /* reveal-text-box(1)와 reveal-img-area(2)보다 위 */
      will-change: transform;
    }
    /* 유화 번짐 효과는 sentence 캔버스 안에서 JS로 합성됨 (mix-blend-mode 미사용) */

    /* ───────── 확장 패널 ───────── */
    .expanded-panel {
      position: fixed;
      z-index: 50;
      pointer-events: auto;
      max-width: 90vw;
      max-height: 90vh;
      cursor: grab;
      opacity: 0;
      transform: scale(0.94);
      transition:
        opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .expanded-panel.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .expanded-panel.is-dragging { cursor: grabbing; }

    .expanded-panel-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
      filter: var(--reveal-image-filter);
      opacity: var(--reveal-image-opacity);
    }

    .expanded-panel-spotlight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: lighten;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-image: radial-gradient(circle 280px at 50% 50%,
        rgba(255,255,255,0.85) 0%,
        rgba(255,255,255,0.55) 25%,
        rgba(255,255,255,0.25) 55%,
        rgba(255,255,255,0.05) 80%,
        rgba(255,255,255,0)    100%);
    }

    .expanded-panel-text-wrap {
      position: absolute;
      left: 12%;
      top:  14%;
      width: 76%;
      height: 72%;
      overflow-y: auto;
      overflow-x: hidden;
      cursor: text;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .expanded-panel-text-wrap::-webkit-scrollbar { display: none; }

    .expanded-panel-text {
      padding: 12px 18px 50px 18px;
      font-family: 'Pica10Pitch';
      font-size: 14px;
      line-height: var(--pica-line-height);
      color: var(--ink-deep);
      white-space: pre-wrap;
      word-break: keep-all;
      mix-blend-mode: multiply;
    }
  </style>
</head>
<body>

  <div id="world">
    <div id="reveal-root"></div>
    <div id="print-panel" aria-label="Print information">
      <button id="print-btn" type="button" aria-label="Print confirmed scenes"></button>
    </div>
  </div>

  <div class="hud" id="hud">
    <span class="row row-position">Position X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <button id="capture-btn" type="button" aria-label="Capture your scene"><span class="label mixed-label"><span class="cap">S</span><span class="lower">cenes</span><span class="word-space"></span><span class="cap">W</span><span class="lower">ithout</span><span class="word-space"></span><span class="cap">S</span><span class="lower">cenes</span></span><span class="arrow">↗</span></button>

  <script>
    /* ─────────────────────────────────────────────
       잉크 색상 상수 (캔버스 캡처용)
       ───────────────────────────────────────────── */
    const INK_COLOR = "#000000";   // 모든 텍스트 통일 색상
    const INK_DEEP  = "#000000";
    const INK_HOLD  = "#000000";
    const INK_OUTRO = "#000000";
    const PICA_LINE_HEIGHT = 1.28;
    const ANTIQUA_LINE_HEIGHT = 1.2;

    /* ─────────────────────────────────────────────
       상태값
       ───────────────────────────────────────────── */
    let distance = 100;
    // 가상공간 시작 위치: (6000, 6500) — 데이터 영역 중앙 아래쪽
    // (이 좌표가 화면 중앙에 오도록 posX/posY 초기화)
    const START_WORLD_X = 6000;
    const START_WORLD_Y = 6500;
    let posX = window.innerWidth / 2 - START_WORLD_X;
    let posY = window.innerHeight / 2 - START_WORLD_Y;

    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    const worldEl = document.getElementById("world");

    function renderHUD() {
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
      const scale = distance / 100;
      worldEl.style.transform =
        `translate(${posX}px, ${posY}px) scale(${scale.toFixed(4)})`;
    }
    renderHUD();

    function screenToWorld(clientX, clientY) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const scale = distance / 100;
      return {
        x: (clientX - cx - posX) / scale + cx,
        y: (clientY - cy - posY) / scale + cy,
      };
    }

    /* ─────────────────────────────────────────────
       1) 마우스 드래그 → Position
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;

    const revealInstances = [];
    let activeHoldInstance = null;

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;

      if (currentPanel) {
        if (e.target.closest && e.target.closest(".expanded-panel")) return;
        closeExpandedPanel();
      }

      for (const inst of revealInstances) {
        if (inst.isInside(e.clientX, e.clientY)) {
          if (inst.expandable) {
            const data = inst.getExpandData();
            showExpandedPanel(data.filename, data.text, e.clientX, e.clientY);
            return;
          }
          // 사진이 충분히 드러난 상태일 때만 hold 시작 가능
          // 안 드러난 상태면 일반 드래그(panning)로 fall through
          if (inst.isRevealed && inst.isRevealed()) {
            activeHoldInstance = inst;
            inst.startHold();
            return;
          }
          // 사진이 아직 안 드러난 → hold 안 하고 panning으로 fall through
          break;
        }
      }

      isDragging = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (activeHoldInstance) {
        activeHoldInstance.stopHold();
        activeHoldInstance = null;
      }

      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    window.addEventListener("blur", () => {
      if (activeHoldInstance) {
        activeHoldInstance.stopHold();
        activeHoldInstance = null;
      }
    });

    /* ─────────────────────────────────────────────
       2) wheel 이벤트 분기
       ───────────────────────────────────────────── */
    function applyZoomAt(clientX, clientY, factor) {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const oldScale = distance / 100;
      const newDistance = Math.max(5, distance * factor);
      const newScale = newDistance / 100;
      const worldX = (clientX - cx - posX) / oldScale + cx;
      const worldY = (clientY - cy - posY) / oldScale + cy;
      posX = clientX - cx - (worldX - cx) * newScale;
      posY = clientY - cy - (worldY - cy) * newScale;
      distance = newDistance;
    }

    window.addEventListener("wheel", (e) => {
      e.preventDefault();

      // 줌 비활성화: 트랙패드 두 손가락 패닝만 허용, 마우스 휠/핀치 줌은 무시
      const isTrackpadPan =
        Math.abs(e.deltaX) > 0 ||
        (e.deltaMode === 0 && Math.abs(e.deltaY) < 50 && !e.ctrlKey);

      if (isTrackpadPan) {
        posX -= e.deltaX;
        posY -= e.deltaY;
        renderHUD();
      }
      // ctrl+wheel(핀치 줌) 및 마우스 휠 줌은 모두 무시
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치
       ───────────────────────────────────────────── */
    let touchMode = null;
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
      // 핀치 줌 비활성화 — 두 손가락 터치는 무시
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      }
      // 핀치 줌 비활성화
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    window.addEventListener("contextmenu", (e) => e.preventDefault());

    /* ─────────────────────────────────────────────
       5) Google Sheet 연동
       ───────────────────────────────────────────── */
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1pintIO8VNpryzS56eqXaNjqzx5f3EeAV/gviz/tq?tqx=out:csv&gid=0";

    const SHEET_TARGET_ROW = 80;
    const SHEET_TARGET_COL_NAME = "기억 주제";

    const IMAGE_BASE_PATH = "./assets/";
    const REVEAL_IMAGE_OPACITY = 0.2;
    const REVEAL_IMAGE_FILTER = "grayscale(100%)";
    const MIXED_TEXT_FONT_PX = 16;
    const MIXED_TEXT_CAP_EXTRA_PX = 4;
    const MIXED_TEXT_CAP_GAP_EM = 0.018;
    const MIXED_TEXT_LETTER_GAP_EM = 0.012;
    const MIXED_TEXT_WORD_SPACE_EM = 0.36;

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') { cell += '"'; i++; }
          else if (ch === '"') { inQuotes = false; }
          else { cell += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ",") { row.push(cell); cell = ""; }
          else if (ch === "\n") { row.push(cell); cell = ""; rows.push(row); row = []; }
          else if (ch === "\r") { /* 무시 */ }
          else { cell += ch; }
        }
      }
      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function pickRowFromSheet(rows, targetRow) {
      if (!rows || rows.length === 0) return null;
      const header = rows[0];
      const dataRow = rows[targetRow - 1];
      if (!dataRow) {
        console.warn(`[sheet] ${targetRow}행이 비어 있습니다.`);
        return null;
      }
      const obj = {};
      for (let i = 0; i < header.length; i++) {
        const key = (header[i] || "").trim();
        if (!key) continue;
        obj[key] = (dataRow[i] || "").trim();
      }
      return obj;
    }

    /* ─────────────────────────────────────────────
       Reveal 인스턴스 시스템
       ───────────────────────────────────────────── */

    const REVEAL_SIZE = 350;

    const FRAME_COUNT = 8;
    const FRAME_INTERVAL_MS = 280;
    const TYPE_INTERVAL_MS  = 50;
    const TEXT_BOX_W = 280;
    const TEXT_BOX_H = 200;
    const REVEAL_INFLUENCE = 90;
    const POINT_LIFE = 75;
    const POINT_RADIUS = 75;

    const HOLD_PULSE_PERIOD_MS = 700;
    const HOLD_LOWRES_PERIOD_MS = 1400;
    const HOLD_LOWRES_MIN_PX = 6;
    const HOLD_LOWRES_MAX_PX = 90;

    let mouseX = -9999, mouseY = -9999;

    /* ─────────────────────────────────────────────
       텍스트 궤적 시스템 (캡처용)
       ───────────────────────────────────────────── */
    const pathPts = [];
    let totalArcLen = 0;
    let lastPathScreenX = -9999, lastPathScreenY = -9999;
    let pendingText = "";

    function addPathPoint(clientX, clientY) {
      let segLen = 0;
      if (lastPathScreenX > -9000) {
        const dx = clientX - lastPathScreenX;
        const dy = clientY - lastPathScreenY;
        segLen = Math.hypot(dx, dy);
        // [FIX ④] 짧은 움직임도 매끈하게 잡히도록 임계값 낮춤 (1.5 → 0.8)
        if (segLen < 0.8) return;
      }
      totalArcLen += segLen;
      const w = screenToWorld(clientX, clientY);
      pathPts.push({ worldX: w.x, worldY: w.y, sScreen: totalArcLen });
      lastPathScreenX = clientX;
      lastPathScreenY = clientY;
    }

    function feedFromInstance(inst) {
      const text = (inst.getText && inst.getText()) || "";
      if (!text) return;
      const norm = text.replace(/\s+/g, " ").trim();
      if (pendingText.length > 0) pendingText += "  ";
      pendingText += norm;
    }

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      addPathPoint(e.clientX, e.clientY);
    });

    function createRevealInstance(config) {
      const { size, sheetRow, root } = config;
      // 위치: leftPx/topPx (px) 우선, 없으면 leftPct/topPct (%) 폴백
      const leftPx = config.leftPx;
      const topPx  = config.topPx;
      const leftPct = config.leftPct;
      const topPct  = config.topPct;
      const usePx = (typeof leftPx === "number" && typeof topPx === "number");
      const interactive = config.interactive !== false;
      const expandable  = config.expandable === true;
      const framesCount = (config.framesCount != null) ? config.framesCount : FRAME_COUNT;
      const holdPulse   = config.holdPulse === true;
      const holdLowRes  = config.holdLowRes === true;
      const holdSentence = config.holdSentence === true;
      // sentence 모션 캐릭터: "wave" (좌→우 시간차), "breath" (가운데→가장자리 호흡), "drift" (글자별 자유 표류)
      const holdSentenceStyle = config.holdSentenceStyle || "wave";
      const baseVignette = config.baseVignette === true;
      const outroMode   = config.outroMode || "volume";

      const wrap = document.createElement("div");
      wrap.className = "reveal";
      if (usePx) {
        wrap.style.left = `${leftPx}px`;
        wrap.style.top  = `${topPx}px`;
      } else {
        wrap.style.left = `${leftPct}%`;
        wrap.style.top  = `${topPct}%`;
      }
      wrap.style.width  = `${size}px`;
      wrap.style.height = `${size}px`;

      const textBox = document.createElement("div");
      textBox.className = "reveal-text-box";
      textBox.style.zIndex = "1";
      const textInner = document.createElement("div");
      textInner.className = "reveal-text-content";
      textBox.appendChild(textInner);

      const imgArea = document.createElement("div");
      imgArea.className = "reveal-img-area";
      imgArea.style.zIndex = "2";
      const canvas = document.createElement("canvas");
      imgArea.appendChild(canvas);

      const baseScale = (typeof config.baseScale === "number" && config.baseScale > 0)
        ? config.baseScale : 1;
      const baseSize = Math.round(size * baseScale);
      let baseCanvas = null;
      let baseCtx = null;
      let baseArea = null;
      if (baseScale !== 1) {
        baseArea = document.createElement("div");
        baseArea.className = "reveal-base-area";
        baseArea.style.position = "absolute";
        baseArea.style.left = `${(size - baseSize) / 2}px`;
        baseArea.style.top  = `${(size - baseSize) / 2}px`;
        baseArea.style.width  = `${baseSize}px`;
        baseArea.style.height = `${baseSize}px`;
        baseArea.style.pointerEvents = "none";
        baseArea.style.zIndex = "1";
        baseCanvas = document.createElement("canvas");
        baseCanvas.style.position = "absolute";
        baseCanvas.style.inset = "0";
        baseCanvas.style.width  = "100%";
        baseCanvas.style.height = "100%";
        baseArea.appendChild(baseCanvas);
        baseCtx = baseCanvas.getContext("2d");
      }

      wrap.appendChild(textBox);
      if (baseArea) wrap.appendChild(baseArea);
      wrap.appendChild(imgArea);
      wrap.style.overflow = "visible";
      root.appendChild(wrap);

      const ctx = canvas.getContext("2d");

      let overlayImg = null;
      const overlayFilename = config.overlayFilename || null;
      if (overlayFilename) {
        const oi = new Image();
        try { oi.crossOrigin = "anonymous"; } catch(e) {}
        oi.onerror = () => { oi._broken = true; };
        oi.src = IMAGE_BASE_PATH + overlayFilename;
        overlayImg = oi;
      }

      let maskCanvas = null;
      let maskCtx = null;
      let compCanvas = null;
      let compCtx = null;

      // 이미지의 실제 픽셀 해상도를 캔버스에 그대로 사용 → 화질 보존
      // (단, 너무 큰 이미지는 성능 보호를 위해 상한선 적용)
      let nativeImgW = 0;
      let nativeImgH = 0;
      const NATIVE_MAX = 1024; // 캔버스 픽셀 최대 크기 (성능 보호)

      function resolveCanvasPixelSize() {
        const dpr = window.devicePixelRatio || 1;
        if (nativeImgW <= 0 || nativeImgH <= 0) {
          return { w: Math.round(size * dpr), h: Math.round(size * dpr) };
        }
        // 자연 해상도 사용. 단 너무 크면 비율 유지하면서 NATIVE_MAX로 다운
        const longEdge = Math.max(nativeImgW, nativeImgH);
        if (longEdge <= NATIVE_MAX) {
          return { w: nativeImgW, h: nativeImgH };
        }
        const k = NATIVE_MAX / longEdge;
        return { w: Math.round(nativeImgW * k), h: Math.round(nativeImgH * k) };
      }

      function resizeCanvas() {
        const px = resolveCanvasPixelSize();
        canvas.width  = px.w;
        canvas.height = px.h;
        // 그리기 좌표계는 size 기준 (스타일 크기)으로 매핑
        ctx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        if (baseCanvas && baseCtx) {
          // base 영역은 size 대비 baseSize 비율로 동일 픽셀 밀도 적용
          const baseTW = Math.round(px.w * (baseSize / size));
          const baseTH = Math.round(px.h * (baseSize / size));
          baseCanvas.width  = baseTW;
          baseCanvas.height = baseTH;
          baseCtx.setTransform(baseTW / baseSize, 0, 0, baseTH / baseSize, 0, 0);
          baseCtx.imageSmoothingEnabled = true;
          baseCtx.imageSmoothingQuality = "high";
        }
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const frames = [];
      let currentFrame = 0;
      let frameLoopTimer = null;

      function loadFrameSeries(baseFilename) {
        const dot = baseFilename.lastIndexOf(".");
        const name = dot === -1 ? baseFilename : baseFilename.slice(0, dot);
        const ext  = dot === -1 ? ""           : baseFilename.slice(dot);
        frames.length = 0;
        for (let i = 0; i < framesCount; i++) {
          const fname = (i === 0) ? `${name}${ext}` : `${name}-${i}${ext}`;
          const img = new Image();
          try { img.crossOrigin = "anonymous"; } catch(e) {}
          img.onerror = () => { img._broken = true; };
          // 첫 프레임 로드되면 자연 해상도 기준으로 캔버스 리사이즈
          img.onload = (function(idx, im) {
            return function() {
              if (idx === 0 && im.naturalWidth > 0) {
                nativeImgW = im.naturalWidth;
                nativeImgH = im.naturalHeight;
                resizeCanvas();
              }
            };
          })(i, img);
          img.src = IMAGE_BASE_PATH + fname;
          frames.push(img);
        }
        currentFrame = 0;
        console.info(`[reveal] frames for "${baseFilename}":`,
                     frames.map(im => im.src));
      }

      function nextValidFrame(from) {
        const n = frames.length;
        if (n === 0) return -1;
        for (let i = 1; i <= n; i++) {
          const idx = (from + i) % n;
          const im = frames[idx];
          if (!im._broken && im.complete && im.naturalWidth > 0) return idx;
          if (!im._broken && !im.complete) return idx;
        }
        const base = frames[0];
        if (base && !base._broken) return 0;
        return -1;
      }

      let fullText = "";
      let typedLen = 0;
      let typeTimer = null;

      function setText(text) {
        fullText = text || "";
        typedLen = 0;
        renderTypedText();
      }
      function renderTypedText() {
        const visible = fullText.slice(0, typedLen);
        textInner.textContent = visible;
        if (typedLen < fullText.length || isHolding) {
          const caret = document.createElement("span");
          caret.className = "caret";
          textInner.appendChild(caret);
        }
      }
      function startTyping() {
        if (typeTimer) return;
        typeTimer = setInterval(() => {
          if (typedLen < fullText.length) {
            typedLen++;
            renderTypedText();
          }
        }, TYPE_INTERVAL_MS);
      }
      function stopTyping() {
        if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
      }

      let isHolding = false;
      let isVolumeMode = false;
      let holdStartTime = 0;
      let lastHoldMotionImage = "";
      let lastAfterMotionImage = "";

      function renderCanvasContainSnapshot(srcCanvas) {
        if (!srcCanvas || srcCanvas.width <= 0 || srcCanvas.height <= 0) return "";
        const out = document.createElement("canvas");
        out.width = PRINT_TYPE_CANVAS_W;
        out.height = PRINT_TYPE_CANVAS_H;
        const oc = out.getContext("2d");
        oc.clearRect(0, 0, out.width, out.height);
        const scale = Math.min(out.width / srcCanvas.width, out.height / srcCanvas.height);
        const dw = srcCanvas.width * scale;
        const dh = srcCanvas.height * scale;
        oc.drawImage(srcCanvas, (out.width - dw) / 2, (out.height - dh) / 2, dw, dh);
        return out.toDataURL("image/png");
      }

      function parseGlyphTransform(transformText) {
        const transform = String(transformText || "");
        const translate = transform.match(/translate\(([-0-9.]+)px,\s*([-0-9.]+)px\)/);
        const rotate = transform.match(/rotate\(([-0-9.]+)rad\)/);
        const scaleMatch = transform.match(/scale\(([-0-9.]+)\)/);
        return {
          x: translate ? parseFloat(translate[1]) : 0,
          y: translate ? parseFloat(translate[2]) : 0,
          rot: rotate ? parseFloat(rotate[1]) : 0,
          scale: scaleMatch ? parseFloat(scaleMatch[1]) : 1,
        };
      }

      function renderGlyphSnapshot(glyphs) {
        if (!glyphs || glyphs.length === 0) return "";
        const parsed = [];
        for (const g of glyphs) {
          if (!g || !g.el) continue;
          const t = parseGlyphTransform(g.el.style.transform);
          const opacity = parseFloat(g.el.style.opacity || "1");
          parsed.push({
            ch: g.el.textContent || "",
            x: t.x,
            y: t.y,
            rot: t.rot,
            scale: t.scale,
            opacity: Number.isFinite(opacity) ? opacity : 1,
          });
        }
        if (!parsed.length) return "";

        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const p of parsed) {
          minX = Math.min(minX, p.x);
          maxX = Math.max(maxX, p.x);
          minY = Math.min(minY, p.y);
          maxY = Math.max(maxY, p.y);
        }

        const out = document.createElement("canvas");
        out.width = PRINT_TYPE_CANVAS_W;
        out.height = PRINT_TYPE_CANVAS_H;
        const oc = out.getContext("2d");
        oc.clearRect(0, 0, out.width, out.height);
        oc.fillStyle = "#000000";
        oc.textAlign = "center";
        oc.textBaseline = "middle";
        oc.font = "30px Pica10Pitch";

        const contentW = Math.max(1, maxX - minX);
        const contentH = Math.max(1, maxY - minY);
        const fit = Math.min((out.width * 0.98) / contentW, (out.height * 0.94) / contentH, 6);
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;

        oc.save();
        oc.translate(out.width / 2, out.height / 2);
        oc.scale(fit, fit);
        oc.translate(-centerX, -centerY);
        for (const p of parsed) {
          if (!p.ch || p.opacity <= 0.01) continue;
          oc.save();
          oc.globalAlpha = Math.max(0, Math.min(1, p.opacity));
          oc.translate(p.x, p.y);
          oc.rotate(p.rot);
          oc.scale(p.scale, p.scale);
          oc.fillText(p.ch, 0, 0);
          oc.restore();
        }
        oc.restore();
        return out.toDataURL("image/png");
      }

      function renderActiveTextMotionSnapshot() {
        if (decayGlyphs && decayGlyphs.length > 0) return renderGlyphSnapshot(decayGlyphs);
        if (volumeGlyphs && volumeGlyphs.length > 0) return renderGlyphSnapshot(volumeGlyphs);
        if (rippleGlyphs && rippleGlyphs.length > 0) return renderGlyphSnapshot(rippleGlyphs);
        return "";
      }

      function startHold() {
        if (!interactive) return;
        if (isHolding) return;
        if (isVolumeMode) return;
        isHolding = true;
        holdStartTime = performance.now();

        // [FIX ②] 영향권 진입 콜백이 어떤 이유로 누락되었더라도,
        // hold 시점엔 반드시 궤적에 등록 (안전망)
        if (typeof onInfluenceEnter === "function") {
          onInfluenceEnter(instance);
        }
        wasInInfluence = true;

        if (!frameLoopTimer && framesCount > 1) {
          const interval = holdPulse ? 90 : FRAME_INTERVAL_MS;
          frameLoopTimer = setInterval(() => {
            if (frames.length > 0) {
              const next = nextValidFrame(currentFrame);
              if (next !== -1) currentFrame = next;
            }
          }, interval);
        }

        if (holdSentence) {
          trail.length = 0;
          prevMX = -9999;
          prevMY = -9999;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          if (baseCtx && baseCanvas) {
            baseCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
          }
          buildSentenceText(fullText);
        }
      }

      let lowResCanvas = null;
      let lowResCtx = null;

      let volumeRoot = null;
      let volumeStage = null;
      let volumeGlyphs = [];
      let volumeStartTime = 0;
      let volumeRafId = 0;
      let volX = 0, volY = 0;

      function buildVolumeText(text) {
        teardownVolumeText();
        if (!text || text.trim().length === 0) return;

        volumeRoot = document.createElement("div");
        volumeRoot.className = "text-volume";
        // wrap과 같은 위치(world 좌표계의 wrap 중심)에 둠
        if (usePx) {
          volumeRoot.style.left = `${leftPx + size / 2}px`;
          volumeRoot.style.top  = `${topPx  + size / 2}px`;
        } else {
          volumeRoot.style.left = `calc(${leftPct}% + ${size / 2}px)`;
          volumeRoot.style.top  = `calc(${topPct}% + ${size / 2}px)`;
        }
        volumeRoot.style.width  = "0px";
        volumeRoot.style.height = "0px";

        volumeStage = document.createElement("div");
        volumeStage.className = "text-volume-stage";
        volumeRoot.appendChild(volumeStage);
        // body가 아닌 reveal-root(=#world의 자식)에 붙임 → multiply가 캔버스와 블렌드됨
        root.appendChild(volumeRoot);

        const measure = document.createElement("span");
        measure.className = "text-volume-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        let runningX = 0;
        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch;
          const w = measure.getBoundingClientRect().width;
          charWidths.push(w);
        }
        document.body.removeChild(measure);
        const totalW = charWidths.reduce((a, b) => a + b, 0);
        const startX = -totalW / 2;

        volumeGlyphs = [];
        let cx = startX;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const el = document.createElement("span");
          el.className = "text-volume-glyph";
          el.textContent = ch;
          volumeStage.appendChild(el);

          const flatX = cx;
          const flatY = 0;
          cx += charWidths[i];

          const u = Math.random();
          const v = Math.random();
          const theta = 2 * Math.PI * u;
          const phi   = Math.acos(2 * v - 1);
          const baseR = 80;
          const radiusMod = 1 + Math.sin(phi - 0.3) * 0.15
                              + Math.cos(theta * 2) * 0.06;
          const R = baseR * radiusMod;
          const sx = R * Math.sin(phi) * Math.cos(theta);
          const sy = R * Math.cos(phi) - 8;
          const sz = R * Math.sin(phi) * Math.sin(theta);

          volumeGlyphs.push({
            el,
            flatX, flatY,
            sphereX: sx, sphereY: sy, sphereZ: sz,
            phase: Math.random() * Math.PI * 2,
            flowSeed: Math.random() * 1000,
          });
        }

        volumeStartTime = performance.now();
        const tickVol = (now) => {
          if (!volumeRoot) return;
          updateVolume(now);
          volumeRafId = requestAnimationFrame(tickVol);
        };
        volumeRafId = requestAnimationFrame(tickVol);
      }

      function updateVolume(now) {
        // alightworld 스타일: 한 줄 문장의 글자들이 본 위치(flatX) 주변에서
        //  - 인트로: 흩어진 위치(sphere)에서 본 위치로 부드럽게 모이며 페이드인
        //  - 그 후 무한 루프:
        //     - 각 낱자가 wave + 미세 회전 + alpha 호흡
        //     - 문장 라인 자체가 sin 곡선으로 살짝 휘어짐 (시간에 따라 변형)
        //     - 문장 전체도 천천히 표류

        const elapsed = (now - volumeStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);

        // 인트로 동안 stage가 살짝 회전했다가 정상 위치로 (alightworld는 정적이지만 부드러운 인트로 효과)
        const introRotY = (1 - introEased) * 6;       // 6deg → 0deg
        const introRotX = Math.sin(introT * Math.PI) * 3;
        volumeStage.style.transform =
          `rotateX(${introRotX.toFixed(2)}deg) rotateY(${introRotY.toFixed(2)}deg)`;

        // 문장 라인이 곡선으로 살짝 휘는 정도 (시간에 따라 변형)
        // → 글자 인덱스에 비례한 sin → 문장 전체가 부드러운 곡선
        const curveAmpY = 6 + Math.sin(elapsed * 0.25) * 3;  // 곡률 진폭 천천히 변동
        const curveFreq = 1.2 + Math.sin(elapsed * 0.18) * 0.3; // 곡선 주기도 변동

        // 문장 전체 표류
        const driftX = Math.sin(elapsed * 0.16) * 4 + Math.sin(elapsed * 0.07) * 2;
        const driftY = Math.cos(elapsed * 0.21) * 3 + Math.sin(elapsed * 0.10) * 1.5;

        const totalGlyphs = volumeGlyphs.length;
        for (let idx = 0; idx < totalGlyphs; idx++) {
          const g = volumeGlyphs[idx];

          // 글자별 위치 비율 (0~1)
          const posRatio = totalGlyphs > 1 ? idx / (totalGlyphs - 1) : 0.5;
          // 곡선 휘어짐: posRatio * 2π * curveFreq → 문장 전체에 sin 곡선
          const curveY = Math.sin(posRatio * Math.PI * 2 * curveFreq + elapsed * 0.4) * curveAmpY;

          // 글자별 phase
          const wavePhase = posRatio * Math.PI * 2;
          const personalPhase = g.phase;

          // 글자별 wave (decay보다 살짝 큰 진폭 — volume은 더 공간적)
          const dy = Math.sin(elapsed * 1.5 - wavePhase * 1.2 + personalPhase) * 2.0
                   + Math.sin(elapsed * 0.55 + personalPhase * 1.8) * 1.0;
          const dx = Math.cos(elapsed * 0.95 - wavePhase * 0.7 + personalPhase) * 1.4
                   + Math.sin(elapsed * 0.4 + personalPhase) * 0.7;

          // 글자별 미세 회전
          const rot = Math.sin(elapsed * 0.8 - wavePhase * 0.5 + personalPhase) * 0.03;

          // alpha 호흡
          const alphaBreath = 0.80 + Math.sin(elapsed * 0.95 - wavePhase * 0.6 + personalPhase * 1.4) * 0.20;
          const opacity = introEased * alphaBreath;

          // 이 때 sphere 위치를 너무 강하게 안 쓰고 30% 정도만 (alightworld는 미묘하게)
          const arrivalDelay = (g.flowSeed % 1) * 0.4;
          const arrival = Math.max(0, Math.min(1,
            (introT - arrivalDelay) / Math.max(0.01, 1 - arrivalDelay)
          ));
          const arrivalEased = 1 - Math.pow(1 - arrival, 3);
          const startOffsetX = (g.sphereX * 0.3) * (1 - arrivalEased);
          const startOffsetY = (g.sphereY * 0.3) * (1 - arrivalEased);

          // 최종 위치
          const x = g.flatX + dx + driftX + startOffsetX;
          const y = g.flatY + dy + curveY + driftY + startOffsetY;

          // 미세 스케일 호흡
          const scale = 0.96 + Math.sin(elapsed * 0.65 + personalPhase) * 0.035;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }

          const sy = -(13 * Math.cos(a)
                      - 5  * Math.cos(2 * a)
                      - 2  * Math.cos(3 * a)

          const x = sx * baseScale;
          const y = sy * baseScale - 5;
          const z = (Math.random() - 0.5) * 10;
          points.push({ x, y, z });
        }

        let placed = 0;
        let safety = 0;
        while (placed < fillCount && safety < fillCount * 30) {
          safety++;
          const rx = (Math.random() - 0.5) * 2;
          const ry = (Math.random() - 0.5) * 2;
          const X = rx;
          const Y = -ry;
          const lhs = Math.pow(X * X + Y * Y - 1, 3) - X * X * Y * Y * Y;
          if (lhs <= 0) {
            const x = rx * 65;
            const y = ry * 60 - 5;
            const z = (Math.random() - 0.5) * 14;
            points.push({ x, y, z });
            placed++;
          }
        }
        while (placed < fillCount) {
          const a = Math.random() * Math.PI * 2;
          const sx = 16 * Math.pow(Math.sin(a), 3);
          const sy = -(13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a));

          const flockY = g.baseY
            + Math.cos(elapsed * 0.35 + g.flockSeedB) * 40
            + Math.sin(elapsed * 0.31 + g.flockSeedB * 1.2) * 25;

          // 원형: glyph index 따라 둥글게 분포, 시간에 따라 천천히 회전
          const rotateAngle = elapsed * 0.25;  // 천천히 회전
          const circleA = g.circleAngle + rotateAngle;
          const circleX = Math.cos(circleA) * 95;
          const circleY = Math.sin(circleA) * 95 * 0.65;

          // wave: 가로로 늘어선 글자들이 sin 파도에 따라 위아래
          const waveAmp = 28 + Math.sin(elapsed * 0.4) * 6;
          const waveX = g.waveX;
          const waveY = Math.sin(g.waveT * Math.PI * 4 - elapsed * 1.5) * waveAmp;

          if (cycleT < P0_END) {
            // 페이즈 0: 본 문장
            targetX = sentX; targetY = sentY;
            phaseProgress = cycleT / P0_END;
          } else if (cycleT < P1_END) {
            // 페이즈 1: 자유 군집 (sentence → flock 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P0_END) / (P1_END - P0_END) - stagger));
            const eu = easeInOut(u);
            targetX = sentX * (1 - eu) + flockX * eu;
            targetY = sentY * (1 - eu) + flockY * eu;
            phaseProgress = u;
          } else if (cycleT < P2_END) {
            // 페이즈 2: 원형 (flock → circle 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P1_END) / (P2_END - P1_END) - stagger));
            const eu = easeInOut(u);
            targetX = flockX * (1 - eu) + circleX * eu;
            targetY = flockY * (1 - eu) + circleY * eu;
            phaseProgress = u;
          } else if (cycleT < P3_END) {
            // 페이즈 3: 자유 군집2 (circle → flock 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P2_END) / (P3_END - P2_END) - stagger));
            const eu = easeInOut(u);
            targetX = circleX * (1 - eu) + flockX * eu;
            targetY = circleY * (1 - eu) + flockY * eu;
            phaseProgress = u;
          } else if (cycleT < P4_END) {
            // 페이즈 4: wave (flock → wave 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P3_END) / (P4_END - P3_END) - stagger));
            const eu = easeInOut(u);
            targetX = flockX * (1 - eu) + waveX * eu;
            targetY = flockY * (1 - eu) + waveY * eu;
            phaseProgress = u;
          } else {
            // 페이즈 5: 다시 본 문장으로 복귀 (wave → sentence 보간)
            const u = Math.max(0, Math.min(1, (cycleT - P4_END) / (1 - P4_END) - stagger));
            const eu = easeInOut(u);
            targetX = waveX * (1 - eu) + sentX * eu;
            targetY = waveY * (1 - eu) + sentY * eu;
            phaseProgress = u;
          }

          // ─── 2. 미세 wave / 회전 / alpha 호흡 (alightworld 호흡감) ───
          const microDy = Math.sin(elapsed * 1.4 - wavePhase * 1.1 + personalPhase) * 1.6
                        + Math.sin(elapsed * 0.6 + personalPhase * 1.7) * 0.8;
          const microDx = Math.cos(elapsed * 1.0 - wavePhase * 0.8 + personalPhase) * 1.0
                        + Math.sin(elapsed * 0.45 + personalPhase) * 0.5;
          const rot = Math.sin(elapsed * 0.85 - wavePhase * 0.6 + personalPhase) * 0.03;

          const alphaBreath = 0.82 + Math.sin(elapsed * 0.9 - wavePhase * 0.7 + personalPhase * 1.3) * 0.18;
          const opacity = introEased * alphaBreath;

          // 인트로 페이드인용 시작 흩어짐 (첫 사이클에만)
          let startOffsetX = 0, startOffsetY = 0;
          if (cycleNum === 0 && introT < 1) {
            const arrival = Math.max(0, Math.min(1,
              (introT - g.arrivalDelay * 0.4) / (1 - g.arrivalDelay * 0.4)
            ));
            const arrivalEased = 1 - Math.pow(1 - arrival, 3);
            startOffsetX = (g.scatterX * 0.3) * (1 - arrivalEased);
            startOffsetY = (g.scatterY * 0.3) * (1 - arrivalEased);
          }

          // ─── 3. 최종 위치 = 형상 좌표 + 미세 wave + 표류 + 인트로 오프셋 ───
          const x = targetX + microDx + driftX + startOffsetX;
          const y = targetY + microDy + driftY + startOffsetY;

          // 미세 스케일 호흡
          const scale = 0.97 + Math.sin(elapsed * 0.7 + personalPhase) * 0.025;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      // ──────────────────────────────────────────────────────────
      // 4가지 새 outro 모션 (build는 buildDecayText 재사용, update만 다름)
      // 모두 무한 루프, 글리프 단위로 형상 ↔ 본 문장 사이를 순환
      // ──────────────────────────────────────────────────────────

      // 공통 헬퍼: easeInOut
      function easeInOut(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      // ── 1) coordinates: 별자리/좌표계 ──
      // 문장 → 별자리(starX/Y에 흩어짐) → 문장 → 다른 별자리 (반복)
      // 글자가 X/Y 점처럼 이동, 사이를 가는 동안 미세한 정지/지터
      function updateCoordinates(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const CYCLE = 16.0;
        const cycleT = (elapsed % CYCLE) / CYCLE;
        const cycleNum = Math.floor(elapsed / CYCLE);

        // 페이즈: 0~25% 본 문장, 25~50% 별자리로 이동, 50~75% 본 문장, 75~100% 다른 별자리
        const P_SENT1 = 0.18;
        const P_STAR1 = 0.42;
        const P_SENT2 = 0.60;

        // 사이클마다 별자리가 살짝 회전 (다른 별자리)
        const constellationRot = cycleNum * 0.3;
        const cosR = Math.cos(constellationRot), sinR = Math.sin(constellationRot);

        // 문장 자체는 정적 (별자리가 이동의 메인)
        const totalG = decayGlyphs.length;
        for (let i = 0; i < totalG; i++) {
          const g = decayGlyphs[i];
          const personalPhase = g.phase;

          // 별자리 좌표 (회전 적용)
          const starRotX = g.starX * cosR - g.starY * sinR;
          const starRotY = g.starX * sinR + g.starY * cosR;

          let targetX, targetY, isStar;
          const stagger = (i / Math.max(1, totalG - 1)) * 0.2;

          if (cycleT < P_SENT1) {
            targetX = g.baseX; targetY = g.baseY; isStar = false;
          } else if (cycleT < P_STAR1) {
            const u = Math.max(0, Math.min(1, (cycleT - P_SENT1) / (P_STAR1 - P_SENT1) - stagger));
            const eu = easeInOut(u);
            targetX = g.baseX * (1 - eu) + starRotX * eu;
            targetY = g.baseY * (1 - eu) + starRotY * eu;
            isStar = u > 0.5;
          } else if (cycleT < P_SENT2) {
            const u = Math.max(0, Math.min(1, (cycleT - P_STAR1) / (P_SENT2 - P_STAR1) - stagger));
            const eu = easeInOut(u);
            targetX = starRotX * (1 - eu) + g.baseX * eu;
            targetY = starRotY * (1 - eu) + g.baseY * eu;
            isStar = u < 0.5;
          } else {
            const u = Math.max(0, Math.min(1, (cycleT - P_SENT2) / (1 - P_SENT2) - stagger));
            const eu = easeInOut(u);
            targetX = g.baseX * (1 - eu) + starRotX * eu;
            targetY = g.baseY * (1 - eu) + starRotY * eu;
            isStar = u > 0.5;
          }

          // 별자리 상태에서는 미세 trembling (별이 깜빡이는 듯), 문장 상태에서는 잔잔한 호흡
          const microDx = isStar
            ? Math.sin(elapsed * 2.4 + personalPhase * 3) * 0.6
            : Math.cos(elapsed * 0.9 + personalPhase) * 0.8;
          const microDy = isStar
            ? Math.cos(elapsed * 2.6 + personalPhase * 2.5) * 0.6
            : Math.sin(elapsed * 1.1 + personalPhase) * 1.2;

          // 별자리에서 alpha가 더 강하게 깜빡임
          const alphaBreath = isStar
            ? 0.65 + Math.sin(elapsed * 1.8 + personalPhase * 2) * 0.30
            : 0.85 + Math.sin(elapsed * 0.9 + personalPhase) * 0.13;
          const opacity = introEased * alphaBreath;

          // 인트로 첫 사이클
          let startOffsetX = 0, startOffsetY = 0;
          if (cycleNum === 0 && introT < 1) {
            const arrival = Math.max(0, Math.min(1,
              (introT - g.arrivalDelay * 0.4) / (1 - g.arrivalDelay * 0.4)
            ));
            const arrivalEased = 1 - Math.pow(1 - arrival, 3);
            startOffsetX = (g.scatterX * 0.3) * (1 - arrivalEased);
            startOffsetY = (g.scatterY * 0.3) * (1 - arrivalEased);
          }

          const x = targetX + microDx + startOffsetX;
          const y = targetY + microDy + startOffsetY;
          const scale = 0.97 + Math.sin(elapsed * 0.7 + personalPhase) * 0.02;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      // ── 2) outline: 사과 윤곽 ──
      // 문장 → 사과 윤곽 (글자들이 윤곽선에 늘어섬, 안은 빔) → 문장 (반복)
      // 윤곽 상태에서 천천히 회전
      function updateOutline(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const CYCLE = 14.0;
        const cycleT = (elapsed % CYCLE) / CYCLE;

        const P_SENT = 0.20;
        const P_TO_OUTLINE = 0.40;
        const P_OUTLINE = 0.75;
        // 0.75~1.0: 다시 문장으로

        // 윤곽 상태에서 글자들이 천천히 회전 (외곽선이 도는 느낌)
        const outlineRot = elapsed * 0.15;

        const totalG = decayGlyphs.length;
        for (let i = 0; i < totalG; i++) {
          const g = decayGlyphs[i];
          const personalPhase = g.phase;
          const stagger = (i / Math.max(1, totalG - 1)) * 0.25;

          // 윤곽 좌표 (회전)
          const angle = g.outlineAngle + outlineRot;
          const oRadius = Math.hypot(g.outlineX, g.outlineY);
          const outX = Math.sin(angle) * oRadius;
          // 사과 모양 유지 (위쪽 살짝 들어감)
          const outY = (-Math.cos(angle) - 0.15 * Math.sin(angle * 2)) * oRadius * 0.95
                       / Math.max(0.7, Math.hypot(Math.sin(angle), -Math.cos(angle) - 0.15 * Math.sin(angle * 2)));

          let targetX, targetY, isOutline;

          if (cycleT < P_SENT) {
            targetX = g.baseX; targetY = g.baseY; isOutline = false;
          } else if (cycleT < P_TO_OUTLINE) {
            const u = Math.max(0, Math.min(1, (cycleT - P_SENT) / (P_TO_OUTLINE - P_SENT) - stagger));
            const eu = easeInOut(u);
            targetX = g.baseX * (1 - eu) + outX * eu;
            targetY = g.baseY * (1 - eu) + outY * eu;
            isOutline = u > 0.5;
          } else if (cycleT < P_OUTLINE) {
            // 윤곽 유지 (회전만)
            targetX = outX;
            targetY = outY;
            isOutline = true;
          } else {
            const u = Math.max(0, Math.min(1, (cycleT - P_OUTLINE) / (1 - P_OUTLINE) - stagger));
            const eu = easeInOut(u);
            targetX = outX * (1 - eu) + g.baseX * eu;
            targetY = outY * (1 - eu) + g.baseY * eu;
            isOutline = u < 0.5;
          }

          // 미세 호흡: 윤곽 상태에서는 글자가 윤곽선 따라 살짝 떨림
          const microDx = isOutline
            ? Math.sin(elapsed * 1.4 + g.outlineAngle * 2 + personalPhase) * 1.0
            : Math.cos(elapsed * 0.9 + personalPhase) * 0.7;
          const microDy = isOutline
            ? Math.cos(elapsed * 1.4 + g.outlineAngle * 2 + personalPhase) * 1.0
            : Math.sin(elapsed * 1.0 + personalPhase) * 1.0;

          // 윤곽에서 글자가 회전 방향 따라 회전 (외곽선을 따라 도는 느낌)
          const charRot = isOutline ? angle + Math.PI / 2 : 0;

          const alphaBreath = 0.85 + Math.sin(elapsed * 0.9 - i * 0.1 + personalPhase) * 0.13;
          const opacity = introEased * alphaBreath;

          let startOffsetX = 0, startOffsetY = 0;
          if (elapsed < 1.5) {
            const arrival = Math.max(0, Math.min(1, introT - g.arrivalDelay * 0.3));
            const ae = 1 - Math.pow(1 - arrival, 3);
            startOffsetX = (g.scatterX * 0.3) * (1 - ae);
            startOffsetY = (g.scatterY * 0.3) * (1 - ae);
          }

          const x = targetX + microDx + startOffsetX;
          const y = targetY + microDy + startOffsetY;
          const scale = 0.97 + Math.sin(elapsed * 0.7 + personalPhase) * 0.02;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${(charRot * 0.3).toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      // ── 3) gravity: 한 점으로 빨려들어감 ──
      // 문장 → 빨려들어가 작은 덩어리 → 다시 문장 (반복)
      // 빨려들어가는 동안 글자가 회전하며 가속
      function updateGravity(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const CYCLE = 12.0;
        const cycleT = (elapsed % CYCLE) / CYCLE;

        const P_SENT = 0.25;
        const P_PULL = 0.45;
        const P_HOLD = 0.65;
        // 0.65~1.0: 다시 본 문장으로 흩어지듯 복귀

        const totalG = decayGlyphs.length;
        for (let i = 0; i < totalG; i++) {
          const g = decayGlyphs[i];
          const personalPhase = g.phase;
          // 글자별 빨림 시간차 (랜덤하게 — 어떤 글자는 끝까지 안 빨려들어감)
          const seed = (Math.sin(i * 41.3) * 43758.5453);
          const sV = seed - Math.floor(seed);
          const stagger = sV * 0.3;
          // 일부 글자는 약하게만 빨려감 (변두리에 남는 잔존 글자)
          const pullStrength = 0.5 + sV * 0.5;  // 0.5 ~ 1.0

          let targetX, targetY, isPulled, pullProgress = 0;

          if (cycleT < P_SENT) {
            targetX = g.baseX; targetY = g.baseY; isPulled = false;
          } else if (cycleT < P_PULL) {
            const u = Math.max(0, Math.min(1, (cycleT - P_SENT) / (P_PULL - P_SENT) - stagger * 0.5));
            const eu = u * u;  // easeIn (가속)
            targetX = g.baseX * (1 - eu * pullStrength) + g.pivotX * eu * pullStrength;
            targetY = g.baseY * (1 - eu * pullStrength) + g.pivotY * eu * pullStrength;
            isPulled = u > 0.5;
            pullProgress = eu;
          } else if (cycleT < P_HOLD) {
            // 빨린 상태 유지 (작은 덩어리, 미세 떨림)
            targetX = g.pivotX * pullStrength + g.baseX * (1 - pullStrength);
            targetY = g.pivotY * pullStrength + g.baseY * (1 - pullStrength);
            isPulled = true;
            pullProgress = 1;
          } else {
            const u = Math.max(0, Math.min(1, (cycleT - P_HOLD) / (1 - P_HOLD) - stagger * 0.5));
            const eu = 1 - Math.pow(1 - u, 3);  // easeOut
            const fromX = g.pivotX * pullStrength + g.baseX * (1 - pullStrength);
            const fromY = g.pivotY * pullStrength + g.baseY * (1 - pullStrength);
            targetX = fromX * (1 - eu) + g.baseX * eu;
            targetY = fromY * (1 - eu) + g.baseY * eu;
            isPulled = u < 0.5;
            pullProgress = 1 - eu;
          }

          // 빨려가는 동안 글자가 회전 (가속도 표현)
          const rotSpeed = pullProgress * (sV - 0.5) * 8;
          const rot = pullProgress > 0.1
            ? rotSpeed * Math.sin(elapsed * 2)
            : Math.sin(elapsed * 0.85 - i * 0.1 + personalPhase) * 0.025;

          // 미세 위치 변동
          const microDx = isPulled
            ? Math.sin(elapsed * 3 + i) * 1.2
            : Math.cos(elapsed * 1.0 - i * 0.1 + personalPhase) * 0.7;
          const microDy = isPulled
            ? Math.cos(elapsed * 3.2 + i) * 1.2
            : Math.sin(elapsed * 1.4 - i * 0.1 + personalPhase) * 1.0;

          const alphaBreath = 0.85 + Math.sin(elapsed * 0.9 - i * 0.1 + personalPhase) * 0.13;
          const opacity = introEased * alphaBreath;

          let startOffsetX = 0, startOffsetY = 0;
          if (elapsed < 1.5) {
            const arrival = Math.max(0, Math.min(1, introT - g.arrivalDelay * 0.3));
            const ae = 1 - Math.pow(1 - arrival, 3);
            startOffsetX = (g.scatterX * 0.3) * (1 - ae);
            startOffsetY = (g.scatterY * 0.3) * (1 - ae);
          }

          // 빨릴수록 글자 살짝 작아짐 (압축)
          const scale = (1 - pullProgress * 0.2)
                       * (0.97 + Math.sin(elapsed * 0.7 + personalPhase) * 0.02);

          const x = targetX + microDx + startOffsetX;
          const y = targetY + microDy + startOffsetY;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      // ── 4) residue: 사라지는 문장 / 잔상 ──
      // 문장이 또렷 → 점점 흐려져 잔상만 → 다시 또렷 (반복)
      // 흐려질 때 위치도 살짝 어긋남 (잔상이 떠있는 느낌)
      function updateResidue(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const CYCLE = 10.0;
        const cycleT = (elapsed % CYCLE) / CYCLE;

        // 페이즈: 또렷 → 흐려짐 → 잔상 → 다시 또렷
        const P_CLEAR = 0.20;     // 0~20% 또렷
        const P_FADE = 0.45;      // 20~45% 흐려지는 중
        const P_RESIDUE = 0.75;   // 45~75% 잔상
        // 75~100% 다시 또렷해짐

        const totalG = decayGlyphs.length;
        for (let i = 0; i < totalG; i++) {
          const g = decayGlyphs[i];
          const personalPhase = g.phase;
          const seed = Math.sin(i * 91.7) * 43758.5453;
          const sV = seed - Math.floor(seed);

          // 글자별 fade 시간차 — 어떤 글자가 먼저 흐려짐
          const fadeDelay = sV * 0.3;

          let clarity;  // 1=또렷, 0=완전 잔상

          if (cycleT < P_CLEAR) {
            clarity = 1;
          } else if (cycleT < P_FADE) {
            const u = Math.max(0, Math.min(1, (cycleT - P_CLEAR) / (P_FADE - P_CLEAR) - fadeDelay * 0.5));
            clarity = 1 - easeInOut(u);
          } else if (cycleT < P_RESIDUE) {
            clarity = 0.05 + Math.sin(elapsed * 0.6 + i * 0.2) * 0.03;  // 거의 0, 미세 일렁임
          } else {
            const u = Math.max(0, Math.min(1, (cycleT - P_RESIDUE) / (1 - P_RESIDUE) - fadeDelay * 0.5));
            clarity = easeInOut(u);
          }

          // 흐려질수록 위치가 어긋남 (잔상이 떠다니는 느낌)
          const driftAmt = (1 - clarity) * 6;
          const microDx = Math.sin(elapsed * 0.8 + sV * 10) * driftAmt
                        + Math.cos(elapsed * 0.5 + i * 0.2) * 0.6;
          const microDy = Math.cos(elapsed * 0.7 + sV * 10) * driftAmt
                        + Math.sin(elapsed * 0.9 + i * 0.2) * 0.8;

          // 흐려질수록 회전 (잔상이 살짝 비뚤어짐)
          const rot = (1 - clarity) * Math.sin(elapsed * 0.4 + sV * 10) * 0.05
                    + Math.sin(elapsed * 0.85 - i * 0.1 + personalPhase) * 0.015;

          // 잔상 단계: 매우 낮은 alpha (그림자처럼)
          const baseAlpha = 0.10 + clarity * 0.78;
          // 미세 호흡 (잔상에도 약간)
          const breathAlpha = clarity > 0.5
            ? Math.sin(elapsed * 0.9 - i * 0.1 + personalPhase) * 0.1
            : Math.sin(elapsed * 1.4 + sV * 5) * 0.04;
          const opacity = introEased * Math.max(0, baseAlpha + breathAlpha);

          // 흐려질수록 살짝 작아짐 (사라지는 느낌)
          const scale = (0.97 + Math.sin(elapsed * 0.7 + personalPhase) * 0.02)
                       * (0.92 + clarity * 0.08);

          let startOffsetX = 0, startOffsetY = 0;
          if (elapsed < 1.5) {
            const arrival = Math.max(0, Math.min(1, introT - g.arrivalDelay * 0.3));
            const ae = 1 - Math.pow(1 - arrival, 3);
            startOffsetX = (g.scatterX * 0.3) * (1 - ae);
            startOffsetY = (g.scatterY * 0.3) * (1 - ae);
          }

          const x = g.baseX + microDx + startOffsetX;
          const y = g.baseY + microDy + startOffsetY;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(4)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      // ─────────────────────────────────────────────
      // 01~19.png용 19개 새 outro 모션 (alightworld 톤)
      //   - 글자가 항상 살짝 보임 (alpha 최소 0.30~0.50)
      //   - 진폭 작게, sin 주기 느리게
      //   - 무한 루프 (사이클 또는 sin 기반)
      //   공통 인트로: introT (0~1, 1.5초) — 글자가 scatter에서 형상으로 부드럽게 도착
      // ─────────────────────────────────────────────

      function applyIntroOffset(g, introT) {
        if (introT >= 1) return { ox: 0, oy: 0 };
        const arr = Math.max(0, Math.min(1, introT - g.arrivalDelay * 0.3));
        const ae = 1 - Math.pow(1 - arr, 3);
        return {
          ox: (g.scatterX * 0.3) * (1 - ae),
          oy: (g.scatterY * 0.3) * (1 - ae),
        };
      }

      function writeGlyph(g, x, y, opacity, rot, scale) {
        g.el.style.transform =
          `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
          `rotate(${(rot || 0).toFixed(4)}rad) ` +
          `scale(${(scale || 1).toFixed(3)})`;
        g.el.style.opacity = Math.max(0, Math.min(1, opacity)).toFixed(3);
      }

      // 글자별 deterministic 난수 (i, mul → 0~1)
      // outro 모션 함수들이 공통으로 사용
      function seed(i, mul) {
        const s = Math.sin(i * mul) * 43758.5453;
        return s - Math.floor(s);
      }

      // 01. 3인칭 소설 대본 — 글자가 문단 덩어리로 멀찍이 흩어짐, 가끔 줄 맞춤
      function updateNarration(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const para = i % 3;
          const paraOffset = [{ x: -60, y: -25 }, { x: 0, y: 5 }, { x: 60, y: -10 }][para];
          const posInPara = Math.floor(i / 3);
          const colX = (posInPara % 5) * 8 - 16;
          const rowY = Math.floor(posInPara / 5) * 10;
          const alignT = Math.max(0, Math.sin(elapsed * 0.35) - 0.3) / 0.7;
          const drift = Math.sin(elapsed * 0.3 + i * 0.4) * 2 + Math.cos(elapsed * 0.25 + i * 0.3) * 1.5;
          const driftY = Math.cos(elapsed * 0.28 + i * 0.35) * 1.2;
          const x = (paraOffset.x + colX + drift) * (1 - alignT * 0.4);
          const y = (paraOffset.y + rowY + driftY) * (1 - alignT * 0.3);
          const off = applyIntroOffset(g, introT);
          const alpha = introEased * (0.65 + Math.sin(elapsed * 0.4 + i * 0.2) * 0.10);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, 0.95);
        }
      }

      // 02. 남겨진 서류 뭉치 — 글자가 분산된 종이 위에 분포, 레이어별 어긋남
      function updatePapers(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        // 5개 종이(레이어)에 글자 분배
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const layer = i % 5;
          const posInLayer = Math.floor(i / 5);
          // 레이어별 위치 (살짝 어긋난 다섯 장의 종이)
          const layerOffsets = [
            { x: -28, y: -18 },
            { x: -8, y: -8 },
            { x: 5, y: 4 },
            { x: 22, y: -2 },
            { x: -15, y: 16 },
          ];
          const layerPos = layerOffsets[layer];
          // 레이어 안에서 글자 분포 (격자)
          const innerCol = posInLayer % 3;
          const innerRow = Math.floor(posInLayer / 3);
          const innerX = (innerCol - 1) * 6;
          const innerY = (innerRow - 1) * 5;
          // 레이어 미세 이동 (종이가 흐트러짐)
          const slipX = Math.sin(elapsed * 0.2 + layer * 0.8) * 3;
          const slipY = Math.cos(elapsed * 0.18 + layer * 0.6) * 2;
          // 일부 글자가 아래로 미끄러짐
          const fallY = (i % 7 === 0) ? Math.sin(elapsed * 0.15 + i * 0.2) * 3 + 2 : 0;
          const x = layerPos.x + innerX + slipX;
          const y = layerPos.y + innerY + slipY + fallY;
          // 레이어별 알파
          const alpha = introEased * (0.45 + (4 - layer) * 0.10);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, (layer - 2) * 0.01, 1);
        }
      }

      // 03. 뚝뚝 끊어진 선 — 짧은 가로선 조각, 간헐적으로 켜졌다 꺼짐
      function updateBrokenLine(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        // 5개 짧은 선분 — 위치/각도 다 다름
        const segs = [
          { cx: -42, cy: -16, ang:  0.4, len: 28 },
          { cx:   8, cy: -24, ang: -0.3, len: 24 },
          { cx:  40, cy:  -2, ang:  0.2, len: 22 },
          { cx: -20, cy:  18, ang: -0.5, len: 30 },
          { cx:  32, cy:  22, ang:  0.25, len: 26 },
        ];
        const charsPerSeg = Math.ceil(total / segs.length);
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const segIdx = Math.floor(i / charsPerSeg);
          const posInSeg = i % charsPerSeg;
          const seg = segs[segIdx % segs.length];
          const t = charsPerSeg > 1 ? posInSeg / (charsPerSeg - 1) : 0.5;
          const localX = (t - 0.5) * seg.len;
          // 각도 회전
          const rotX = localX * Math.cos(seg.ang);
          const rotY = localX * Math.sin(seg.ang);
          // 세그먼트별 on/off 펄스
          const segPhase = segIdx * 0.7 + elapsed * 0.4;
          const on = (Math.sin(segPhase) + 1) / 2;
          const segOn = on > 0.4 ? 1 : (on > 0.2 ? (on - 0.2) / 0.2 : 0);
          // 미세 떨림
          const tremX = Math.sin(elapsed * 0.5 + i * 0.3) * 0.6;
          const tremY = Math.cos(elapsed * 0.45 + i * 0.25) * 0.5;
          const x = seg.cx + rotX + tremX;
          const y = seg.cy + rotY + tremY;
          const alpha = introEased * (0.30 + segOn * 0.55);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, seg.ang * 0.5, 0.94);
        }
      }

      // 04. 글자로 된 줄거리 — 좌상→우하 긴 흐름선
      function updatePlotLine(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const myT = total > 1 ? i / (total - 1) : 0.5;
          const flowX = (myT - 0.5) * 120;
          const flowY = (myT - 0.5) * 50;
          const isNode = i % 5 === 0;
          const nodeY = isNode ? -4 : 0;
          const flowT = (elapsed * 0.12 + myT) % 1;
          const breath = Math.sin(flowT * Math.PI) * 3;
          const x = flowX;
          const y = flowY + nodeY + breath;
          const alpha = introEased * (isNode ? 0.85 : 0.65);
          const scale = isNode ? 1.04 : 0.96;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, scale);
        }
      }

      // 05. 꺼진 전구 — 글자가 흩어진 위치, 간헐 점등
      function updateDeadBulb(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          // 글자별 흩어진 위치 (deterministic, 본 위치와 무관)
          const bulbX = (seed(i, 12.9) - 0.5) * 70;
          const bulbY = (seed(i, 78.2) - 0.5) * 40;
          // 점등 시도 (덜컥거림)
          const tryPhase = elapsed * 0.6 + i * 0.7;
          const flicker = Math.sin(tryPhase) * Math.sin(tryPhase * 3.2);
          const onness = Math.max(0, flicker - 0.4) / 0.6;
          // 미세 흔들림
          const wobX = Math.sin(elapsed * 0.5 + i) * 0.8;
          const wobY = Math.cos(elapsed * 0.4 + i) * 0.6;
          const x = bulbX + wobX;
          const y = bulbY + wobY;
          const alpha = introEased * (0.18 + onness * 0.55);
          const scale = 0.94 + onness * 0.04;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, scale);
        }
      }

      // 06. 반응형 스위치 — 글자가 격자 위에 on/off 그룹 단위로
      function updateSwitch(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        const cols = 8;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const col = i % cols;
          const row = Math.floor(i / cols);
          const totalRows = Math.ceil(total / cols);
          const baseX = (col - (cols - 1) / 2) * 11;
          const baseY = (row - (totalRows - 1) / 2) * 12;
          // 그룹 4개씩 on/off
          const group = i % 4;
          const period = 2.5 + group * 0.5;
          const phase = (elapsed + group * 1.2) % period / period;
          let onState;
          if (phase < 0.45) onState = 1;
          else if (phase < 0.50) onState = 1 - (phase - 0.45) / 0.05;
          else if (phase < 0.95) onState = 0;
          else onState = (phase - 0.95) / 0.05;
          // 켜질 때 살짝 위로 들림
          const lift = -onState * 1.5;
          // 글자별 미세 부유
          const driftX = Math.sin(elapsed * 0.35 + i * 0.3) * 0.6;
          const driftY = Math.cos(elapsed * 0.3 + i * 0.4) * 0.5;
          const alpha = introEased * (0.30 + onState * 0.60);
          const scale = 0.94 + onState * 0.06;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, baseX + driftX + off.ox, baseY + lift + driftY + off.oy, alpha, 0, scale);
        }
      }

      // 07. 텅 빈 마당 — 글자가 중심 피해 가장자리 분포
      function updateEmptyCenter(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const angle = (i / total) * Math.PI * 2 + elapsed * 0.06;
          const radius = 45 + Math.sin(elapsed * 0.2 + i * 0.4) * 5;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius * 0.5;
          const pullPhase = elapsed * 0.25 + i * 0.5;
          const pullT = Math.max(0, Math.sin(pullPhase) - 0.6) / 0.4;
          const pulled = 1 - pullT * 0.3;
          const alpha = introEased * (0.60 + Math.sin(elapsed * 0.3 + i * 0.2) * 0.10);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x * pulled + off.ox, y * pulled + off.oy, alpha, 0, 0.95);
        }
      }

      // 08. 정보 태그 — 글자가 라벨처럼 튀어나옴
      function updateLabel(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const labelAngle = (i / total) * Math.PI * 2;
          const labelR = 28;
          const baseX = Math.cos(labelAngle) * labelR;
          const baseY = Math.sin(labelAngle) * labelR * 0.6;
          const popPhase = elapsed * 0.4 + i * 0.6;
          const popT = Math.max(0, Math.sin(popPhase) - 0.5) / 0.5;
          const popX = baseX + Math.cos(labelAngle) * popT * 6;
          const popY = baseY + Math.sin(labelAngle) * popT * 4;
          const alpha = introEased * (0.55 + popT * 0.35);
          const scale = 0.95 + popT * 0.08;
          const rot = popT * (labelAngle > Math.PI ? -0.05 : 0.05);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, popX + off.ox, popY + off.oy, alpha, rot, scale);
        }
      }

      // 09. 보이지 않는 설계도 — 글자가 직사각형 변 위 분포
      function updateBlueprint(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          // 청사진의 작은 셀(방) 6개 - 큰 직사각형 안에 분할
          // 셀 위치: 2행 × 3열, 셀 크기 30×24
          const cell = i % 6;
          const cellCol = cell % 3;
          const cellRow = Math.floor(cell / 3);
          const cellCx = (cellCol - 1) * 32;
          const cellCy = (cellRow - 0.5) * 26;
          // 셀 안에서 글자 위치 (작은 정사각형 4꼭짓점)
          const posInCell = Math.floor(i / 6);
          const cornerInCell = posInCell % 4;
          const cornerOffsets = [
            { x: -10, y: -8 }, { x: 10, y: -8 },
            { x: 10, y:  8 }, { x: -10, y:  8 },
          ];
          const co = cornerOffsets[cornerInCell];
          // 셀별 활성 펄스 (어떤 방이 켜졌다 꺼졌다)
          const cellPhase = elapsed * 0.4 + cell * 0.8;
          const cellOn = (Math.sin(cellPhase) + 1) / 2;
          // 미세 떨림
          const tremX = Math.sin(elapsed * 0.5 + i * 0.3) * 0.6;
          const tremY = Math.cos(elapsed * 0.45 + i * 0.25) * 0.5;
          const x = cellCx + co.x + tremX;
          const y = cellCy + co.y + tremY;
          const alpha = introEased * (0.55 + cellOn * 0.30);
          const scale = 0.92 + cellOn * 0.04;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, scale);
        }
      }

      // 10. 단어 카드 — 2층 카드 배치, 가끔 뒤집힘
      function updateCards(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        // 2층 카드 (위/아래)
        const perRow = Math.ceil(total / 2);
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const row = Math.floor(i / perRow);
          const posInRow = i % perRow;
          const cardX = (posInRow - (perRow - 1) / 2) * 13;
          const cardY = row === 0 ? -14 : 14;
          const flipPhase = elapsed * 0.3 + i * 0.5;
          const flipT = (Math.sin(flipPhase) + 1) / 2;
          const slipX = Math.sin(flipPhase * 0.7) * 2.5;
          const slipY = Math.sin(elapsed * 0.25 + i * 0.4) * 1.5;
          const x = cardX + slipX;
          const y = cardY + slipY;
          const alpha = introEased * (0.65 + flipT * 0.25);
          const scale = 0.94 + flipT * 0.06;
          const rot = (flipT - 0.5) * 0.06;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, rot, scale);
        }
      }

      // 11. 보이지 않는 3D 지도 — 글자가 다른 깊이에 분포, 시점 회전
      function update3DMap(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const my3dX = (seed(i, 12.9) - 0.5) * 100;
          const my3dY = (seed(i, 78.2) - 0.5) * 50;
          const my3dZ = seed(i, 47.3) * 2 - 1;
          const rotAngle = elapsed * 0.1;
          const rotX = my3dX * Math.cos(rotAngle) + my3dZ * 30 * Math.sin(rotAngle);
          const rotZ = my3dZ * Math.cos(rotAngle) - my3dX / 30 * Math.sin(rotAngle);
          const depthScale = 0.85 + rotZ * 0.15;
          const x = rotX;
          const y = my3dY;
          const alpha = introEased * (0.50 + (rotZ + 1) / 2 * 0.40);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, depthScale);
        }
      }

      // 12. 엑셀 시트 — 격자 셀, 선택 행 깜빡
      function updateSpreadsheet(now) {
        const elapsed = (now - decayStartTime) / 1000;
