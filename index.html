<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ───────── */
    @font-face {
      font-family: 'Eyja-Regular';
      src: url('./assets/fonnts_com-eyjaunlicensedtrial-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;        /* 완전히 하얀 바탕 */
      cursor: grab;
      /* 드래그 시 텍스트 선택 방지 */
      -webkit-user-select: none;
      user-select: none;
      /* 트랙패드/스크롤 제스처 기본 동작 차단 */
      overscroll-behavior: none;
      touch-action: none;
    }

    /* ───────── 좌측 하단 HUD ─────────
       ohezin.kr/work 의 All / Index 와 동일 사양:
         font-family : Eyja-Regular, Eulyoo1945-Regular, serif
         font-size   : 15px
         line-height : 15px (= 1)
         color       : #000
    */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: #000;
      font-family: 'Eyja-Regular', 'Eulyoo1945-Regular', serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      letter-spacing: normal;
      white-space: nowrap;
    }
    .hud .row {
      display: block;
    }
    /* 숫자만 자간을 강하게 줄여 영문 비례에 맞춤
       (트라이얼 Eyja의 기본 숫자 트래킹이 살짝 넓음) */
    .hud .num {
      letter-spacing: -0.07em;
    }
    /* 영문(라벨) 다음에 오는 숫자와의 간격을 좁힘
       — 그냥 공백을 쓰면 너무 벌어져서 시각적으로 맞춰주는 보정 */
    .hud .num {
      margin-left: -0.22em;
    }
    /* 콜론(:) 다음에 오는 숫자는 살짝 띄움 — 콜론과 숫자가 들러붙지 않게 */
    .hud .num.after-colon {
      margin-left: 0.08em;
    }

    /* ───────── Reveal Image — Canvas 기반 궤적 브러쉬 ─────────
       핵심 원리 (Immersive Garden의 시그니처 동작):
         - 이미지는 화면 한 자리에 가만히 있다 (절대 안 움직임).
         - 그 위에 같은 크기의 <canvas>가 마스크 역할.
         - 마우스 좌표를 매 프레임 기록해 trail(궤적)에 점으로 추가.
         - 각 점은 자기 수명(life)이 있어 시간이 지나면 천천히 옅어짐.
         - 캔버스에 그려진 모든 점들의 합집합 영역만큼만 이미지가 드러남.
         - 결과: 마우스로 쓸어넘기면 그 자리가 브러쉬처럼 칠해지며 이미지가 보이고,
                마우스가 떠나도 칠해진 흔적이 천천히 페이드아웃 → 급작스럽지 않게 사라짐.
    */
    .reveal {
      position: fixed;
      left: 56%;
      top:  48%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      z-index: 5;
      pointer-events: none;
      /* 디버그용 — 영역이 어디 있는지 잠깐 보고 싶을 때 outline 켜기 */
      /* outline: 1px dashed rgba(0,0,0,0.1); */
    }
    .reveal canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* <img> 는 더이상 직접 보여지지 않음 — 캔버스가 그릴 때 소스로만 사용.
       메모리에는 로드되어야 하니 DOM에는 두되 화면 밖으로 숨김. */
    #reveal-img {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- 마우스가 쓸어넘기면 브러쉬처럼 칠해지며 드러나는 이미지.
       이미지는 한 자리에 고정 — 캔버스가 마스크 역할을 해서 칠해진 영역만 보여줌. -->
  <div class="reveal" id="reveal">
    <canvas id="reveal-canvas"></canvas>
    <img id="reveal-img" alt="" draggable="false" />
  </div>

  <div class="hud" id="hud">
    <span class="row">Distance <span class="num" id="num-distance">100%</span></span>
    <span class="row">Position X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       상태값
       ─────────────────────────────────────────────
       distance : 확대율(%) — 휠/핀치로 변경
       posX/posY: 위치     — 마우스 드래그/트랙패드 슬라이딩으로 변경
       ───────────────────────────────────────────── */
    let distance = 100;     // %
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    /* ── 숫자 포매터 ──
       Position 좌표는 항상 3자리 0-padding (음수면 - 부호 포함) */
    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
    }
    renderHUD();

    /* ─────────────────────────────────────────────
       1) 마우스 드래그 (잡고 끌기) → Position
       ─────────────────────────────────────────────
       마우스를 누른 채 끌면 끄는 방향대로 위치가 이동
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;

    // 프레임 순환용 — 이미지 영역에서 누르고 있는 동안 currentFrame 을 자동으로 ++
    let frameLoopTimer = null;
    const FRAME_INTERVAL_MS = 280;   // 한 프레임에서 다음 프레임까지의 간격

    function isInsideReveal(x, y) {
      const el = document.getElementById("reveal");
      if (!el) return false;
      const r = el.getBoundingClientRect();
      return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
    }

    function startFrameLoop() {
      if (frameLoopTimer) return;
      frameLoopTimer = setInterval(() => {
        if (frames.length === 0) return;
        currentFrame = (currentFrame + 1) % frames.length;
      }, FRAME_INTERVAL_MS);
    }
    function stopFrameLoop() {
      if (frameLoopTimer) {
        clearInterval(frameLoopTimer);
        frameLoopTimer = null;
      }
    }

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;     // 좌클릭만

      // 이미지 영역 안에서 누르면 → 프레임 순환만, Position 드래그는 시작 안 함
      if (isInsideReveal(e.clientX, e.clientY)) {
        startFrameLoop();
        return;
      }

      // 그 외 영역 → 기존 Position 드래그
      isDragging = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      // 끄는 방향으로 위치 이동 (캔버스를 손으로 잡아 끄는 느낌)
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      // 어떤 이유로든 마우스를 떼면 프레임 순환은 정지
      stopFrameLoop();

      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    // 창에서 마우스가 빠져나가도 프레임 순환 정지 (안전판)
    window.addEventListener("blur", stopFrameLoop);

    /* ─────────────────────────────────────────────
       2) wheel 이벤트 분기
          - 마우스 휠 / 트랙패드 핀치  → Distance (줌)
          - 트랙패드 두 손가락 슬라이딩 → Position (이동)
       ─────────────────────────────────────────────
       브라우저는 트랙패드 핀치를 ctrlKey === true 로 표시한
       wheel 이벤트로 보내준다 (Chrome/Safari/Firefox 공통).
       이걸로 핀치(줌)와 슬라이딩(패닝)을 구분.
       ───────────────────────────────────────────── */
    window.addEventListener("wheel", (e) => {
      e.preventDefault();

      if (e.ctrlKey) {
        // ── 트랙패드 핀치: 손가락 모으면 줌아웃, 벌리면 줌인 ──
        // deltaY가 음수면 핀치아웃(확대), 양수면 핀치인(축소)
        const factor = Math.exp(-e.deltaY * 0.01);
        distance = Math.max(0, distance * factor);
      } else {
        // ── 일반 마우스 휠: 줌 (위로 = 줌인, 아래로 = 줌아웃) ──
        // 트랙패드 두 손가락 수직 스크롤도 여기로 옴 → 어떻게 분기할지 결정 필요
        // 휠은 deltaY 값이 보통 100 단위로 큰 step이 들어오고,
        // 트랙패드는 작고 연속적인 값이 deltaX/deltaY 둘 다로 들어옴.
        // → deltaX 가 의미있게 있거나, 작은 픽셀단위 deltaY 면 패닝으로 간주
        const isTrackpadPan =
          Math.abs(e.deltaX) > 0 ||                          // 가로 성분 있음
          (e.deltaMode === 0 && Math.abs(e.deltaY) < 50);    // 픽셀모드 + 작은값

        if (isTrackpadPan) {
          // 트랙패드 두 손가락 슬라이딩 → Position
          posX -= e.deltaX;
          posY -= e.deltaY;
        } else {
          // 진짜 마우스 휠 → Distance 줌
          // 위로(▲ deltaY 음수) = 줌인, 아래로(▼ deltaY 양수) = 줌아웃
          const factor = Math.exp(-e.deltaY * 0.001);
          distance = Math.max(0, distance * factor);
        }
      }
      renderHUD();
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치(모바일/태블릿)
          - 한 손가락 드래그 → Position
          - 두 손가락 핀치  → Distance
       ───────────────────────────────────────────── */
    let touchMode = null;        // 'pan' | 'pinch' | null
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        touchMode = "pinch";
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartDistance = distance;
      }
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      } else if (touchMode === "pinch" && e.touches.length === 2) {
        const d = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          distance = Math.max(0, pinchStartDistance * (d / pinchStartDist));
          renderHUD();
        }
      }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    /* 컨텍스트 메뉴 차단(우클릭으로 동작이 끊기는 것 방지) */
    window.addEventListener("contextmenu", (e) => e.preventDefault());

    /* ─────────────────────────────────────────────
       5) Google Sheet 연동
       ─────────────────────────────────────────────
       흐름:
         1. CSV 게시 URL을 fetch
         2. CSV 파싱
         3. 80행을 객체로 변환 — { "기억 형식": "...", "기억 조직 방식": "...",
                                    "기억 주제": "79.png", ... }
         4. "기억 주제" 값(파일명)을 ./assets/ 폴더 경로로 prefix → <img src>
         5. 같은 행 객체는 currentItem 으로 보관 — 추후 모션/텍스트 모듈에서 참조

       시트 게시 방법:
         Google Sheets → 파일 → 공유 → 웹에 게시
         → 형식: '쉼표로 구분된 값(.csv)'
         → 시트: 해당 시트만 선택
         → 게시 후 나오는 URL을 SHEET_CSV_URL 에 붙여넣기

       URL이 비어 있으면 fetch를 건너뛰고 fallback(./assets/79.png) 표시 →
       개발 중에도 화면이 정상 동작.
       ───────────────────────────────────────────── */
    const SHEET_CSV_URL = "";   // ← 여기에 게시된 CSV URL을 붙여넣기

    // 시트의 어느 행/열을 쓸지 — 1-based (스프레드시트 좌표 그대로)
    const SHEET_TARGET_ROW = 80;       // 80행
    const SHEET_TARGET_COL_NAME = "기억 주제";   // H열 헤더

    // 이미지 파일명을 어디 폴더에서 찾을지
    const IMAGE_BASE_PATH = "./assets/";

    const revealImg = document.getElementById("reveal-img");

    /* 간단한 CSV 파서 — 셀 안의 콤마/줄바꿈/이스케이프된 따옴표 모두 처리 */
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') {       // 이스케이프된 ""
            cell += '"'; i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell); cell = "";
          } else if (ch === "\n") {
            row.push(cell); cell = "";
            rows.push(row); row = [];
          } else if (ch === "\r") {
            // 무시 (CRLF 처리)
          } else {
            cell += ch;
          }
        }
      }
      // 마지막 셀/행 flush
      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    /* 시트의 한 행 전체를 {헤더명: 값} 객체로 변환 */
    function pickRowFromSheet(rows, targetRow) {
      if (!rows || rows.length === 0) return null;
      const header = rows[0];
      // targetRow 는 1-based. 헤더가 1행이므로, 데이터행 80 → rows[79]
      const dataRow = rows[targetRow - 1];
      if (!dataRow) {
        console.warn(`[sheet] ${targetRow}행이 비어 있습니다.`);
        return null;
      }
      const obj = {};
      for (let i = 0; i < header.length; i++) {
        const key = (header[i] || "").trim();
        if (!key) continue;
        obj[key] = (dataRow[i] || "").trim();
      }
      return obj;
    }

    /* 행 데이터 → 화면 적용
       지금은 이미지만 다루지만, 같은 객체에 "기억 형식", "기억 조직 방식" 등이
       함께 들어 있어서 다음 단계에서 모션/텍스트/관계로 자유롭게 확장 가능. */
    let currentItem = null;   // 시트에서 가져온 현재 행 — 추후 다른 모듈에서 참조

    /* ─────────────────────────────────────────────
       프레임 시스템 — 한 주제의 변형 이미지를 시리즈로 로드
       ─────────────────────────────────────────────
       시트 H80이 "79.png" 라면 다음 8장을 미리 로드:
         frames[0] = 79.png
         frames[1] = 79-1.png
         frames[2] = 79-2.png
         ...
         frames[7] = 79-7.png
       마우스를 영역에 누르고 있으면 인덱스가 자동 순환.
       ───────────────────────────────────────────── */
    const FRAME_COUNT = 8;          // 베이스 + 7장
    const frames = [];               // HTMLImageElement 배열
    let currentFrame = 0;            // 현재 보여줄 인덱스

    function loadFrameSeries(baseFilename) {
      // "79.png" → name="79", ext="png"
      const dot = baseFilename.lastIndexOf(".");
      const name = dot === -1 ? baseFilename : baseFilename.slice(0, dot);
      const ext  = dot === -1 ? ""           : baseFilename.slice(dot);  // ".png"

      frames.length = 0;
      for (let i = 0; i < FRAME_COUNT; i++) {
        const fname = (i === 0) ? `${name}${ext}` : `${name}-${i}${ext}`;
        const img = new Image();
        img.src = IMAGE_BASE_PATH + fname;
        frames.push(img);
      }
      currentFrame = 0;

      // tickReveal에서 frames[currentFrame].complete 를 체크해 그릴지 결정.
      // (베이스 이미지가 로드되면 즉시 그리기 시작)
      console.info(`[frames] loading ${FRAME_COUNT} frames for "${baseFilename}":`,
                   frames.map(im => im.src));
    }

    function applyItem(item) {
      if (!item) return;
      currentItem = item;

      // 이미지 — 파일명만 시트에 들어옴 (예: "79.png")
      const filename = item[SHEET_TARGET_COL_NAME];
      if (filename) {
        loadFrameSeries(filename);
      } else {
        applyFallback();
      }

      // 디버깅 — 같은 행의 다른 값들도 콘솔에 보여줌 (다음 단계 확장 시 참고용)
      console.info("[sheet] full row:", item);
    }

    /* fallback — fetch 실패, URL 미설정, 또는 행이 비어있을 때 */
    function applyFallback() {
      loadFrameSeries("79.png");
      console.info("[sheet] fallback (79.png 시리즈) 사용.");
    }

    if (!SHEET_CSV_URL) {
      // URL 미설정 — fallback 으로 화면은 정상 표시
      applyFallback();
    } else {
      fetch(SHEET_CSV_URL)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(text => {
          const rows = parseCSV(text);
          const item = pickRowFromSheet(rows, SHEET_TARGET_ROW);
          if (item) applyItem(item);
          else      applyFallback();
        })
        .catch(err => {
          console.warn("[sheet] fetch 실패 — fallback 사용:", err);
          applyFallback();
        });
    }

    /* ─────────────────────────────────────────────
       6) Reveal 이미지 — Canvas 기반 궤적 브러쉬
       ─────────────────────────────────────────────
       동작:
         - 마우스가 이미지 영역(또는 영향권 안)에 들어오면 매 프레임 좌표를
           기록해 trail 배열에 점으로 추가.
         - 각 점은 자기 수명(life: 0→1)이 있어 시간이 지나며 옅어짐.
         - 매 프레임 캔버스를 지우고, 모든 점을 라디얼 그라디언트(부드러운
           원형 브러쉬)로 알파 누적해서 그림.
         - 마지막에 globalCompositeOperation = 'source-in' 으로 이미지를
           그 알파 모양대로 마스킹 → 칠해진 자리만 이미지가 드러남.
         - 마우스가 떠나도 이미 그려진 점들이 자기 페이스대로 천천히 사라짐
           → 사용자가 묘사한 "쓸어넘기며 그려지고, 급작스럽지 않게 사라지는" 느낌.
       ───────────────────────────────────────────── */
    const reveal     = document.getElementById("reveal");
    const revCanvas  = document.getElementById("reveal-canvas");
    const revCtx     = revCanvas.getContext("2d");

    // (이미지 로드 체크는 매 프레임 frames[currentFrame].complete 로 직접 함)

    // 캔버스 픽셀 해상도를 박스에 맞추기 (DPR 대응)
    function resizeRevealCanvas() {
      const rect = reveal.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      revCanvas.width  = Math.round(rect.width  * dpr);
      revCanvas.height = Math.round(rect.height * dpr);
      revCtx.setTransform(dpr, 0, 0, dpr, 0, 0);   // CSS 픽셀 좌표계로 그릴 수 있게
    }
    resizeRevealCanvas();
    window.addEventListener("resize", resizeRevealCanvas);

    // 마우스 좌표 (window 기준 px). 페이지 들어왔을 때 즉시 영향 안 가도록 멀리.
    let mouseX = -9999, mouseY = -9999;
    let prevMX = -9999, prevMY = -9999;

    // 궤적 — 점들의 배열. 각 점: {x, y, age, maxAge, radius}
    // x,y 는 reveal 박스 내부 좌표 (좌상단 기준, CSS px).
    const trail = [];

    // 영향권: 박스에서 이만큼 밖까지는 점이 추가됨 (자연스러운 시작/끝)
    const REVEAL_INFLUENCE = 90;

    // 한 점의 기본 수명(프레임). 길수록 잔향이 오래 — 신비로운 느낌의 핵심.
    const POINT_LIFE = 140;

    // 한 점의 기본 반지름(px). 클수록 안개처럼 부드럽게 번짐.
    const POINT_RADIUS = 75;

    // 두 점 사이를 보간해 점을 촘촘히 추가 (마우스가 빠르게 움직여도 끊기지 않게)
    function pushTrailPoints(fromX, fromY, toX, toY) {
      const dx = toX - fromX, dy = toY - fromY;
      const dist = Math.hypot(dx, dy);
      // 거리에 비례해 점 개수 결정 — 6px 마다 한 점 (더 촘촘히)
      const steps = Math.max(1, Math.ceil(dist / 6));
      for (let i = 1; i <= steps; i++) {
        const t = i / steps;
        trail.push({
          x: fromX + dx * t,
          y: fromY + dy * t,
          age: 0,
          maxAge: POINT_LIFE + (Math.random() - 0.5) * 40,   // 점마다 수명 더 다양하게
          radius: POINT_RADIUS + (Math.random() - 0.5) * 22,
          // 드리프트용 시드 — 각 점이 시간 따라 천천히 떠다니게 (안개·연기 느낌)
          driftSeed: Math.random() * Math.PI * 2,
          driftAmt:  6 + Math.random() * 8,                  // 떠다니는 거리(px)
        });
      }
      // 너무 많아지면 오래된 것부터 제거 (성능 안전판) — 수명이 길어졌으니 한도도 키움
      if (trail.length > 700) trail.splice(0, trail.length - 700);
    }

    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function tickReveal() {
      const rect = reveal.getBoundingClientRect();

      // 마우스가 영향권(박스 + 여유) 안에 있는지
      const dx = Math.max(rect.left - mouseX, 0, mouseX - rect.right);
      const dy = Math.max(rect.top  - mouseY, 0, mouseY - rect.bottom);
      const distOutside = Math.hypot(dx, dy);
      const inInfluence = distOutside <= REVEAL_INFLUENCE;

      if (inInfluence) {
        // 박스 좌표계로 변환
        const lx = mouseX - rect.left;
        const ly = mouseY - rect.top;
        if (prevMX > -9000) {
          const plx = prevMX - rect.left;
          const ply = prevMY - rect.top;
          pushTrailPoints(plx, ply, lx, ly);
        } else {
          // 영향권에 막 들어옴 — 단일 점부터
          pushTrailPoints(lx, ly, lx, ly);
        }
        prevMX = mouseX; prevMY = mouseY;
      } else {
        // 영향권 밖이면 prev 리셋 — 다음에 들어올 때 점프 안 하게
        prevMX = -9999; prevMY = -9999;
      }

      // ── 캔버스 그리기 ──
      const W = rect.width, H = rect.height;
      revCtx.clearRect(0, 0, W, H);

      // 현재 프레임 이미지 가져오기 (로드 안 됐으면 그리기 스킵)
      const frameImg = frames[currentFrame];
      const frameReady = frameImg && frameImg.complete && frameImg.naturalWidth > 0;

      if (frameReady && trail.length > 0) {
        // 1) 모든 점을 부드러운 라디얼 그라디언트로 그리기
        //    (alpha 채널이 곧 마스크가 됨)
        for (let i = trail.length - 1; i >= 0; i--) {
          const p = trail[i];
          p.age++;
          if (p.age >= p.maxAge) { trail.splice(i, 1); continue; }

          const life = p.age / p.maxAge;       // 0→1

          // 알파 페이드 — 등장과 사라짐 모두 길고 부드럽게.
          //   처음 35% : 천천히 스며듦 (smoothstep ease-in-out)
          //   이후 65% : 매우 긴 ease-out — 잔향
          // 최대 알파 0.7 — 가장자리에서 이미지 색이 안개처럼 더 자연스럽게 번지게.
          let alpha;
          if (life < 0.35) {
            const t = life / 0.35;
            // smoothstep: 매우 부드러운 ease-in-out
            const eased = t * t * t * (t * (t * 6 - 15) + 10);
            alpha = eased * 0.7;
          } else {
            const t = (life - 0.35) / 0.65;
            alpha = Math.pow(1 - t, 2.2) * 0.7;
          }
          if (alpha < 0.005) continue;

          // 점이 시간 따라 천천히 떠다니듯 미세하게 흔들림 (안개·연기 느낌)
          const drift = p.driftAmt * Math.sin(p.driftSeed + p.age * 0.025);
          const drift2= p.driftAmt * Math.cos(p.driftSeed * 1.3 + p.age * 0.02);
          const px = p.x + drift  * 0.6;
          const py = p.y + drift2 * 0.6;
          const r  = p.radius;

          // 그라디언트 — 더 길고 부드러운 페더.
          // 가장자리에서 이미지 색이 안개처럼 점점 번지듯 드러나도록 stop을 다섯 단계로.
          const grad = revCtx.createRadialGradient(px, py, 0, px, py, r);
          grad.addColorStop(0,    `rgba(0,0,0,${alpha})`);
          grad.addColorStop(0.18, `rgba(0,0,0,${alpha * 0.92})`);
          grad.addColorStop(0.40, `rgba(0,0,0,${alpha * 0.65})`);
          grad.addColorStop(0.65, `rgba(0,0,0,${alpha * 0.30})`);
          grad.addColorStop(0.85, `rgba(0,0,0,${alpha * 0.08})`);
          grad.addColorStop(1,    `rgba(0,0,0,0)`);
          revCtx.fillStyle = grad;
          revCtx.beginPath();
          revCtx.arc(px, py, r, 0, Math.PI * 2);
          revCtx.fill();
        }

        // 2) source-in: 지금까지 그려진 알파 영역 안쪽에만 이미지를 그림
        revCtx.globalCompositeOperation = "source-in";
        revCtx.drawImage(frameImg, 0, 0, W, H);
        revCtx.globalCompositeOperation = "source-over";   // 원래대로
      }

      requestAnimationFrame(tickReveal);
    }
    requestAnimationFrame(tickReveal);
  </script>

</body>
