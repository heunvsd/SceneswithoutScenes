        else if (cycleT < 0.5) assembled = easeInOut((cycleT - 0.3) / 0.2);
        else if (cycleT < 0.7) assembled = 1;
        else if (cycleT < 0.9) assembled = 1 - easeInOut((cycleT - 0.7) / 0.2);
        else assembled = 0;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          // 분리 위치 (deterministic)
          const partAngle = seed(i, 12.9) * Math.PI * 2;
          const partR = 30;
          const partX = Math.cos(partAngle) * partR;
          const partY = Math.sin(partAngle) * partR * 0.6;
          // 결합 위치 (가로 일렬)
          const cols = 8;
          const col = i % cols;
          const row = Math.floor(i / cols);
          const totalRows = Math.ceil(total / cols);
          const assemX = (col - (cols - 1) / 2) * 8;
          const assemY = (row - (totalRows - 1) / 2) * 9;
          const x = partX + (assemX - partX) * assembled;
          const y = partY + (assemY - partY) * assembled;
          const alpha = introEased * (0.55 + assembled * 0.30);
          const rot = (1 - assembled) * (seed(i, 47) - 0.5) * 0.5;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, rot, 0.93);
        }
      }

      // 70. 칸이 나뉜 장부 — 행별 누적 정렬 + 글자 부드러운 부유
      function updateLedger(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        const perRow = 5;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const row = Math.floor(i / perRow);
          const col = i % perRow;
          const totalRows = Math.ceil(total / perRow);
          const baseX = (col - (perRow - 1) / 2) * 9;
          const baseY = (row - (totalRows - 1) / 2) * 9;
          // 글자별 미세 부유 (계속 이어짐)
          const driftX = Math.sin(elapsed * 0.35 + i * 0.4) * 0.8;
          const driftY = Math.cos(elapsed * 0.3 + i * 0.3) * 0.6;
          // 행별 호흡 (한 행 전체가 살짝 움직임)
          const rowBreath = Math.sin(elapsed * 0.25 + row * 0.7) * 0.8;
          // 한 행씩 시간 따라 갱신 — 그 행만 잠깐 또렷
          const updateRow = Math.floor(elapsed * 0.3) % totalRows;
          const isUpdating = row === updateRow;
          const blink = isUpdating ? (Math.sin(elapsed * 6) + 1) / 2 * 0.15 : 0;
          const alpha = introEased * (0.65 + (isUpdating ? 0.20 : 0) + blink);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, baseX + driftX + off.ox, baseY + driftY + rowBreath + off.oy, alpha, 0, 0.92);
        }
      }

      // 71. 주석 달린 파일 — 메인 군집 + 옆 주석
      function updateAnnotatedFile(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        // 3/4은 메인, 1/4은 주석
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const isAnnotation = (i % 4) === 3;
          let x, y, alpha, scale;
          if (isAnnotation) {
            // 주석: 우측에 작게, 시간 따라 가끔 나타남
            const annoIdx = Math.floor(i / 4);
            const annoY = (annoIdx - 2) * 8;
            const visPhase = elapsed * 0.3 + i * 0.4;
            const visible = (Math.sin(visPhase) + 1) / 2;
            x = 28 + (1 - visible) * 4;
            y = annoY;
            alpha = introEased * (0.30 + visible * 0.50);
            scale = 0.78;
          } else {
            // 메인: 좌측 군집
            const mainIdx = i - Math.floor(i / 4);
            const cols = 6;
            const col = mainIdx % cols;
            const row = Math.floor(mainIdx / cols);
            x = -25 + col * 7;
            y = (row - 2) * 9;
            alpha = introEased * 0.80;
            scale = 0.92;
          }
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, scale);
        }
      }

      // 72. 읽기 전용 문서 — 격자 + 줄별 부드러운 호흡 흐름
      function updateReadonly(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        const cols = 7;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const col = i % cols;
          const row = Math.floor(i / cols);
          const totalRows = Math.ceil(total / cols);
          const x = (col - (cols - 1) / 2) * 9;
          const y = (row - (totalRows - 1) / 2) * 10;
          // 줄별 부드러운 sin 흐름 (위에서 아래로)
          const rowFlow = Math.sin(elapsed * 0.3 + row * 0.8) * 1.2;
          // 글자별 미세 호흡
          const charBreath = Math.sin(elapsed * 0.25 + i * 0.2) * 0.6;
          // 가끔 전체가 잠깐 밝아짐 (접근 인상)
          const flashPhase = (elapsed * 0.18) % 1;
          const flash = flashPhase < 0.05 ? flashPhase / 0.05 : (flashPhase < 0.10 ? 1 - (flashPhase - 0.05) / 0.05 : 0);
          const alpha = introEased * (0.62 + flash * 0.18);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + charBreath + off.ox, y + rowFlow + off.oy, alpha, 0, 0.92);
        }
      }

      // 73. 위치 관계도 — 글자 간 상대 위치 변화
      function updatePositionMap(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const baseAngle = seed(i, 12.9) * Math.PI * 2;
          const baseR = 18 + seed(i, 78.2) * 32;
          const radiusT = (Math.sin(elapsed * 0.2 + i * 0.3) + 1) / 2;
          const angleShift = Math.sin(elapsed * 0.15 + i * 0.4) * 0.4;
          const r = baseR * (0.85 + radiusT * 0.25);
          const ang = baseAngle + angleShift;
          const x = Math.cos(ang) * r;
          const y = Math.sin(ang) * r * 0.6;
          const alpha = introEased * 0.72;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, 0.92);
        }
      }

      // 74. 보이지 않는 레고 — 격자식 끼워 맞춤
      function updateLego(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        // 사이클 4초: 결합 → 해체 → 다른 결합
        const LEGO = 4;
        const cycleT = (elapsed % LEGO) / LEGO;
        const config = Math.floor(elapsed / LEGO) % 3;  // 3가지 다른 결합 패턴
        let bound;
        if (cycleT < 0.25) bound = 0;
        else if (cycleT < 0.40) bound = easeInOut((cycleT - 0.25) / 0.15);
        else if (cycleT < 0.75) bound = 1;
        else if (cycleT < 0.90) bound = 1 - easeInOut((cycleT - 0.75) / 0.15);
        else bound = 0;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          // 분리 위치 (deterministic)
          const sepX = (seed(i, 12.9) - 0.5) * 50;
          const sepY = (seed(i, 78.2) - 0.5) * 30;
          // 결합 위치 — config에 따라 다른 격자
          let bx, by;
          if (config === 0) {
            // 가로 일렬 격자
            const col = i % 8;
            const row = Math.floor(i / 8);
            bx = (col - 3.5) * 8;
            by = (row - 1) * 9;
          } else if (config === 1) {
            // 십자 모양
            const arm = i % 4;
            const dist = Math.floor(i / 4) * 6;
            bx = arm === 0 ? -dist : arm === 1 ? dist : 0;
            by = arm === 2 ? -dist : arm === 3 ? dist : 0;
          } else {
            // 계단 모양
            const step = i;
            bx = (step % 6) * 6 - 15;
            by = Math.floor(step / 6) * 7 - 8;
          }
          const x = sepX + (bx - sepX) * bound;
          const y = sepY + (by - sepY) * bound;
          const alpha = introEased * (0.50 + bound * 0.35);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, 0.92);
        }
      }

      // 75. 타임라인 선 — 글자가 긴 수평 축 + 세로로 사건 노드 분포
      function updateTimeline(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const myT = total > 1 ? i / (total - 1) : 0.5;
          // 수평 일렬 + 글자별 위/아래로 ±15px 분산 (사건 노드)
          const x = (myT - 0.5) * 100;
          const eventOffset = (i % 4 - 1.5) * 8;  // -12, -4, 4, 12
          const y = eventOffset;
          // 시간 흐름 따라 현재 위치 펄스
          const flowPos = (elapsed * 0.18) % 1;
          const dist = Math.abs(myT - flowPos);
          const inTime = Math.exp(-dist * dist * 40);
          const pauseAt = [0.2, 0.5, 0.8];
          let pausing = 0;
          for (const p of pauseAt) {
            if (Math.abs(flowPos - p) < 0.05) pausing = 1;
          }
          // 미세 부유
          const driftY = Math.sin(elapsed * 0.4 + i * 0.3) * 1;
          const alpha = introEased * (0.50 + inTime * 0.40 + pausing * 0.10);
          const scale = 0.92 + inTime * 0.08;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + off.ox, y + driftY + off.oy, alpha, 0, scale);
        }
      }

      // 76. 레이더 핑 — 짧고 강한 탐지, 가끔만 점등
      function updatePing(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        // 핑 주기 1.8초
        const PING = 1.8;
        const pingT = (elapsed % PING) / PING;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          // 글자별 무작위 위치
          const px = (seed(i, 12.9) - 0.5) * 70;
          const py = (seed(i, 78.2) - 0.5) * 36;
          // 글자별 핑 응답 시간차
          const myPhase = seed(i, 47.1) * 0.7;
          const localPing = pingT - myPhase;
          let intensity;
          if (localPing < 0 || localPing > 0.25) {
            intensity = 0;
          } else if (localPing < 0.05) {
            intensity = localPing / 0.05;
          } else {
            intensity = 1 - (localPing - 0.05) / 0.20;
          }
          const alpha = introEased * (0.15 + intensity * 0.75);
          const scale = 0.85 + intensity * 0.20;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, px + off.ox, py + off.oy, alpha, 0, scale);
        }
      }

      // 77. 몸의 나침반 — 글자가 중심 기준 방향 정렬
      function updateCompass(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        const compassAngle = Math.sin(elapsed * 0.15) * 0.5;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const myAngle = (i / total) * Math.PI * 2 + compassAngle;
          const ring = i % 3;
          const r = 18 + ring * 12;
          const x = Math.cos(myAngle) * r;
          const y = Math.sin(myAngle) * r * 0.65;
          const settle = (Math.sin(elapsed * 0.4 + i * 0.5) + 1) / 2;
          const wobble = (1 - settle) * 0.8;
          const tremX = Math.sin(elapsed * 1.5 + i) * wobble;
          const tremY = Math.cos(elapsed * 1.3 + i) * wobble;
          const rot = myAngle * 0.1;
          const alpha = introEased * (0.65 + settle * 0.15);
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, x + tremX + off.ox, y + tremY + off.oy, alpha, rot, 0.93);
        }
      }

      // 78. 관계 그래프 — 명확한 노드/허브 구조
      function updateGraph(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        const hubAngles = [-Math.PI / 2, Math.PI / 6, Math.PI * 5 / 6];
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          if (i < 3) {
            const x = Math.cos(hubAngles[i]) * 30;
            const y = Math.sin(hubAngles[i]) * 22;
            const alpha = introEased * 0.92;
            const off = applyIntroOffset(g, introT);
            writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, 1.10);
          } else {
            const myHub = (i - 3) % 3;
            const hubX = Math.cos(hubAngles[myHub]) * 30;
            const hubY = Math.sin(hubAngles[myHub]) * 22;
            const nodeIdx = Math.floor((i - 3) / 3);
            const nodeAngle = nodeIdx * 0.8 + elapsed * 0.05;
            const nodeR = 20 + nodeIdx * 4;
            const x = hubX + Math.cos(nodeAngle) * nodeR;
            const y = hubY + Math.sin(nodeAngle) * nodeR * 0.6;
            const swapPhase = elapsed * 0.2 + i * 0.3;
            const swap = Math.max(0, Math.sin(swapPhase) - 0.7) / 0.3;
            const alpha = introEased * (0.55 + swap * 0.20);
            const off = applyIntroOffset(g, introT);
            writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, 0.85);
          }
        }
      }

      // 79. 공간의 굴곡 — 글자가 보이지 않는 곡면 따라 휨
      function updateCurvature(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const myT = total > 1 ? i / (total - 1) : 0.5;
          const x = (myT - 0.5) * 100;
          const surfaceA = Math.sin(myT * Math.PI * 2 + elapsed * 0.3) * 14;
          const surfaceB = Math.sin(myT * Math.PI * 4 + elapsed * 0.2) * 8;
          const y = surfaceA + surfaceB;
          const compress = 0.8 + Math.sin(myT * Math.PI * 2 + elapsed * 0.25) * 0.2;
          const adjustedX = x * compress;
          const rot = Math.cos(myT * Math.PI * 2 + elapsed * 0.3) * 0.08;
          const alpha = introEased * 0.75;
          const off = applyIntroOffset(g, introT);
          writeGlyph(g, adjustedX + off.ox, y + off.oy, alpha, rot, 0.93);
        }
      }

      // 80. 시뮬레이션 모델 — 글자 위치 계속 갱신, 일부는 기준값, 일부는 변화값
      function updateSimulation(now) {
        const elapsed = (now - decayStartTime) / 1000;
        const introT = Math.min(1, elapsed / 1.5);
        const introEased = 1 - Math.pow(1 - introT, 3);
        const total = decayGlyphs.length;
        for (let i = 0; i < total; i++) {
          const g = decayGlyphs[i];
          const isFixed = i % 3 === 0;
          if (isFixed) {
            const idx = Math.floor(i / 3);
            const cols = 6;
            const col = idx % cols;
            const row = Math.floor(idx / cols);
            const x = (col - (cols - 1) / 2) * 13;
            const y = (row - 1) * 12;
            const breath = Math.sin(elapsed * 0.3 + i * 0.2) * 0.3;
            const alpha = introEased * 0.78;
            const off = applyIntroOffset(g, introT);
            writeGlyph(g, x + off.ox, y + breath + off.oy, alpha, 0, 0.96);
          } else {
            const simPhase = elapsed * 0.5 + i * 0.3;
            const cyclePos = Math.floor(simPhase);
            const fract = simPhase - cyclePos;
            const targetX = ((cyclePos * 17 + i * 23) % 70) - 35;
            const targetY = ((cyclePos * 11 + i * 13) % 40) - 20;
            const nextX = (((cyclePos + 1) * 17 + i * 23) % 70) - 35;
            const nextY = (((cyclePos + 1) * 11 + i * 13) % 40) - 20;
            const x = targetX + (nextX - targetX) * easeInOut(fract);
            const y = targetY + (nextY - targetY) * easeInOut(fract);
            const alpha = introEased * (0.55 + Math.sin(simPhase * 2) * 0.10);
            const off = applyIntroOffset(g, introT);
            writeGlyph(g, x + off.ox, y + off.oy, alpha, 0, 0.88);
          }
        }
      }

      function teardownDecayText() {
        if (decayRafId) { cancelAnimationFrame(decayRafId); decayRafId = 0; }
        if (decayRoot && decayRoot.parentNode) {
          decayRoot.parentNode.removeChild(decayRoot);
        }
        decayRoot = null;
        decayStage = null;
        decayGlyphs = [];
        decayWords = [];
        decayCachedSilhouette = null;
      }

      let rippleRoot = null;
      let rippleStage = null;
      let rippleGlyphs = [];
      let rippleRafId = 0;
      let rippleStartTime = 0;

      function buildRippleText(text) {
        teardownRippleText();
        if (!text || text.trim().length === 0) return;

        rippleRoot = document.createElement("div");
        rippleRoot.className = "text-ripple";
        if (usePx) {
          rippleRoot.style.left = `${leftPx + size / 2}px`;
          rippleRoot.style.top  = `${topPx  + size / 2}px`;
        } else {
          rippleRoot.style.left = `calc(${leftPct}% + ${size / 2}px)`;
          rippleRoot.style.top  = `calc(${topPct}% + ${size / 2}px)`;
        }
        rippleRoot.style.width  = "0px";
        rippleRoot.style.height = "0px";

        rippleStage = document.createElement("div");
        rippleStage.className = "text-ripple-stage";
        rippleRoot.appendChild(rippleStage);
        root.appendChild(rippleRoot);

        const measure = document.createElement("span");
        measure.className = "text-ripple-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch === " " ? " " : ch;
          charWidths.push(measure.getBoundingClientRect().width);
        }
        document.body.removeChild(measure);

        const LINE_WIDTH  = 360;
        const LINE_HEIGHT = 14 * PICA_LINE_HEIGHT;

        const words = [];
        {
          let i = 0;
          while (i < text.length) {
            while (i < text.length && /\s/.test(text[i])) i++;
            if (i >= text.length) break;
            const startIdx = i;
            while (i < text.length && !/\s/.test(text[i])) i++;
            words.push({ startIdx, endIdx: i });
          }
        }

        const layout = [];
        let curX = 0;
        let curY = 0;
        for (let w = 0; w < words.length; w++) {
          const word = words[w];
          let wordWidth = 0;
          for (let i = word.startIdx; i < word.endIdx; i++) {
            wordWidth += charWidths[i];
          }
          const spaceW = (w === 0) ? 0 : (charWidths[word.startIdx - 1] || 4);
          if (curX + spaceW + wordWidth > LINE_WIDTH && curX > 0) {
            curX = 0;
            curY += LINE_HEIGHT;
          } else if (w > 0) {
            curX += spaceW;
          }
          for (let i = word.startIdx; i < word.endIdx; i++) {
            layout.push({ ch: text[i], lineX: curX, lineY: curY });
            curX += charWidths[i];
          }
        }

        const totalH = curY + LINE_HEIGHT;
        const offsetX = -LINE_WIDTH / 2;
        const offsetY = -totalH / 2;

        rippleGlyphs = [];
        for (let i = 0; i < layout.length; i++) {
          const it = layout[i];
          const el = document.createElement("span");
          el.className = "text-ripple-glyph";
          el.textContent = it.ch;
          rippleStage.appendChild(el);

          const baseX = it.lineX + offsetX;
          const baseY = it.lineY + offsetY;

          rippleGlyphs.push({
            el,
            baseX, baseY,
            phaseX: (it.lineX / LINE_WIDTH) * Math.PI * 2,
            phaseY: (it.lineY / LINE_HEIGHT) * 0.7,
            jitter: Math.random() * 0.3,
            jitterSeed: Math.random() * 1000,
          });
        }

        rippleStartTime = performance.now();
        const tickRipple = (now) => {
          if (!rippleRoot) return;
          updateRipple(now);
          rippleRafId = requestAnimationFrame(tickRipple);
        };
        rippleRafId = requestAnimationFrame(tickRipple);
      }

      function updateRipple(now) {
        const t = (now - rippleStartTime) / 1000;

        const intro = Math.min(1, t / 1.2);
        const introEased = 1 - Math.pow(1 - intro, 3);

        const waveSpeed = 1.6;
        const waveAmpY  = 7;
        const waveAmpX  = 2.5;
        const rotAmp    = 0.18;

        for (const g of rippleGlyphs) {
          const wave = Math.sin(t * waveSpeed - g.phaseX * 1.4 + g.phaseY);
          const wave2 = Math.sin(t * waveSpeed * 0.55 - g.phaseX * 0.7 + g.jitterSeed * 0.001);

          const dy = wave * waveAmpY * introEased
                   + wave2 * waveAmpY * 0.35 * introEased;
          const dx = Math.cos(t * waveSpeed * 0.7 - g.phaseX) * waveAmpX * introEased;
          const rot = wave * rotAmp * 0.6 + wave2 * rotAmp * 0.4;

          const x = g.baseX + dx;
          const y = g.baseY + dy;

          const alphaWave = 0.78 + wave * 0.18 + wave2 * 0.06;
          const opacity = Math.max(0.25, Math.min(1, alphaWave)) * introEased;

          const scale = 0.94 + wave * 0.06;

          g.el.style.transform =
            `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) ` +
            `rotate(${rot.toFixed(3)}rad) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      function teardownRippleText() {
        if (rippleRafId) { cancelAnimationFrame(rippleRafId); rippleRafId = 0; }
        if (rippleRoot && rippleRoot.parentNode) {
          rippleRoot.parentNode.removeChild(rippleRoot);
        }
        rippleRoot = null;
        rippleStage = null;
        rippleGlyphs = [];
      }

      let sentenceRoot = null;
      let sentenceStage = null;
      let sentenceList = [];
      let sentenceBlocks = [];
      let sentenceRafId = 0;
      let sentenceStartTime = 0;
      let sentenceCurIdx = 0;
      let sentenceCurStart = 0;

      const SENT_FADE_IN  = 1200;
      const SENT_HOLD     = 2600;
      const SENT_FADE_OUT = 1300;
      const SENT_TOTAL    = SENT_FADE_IN + SENT_HOLD + SENT_FADE_OUT;
      const SENT_OVERLAP  = 700;

      function splitSentences(text) {
        if (!text) return [];
        const raw = text.replace(/\s+/g, " ").trim();
        if (!raw) return [];
        const parts = raw.match(/[^.!?\n]+[.!?]?/g) || [raw];
        return parts.map(s => s.trim()).filter(s => s.length > 0);
      }

      // ─────────────────────────────────────────────
      //  캔버스 기반 sentence 시스템
      //  - 별도의 sentence 캔버스를 reveal 캔버스 위에 깔고
      //  - 글자를 캔버스에 직접 그린 후 reveal 이미지를 color-burn으로 합성
      //  - 픽셀 단위 컬러번 블렌딩 (일러스트와 동일)
      // ─────────────────────────────────────────────
      let sentenceCanvas = null;
      let sentenceCtx = null;

      function buildSentenceText(text) {
        teardownSentenceText();
        sentenceList = splitSentences(text);
        if (sentenceList.length === 0) return;

        sentenceRoot = document.createElement("div");
        sentenceRoot.className = "text-sentence";
        // reveal 이미지와 정확히 같은 위치에 배치
        if (usePx) {
          sentenceRoot.style.left = `${leftPx}px`;
          sentenceRoot.style.top  = `${topPx}px`;
        } else {
          sentenceRoot.style.left = `${leftPct}%`;
          sentenceRoot.style.top  = `${topPct}%`;
        }
        sentenceRoot.style.width  = `${size}px`;
        sentenceRoot.style.height = `${size}px`;

        // 캔버스 생성: reveal 캔버스와 동일한 픽셀 해상도
        sentenceCanvas = document.createElement("canvas");
        sentenceCanvas.style.position = "absolute";
        sentenceCanvas.style.inset = "0";
        sentenceCanvas.style.width = "100%";
        sentenceCanvas.style.height = "100%";
        sentenceCanvas.style.pointerEvents = "none";
        const px = resolveCanvasPixelSize();
        sentenceCanvas.width  = px.w;
        sentenceCanvas.height = px.h;
        sentenceCtx = sentenceCanvas.getContext("2d");
        sentenceCtx.imageSmoothingEnabled = true;
        sentenceCtx.imageSmoothingQuality = "high";
        // 그리기 좌표계는 size 기준으로 매핑
        sentenceCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
        sentenceRoot.appendChild(sentenceCanvas);
        root.appendChild(sentenceRoot);

        sentenceBlocks = [];
        sentenceCurIdx = 0;
        sentenceCurStart = performance.now();
        sentenceStartTime = sentenceCurStart;

        spawnSentenceBlock(sentenceCurStart, sentenceList[0], 0);

        const tick = (now) => {
          if (!sentenceRoot) return;
          updateSentence(now);
          sentenceRafId = requestAnimationFrame(tick);
        };
        sentenceRafId = requestAnimationFrame(tick);
      }

      function spawnSentenceBlock(startTime, text, idxInLoop) {
        const phase = Math.random() * Math.PI * 2;
        sentenceBlocks.push({
          text, startTime, phase,
          settleY: -8 + (Math.random() - 0.5) * 6,
          enterY: 32 + Math.random() * 8,
          exitY: -22 - Math.random() * 8,
          swayAmp: 3 + Math.random() * 2,
          swaySpeed: 0.7 + Math.random() * 0.4,
          settleScale: 0.99 + Math.random() * 0.04,
        });
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }
      function easeInCubic(t) {
        return t * t * t;
      }

      // 캔버스에 한 줄/여러 줄 텍스트를 가운데 정렬로 그림 (자동 줄바꿈)
      function drawWrappedText(c, text, cx, cy, maxWidth, fontPx, lineHeight) {
        const words = text.split(/(\s+)/);
        const lines = [];
        let line = "";
        for (const w of words) {
          const test = line + w;
          if (c.measureText(test).width > maxWidth && line.length > 0) {
            lines.push(line.trimEnd());
            line = w.replace(/^\s+/, "");
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);
        const totalH = lines.length * lineHeight;
        let y = cy - totalH / 2 + lineHeight / 2;
        for (const ln of lines) {
          const w = c.measureText(ln).width;
          c.fillText(ln, cx - w / 2, y);
          y += lineHeight;
        }
      }

      // 글자(낱자)별로 변환을 적용하며 그리는 wrapper.
      // perCharFn(charIndex, totalChars) → {dy, alpha, rot} 를 반환하면
      // 각 글자가 그 변환으로 그려짐. (alightworld 스타일 wave/breath)
      function drawWrappedTextPerChar(c, text, cx, cy, maxWidth, fontPx, lineHeight, perCharFn) {
        // 줄바꿈 계산
        const words = text.split(/(\s+)/);
        const lines = [];
        let line = "";
        for (const w of words) {
          const test = line + w;
          if (c.measureText(test).width > maxWidth && line.length > 0) {
            lines.push(line.trimEnd());
            line = w.replace(/^\s+/, "");
          } else {
            line = test;
          }
        }
        if (line) lines.push(line);

        // 전체 글자 수 계산 (낱자별 인덱스 부여용)
        let totalChars = 0;
        for (const ln of lines) totalChars += ln.length;

        const totalH = lines.length * lineHeight;
        let y = cy - totalH / 2 + lineHeight / 2;
        let charIdx = 0;
        const baseAlpha = c.globalAlpha;

        for (let li = 0; li < lines.length; li++) {
          const ln = lines[li];
          const lineWidth = c.measureText(ln).width;
          let xCursor = cx - lineWidth / 2;
          for (let i = 0; i < ln.length; i++) {
            const ch = ln[i];
            const chWidth = c.measureText(ch).width;
            const t = perCharFn ? perCharFn(charIdx, totalChars, li, lines.length) : null;
            if (t) {
              c.save();
              if (typeof t.alpha === "number") {
                c.globalAlpha = baseAlpha * Math.max(0, Math.min(1, t.alpha));
              }
              const cxChar = xCursor + chWidth / 2;
              const cyChar = y;
              c.translate(cxChar + (t.dx || 0), cyChar + (t.dy || 0));
              if (t.rot) c.rotate(t.rot);
              if (typeof t.scale === "number" && t.scale !== 1) c.scale(t.scale, t.scale);
              c.fillText(ch, -chWidth / 2, 0);
              c.restore();
            } else {
              c.fillText(ch, xCursor, y);
            }
            xCursor += chWidth;
            charIdx++;
          }
          y += lineHeight;
        }
        c.globalAlpha = baseAlpha;
      }

      // 임시 작업용 오프스크린 캔버스 (sentence 합성용)
      let sentTempCanvas = null;
      let sentTempCtx = null;

      function updateSentence(now) {
        const sinceCurStart = now - sentenceCurStart;
        const fadeOutStart = SENT_FADE_IN + SENT_HOLD;
        if (sinceCurStart >= fadeOutStart - SENT_OVERLAP) {
          const lastBlock = sentenceBlocks[sentenceBlocks.length - 1];
          const expectedNextStart = sentenceCurStart + (fadeOutStart - SENT_OVERLAP);
          const lastIsCurrent = lastBlock && Math.abs(lastBlock.startTime - sentenceCurStart) < 1;
          if (lastIsCurrent) {
            const nextIdx = (sentenceCurIdx + 1) % sentenceList.length;
            spawnSentenceBlock(expectedNextStart, sentenceList[nextIdx], nextIdx);
          }
        }
        if (sinceCurStart >= SENT_TOTAL) {
          sentenceCurIdx = (sentenceCurIdx + 1) % sentenceList.length;
          sentenceCurStart = sentenceCurStart + (SENT_TOTAL - SENT_OVERLAP);
        }

        if (!sentenceCtx || !sentenceCanvas) return;

        // 메인 sentence 캔버스 클리어
        sentenceCtx.save();
        sentenceCtx.setTransform(1, 0, 0, 1, 0, 0);
        sentenceCtx.clearRect(0, 0, sentenceCanvas.width, sentenceCanvas.height);
        sentenceCtx.restore();

        // 임시 캔버스 준비 (sentence 캔버스와 같은 크기)
        if (!sentTempCanvas) {
          sentTempCanvas = document.createElement("canvas");
          sentTempCtx = sentTempCanvas.getContext("2d");
        }
        if (sentTempCanvas.width !== sentenceCanvas.width ||
            sentTempCanvas.height !== sentenceCanvas.height) {
          sentTempCanvas.width  = sentenceCanvas.width;
          sentTempCanvas.height = sentenceCanvas.height;
        }
        const px = resolveCanvasPixelSize();
        sentTempCtx.setTransform(px.w / size, 0, 0, px.h / size, 0, 0);
        sentTempCtx.imageSmoothingEnabled = true;
        sentTempCtx.imageSmoothingQuality = "high";

        const FONT_PX = 15;
        const LINE_HEIGHT = FONT_PX * PICA_LINE_HEIGHT;
        const MAX_WIDTH = size - 40;
        const cx = size / 2;
        const cyBase = size / 2;

        for (let i = sentenceBlocks.length - 1; i >= 0; i--) {
          const b = sentenceBlocks[i];
          const t = now - b.startTime;
          if (t < 0) continue;
          if (t >= SENT_TOTAL) {
            sentenceBlocks.splice(i, 1);
            continue;
          }

          let opacity, y, scale;
          if (t < SENT_FADE_IN) {
            const u = t / SENT_FADE_IN;
            const eu = easeOutCubic(u);
            opacity = eu;
            y = b.enterY * (1 - eu) + b.settleY * eu;
            scale = 0.97 + 0.02 * eu + (b.settleScale - 0.99) * eu;
          } else if (t < SENT_FADE_IN + SENT_HOLD) {
            opacity = 0.92 + Math.sin(t * 0.0018 + b.phase) * 0.08;
            y = b.settleY + Math.sin(t * 0.0011 + b.phase) * 0.8;
            scale = b.settleScale + Math.sin(t * 0.0009 + b.phase) * 0.005;
          } else {
            const u = (t - SENT_FADE_IN - SENT_HOLD) / SENT_FADE_OUT;
            const eu = easeInCubic(u);
            opacity = 1 - eu;
            y = b.settleY * (1 - eu) + b.exitY * eu;
            scale = b.settleScale * (1 - eu * 0.04);
          }

          const sec = t / 1000;
          const swayX = Math.sin(sec * b.swaySpeed + b.phase) * b.swayAmp;

          // ─── 9가지 sentence 모션: 각자 다른 "낱자 → 문장" 변형 ───
          // 모든 모션이 cycleT(0~1) 사이클을 가지고:
          //   appearEnd ~ holdEnd: 글자가 자리 잡고 호흡
          //   holdEnd ~ 1.0: 사라지며 다시 처음부터
          // 각 모션은 글자가 어떻게 "등장하는지"가 명확히 다름.

          let wavePerChar;
          const CYCLE = 8.0;
          const cycleT = (sec % CYCLE) / CYCLE;
          const APPEAR_END = 0.35;  // 0~0.35: 등장
          const HOLD_END   = 0.78;  // 0.35~0.78: 호흡
          // 0.78~1.0: 페이드아웃

          // 글자별 random 시드 (i 기반, 매 프레임 동일)
          const seed = (i, mul) => {
            const s = Math.sin(i * mul) * 43758.5453;
            return s - Math.floor(s);  // 0~1
          };

          // 사이클 내 단계별 이징
          const phaseOf = (cycleT) => {
            if (cycleT < APPEAR_END) {
              return { stage: "appear", t: cycleT / APPEAR_END };
            } else if (cycleT < HOLD_END) {
              return { stage: "hold", t: (cycleT - APPEAR_END) / (HOLD_END - APPEAR_END) };
            } else {
              return { stage: "leave", t: (cycleT - HOLD_END) / (1 - HOLD_END) };
            }
          };

          if (holdSentenceStyle === "typewriter") {
            // 한 글자씩 차례로 타이핑 (왼쪽부터)
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const myT = total > 0 ? i / total : 0;
              let visible, dy = 0;
              if (ph.stage === "appear") {
                const just = ph.t - myT;
                visible = just < 0 ? 0 : (just < 0.05 ? just / 0.05 : 1);
                dy = visible < 1 ? (1 - visible) * 4 : 0;
              } else if (ph.stage === "hold") {
                visible = 1;
                dy = Math.sin(sec * 0.7 + i * 0.15) * 0.5;
              } else {
                visible = 1 - ph.t;
                dy = ph.t * 3;
              }
              const alpha = visible * (0.85 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13);
              return { dy, alpha };
            };
          } else if (holdSentenceStyle === "assemble") {
            // 사방에서 날아와 자리잡음 (각자 다른 방향에서)
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const angle = seed(i, 12.9898) * Math.PI * 2;
              const dist = 40 + seed(i, 78.233) * 30;
              const offX = Math.cos(angle) * dist;
              const offY = Math.sin(angle) * dist;
              const stagger = (i / Math.max(1, total - 1)) * 0.4;
              let amount, alpha, rot;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger * 0.5) / (1 - stagger * 0.5)));
                amount = 1 - easeOutCubic(t);  // 1(흩어짐) → 0(모임)
                alpha = (1 - amount) * 0.95;
                rot = amount * (seed(i, 31.4) - 0.5) * 0.6;
              } else if (ph.stage === "hold") {
                amount = 0;
                alpha = 0.85 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
                rot = Math.sin(sec * 0.6 + i * 0.3) * 0.012;
              } else {
                const t = Math.max(0, Math.min(1, (ph.t - stagger * 0.5) / (1 - stagger * 0.5)));
                amount = easeInCubic(t);
                alpha = (1 - amount) * 0.95;
                rot = amount * (seed(i, 31.4) - 0.5) * 0.6;
              }
              return { dx: offX * amount, dy: offY * amount, alpha, rot };
            };
          } else if (holdSentenceStyle === "cascade") {
            // 위에서 하나씩 떨어져 자리에 안착 (왼쪽부터)
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const myT = total > 0 ? i / total : 0;
              let dy = 0, alpha = 0;
              if (ph.stage === "appear") {
                const localT = (ph.t - myT * 0.6) / (1 - myT * 0.6);
                const t = Math.max(0, Math.min(1, localT));
                const eu = easeOutCubic(t);
                dy = -50 * (1 - eu) + 5 * Math.sin(t * Math.PI) * 2;  // 위에서 떨어지며 살짝 바운스
                alpha = eu;
              } else if (ph.stage === "hold") {
                dy = Math.sin(sec * 0.9 + i * 0.18) * 0.8;
                alpha = 0.88 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.10;
              } else {
                // 다시 떨어져 사라짐 (아래로)
                const eu = easeInCubic(ph.t);
                dy = 30 * eu;
                alpha = 1 - eu;
              }
              return { dy, alpha };
            };
          } else if (holdSentenceStyle === "swirl") {
            // 회전하며 안쪽으로 빨려들어와 모임
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const startAngle = seed(i, 23.7) * Math.PI * 2;
              const stagger = seed(i, 91.3) * 0.3;
              let amount, rot, alpha;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeOutCubic(t);
                amount = 1 - eu;  // 1=멀리 / 0=모임
                rot = (1 - eu) * Math.PI * 2 * (seed(i, 11.1) > 0.5 ? 1 : -1);  // 한 바퀴 회전
                alpha = eu * 0.95;
              } else if (ph.stage === "hold") {
                amount = 0;
                rot = Math.sin(sec * 0.7 + i * 0.2) * 0.02;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.12;
              } else {
                const t = ph.t;
                const eu = easeInCubic(t);
                amount = eu;
                rot = eu * Math.PI * 1.5 * (seed(i, 11.1) > 0.5 ? 1 : -1);
                alpha = (1 - eu) * 0.95;
              }
              const dist = amount * 60;
              return {
                dx: Math.cos(startAngle + rot) * dist,
                dy: Math.sin(startAngle + rot) * dist,
                rot: rot * 0.3,
                alpha,
              };
            };
          } else if (holdSentenceStyle === "materialize") {
            // 안개에서 흐릿하게 응결되며 또렷해짐
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              let condense;
              if (ph.stage === "appear") {
                condense = 1 - Math.pow(1 - ph.t, 2.5);
              } else if (ph.stage === "hold") {
                condense = 1;
              } else {
                condense = 1 - Math.pow(ph.t, 2);
              }
              const jitterAmt = (1 - condense) * 8;
              const dx = Math.sin(sec * 1.5 + seed(i, 31.9) * 10) * jitterAmt;
              const dy = Math.cos(sec * 1.3 + seed(i, 67.3) * 10) * jitterAmt;
              const alpha = condense * (0.78 + Math.sin(sec * 0.7 + i * 0.2 + b.phase) * 0.16);
              const rot = (1 - condense) * Math.sin(sec * 1.2 + i * 0.3) * 0.06;
              return { dx, dy, alpha, rot };
            };
          } else if (holdSentenceStyle === "flicker") {
            // 점멸 (불꽃놀이): 글자들이 무작위로 켜졌다 꺼짐, 다 켜지면 호흡
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              let visible;
              if (ph.stage === "appear") {
                // 글자별 켜지는 시점이 무작위
                const myFlickerStart = seed(i, 47.3) * 0.85;
                if (ph.t < myFlickerStart) {
                  // 아직 안 켜짐 — 빠른 깜빡임
                  visible = Math.sin(sec * 8 + i * 5) > 0.7 ? 0.4 : 0;
                } else {
                  const local = (ph.t - myFlickerStart) / (1 - myFlickerStart);
                  visible = easeOutCubic(local);
                }
              } else if (ph.stage === "hold") {
                // 모두 켜진 상태에서 미세 깜빡임
                visible = 0.85 + Math.sin(sec * (3 + seed(i, 91.7) * 2) + i) * 0.13;
              } else {
                // 무작위로 꺼져나감
                const myFlickerOut = seed(i, 13.1) * 0.6;
                if (ph.t < myFlickerOut) {
                  visible = 0.85 + Math.sin(sec * 5 + i) * 0.13;
                } else {
                  const local = (ph.t - myFlickerOut) / (1 - myFlickerOut);
                  visible = (1 - easeInCubic(local)) * 0.85;
                }
              }
              const alpha = Math.max(0, visible);
              return { alpha };
            };
          } else if (holdSentenceStyle === "slide") {
            // 좌우 양쪽에서 슬라이드되며 가운데로 모임
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              // 글자 인덱스 짝수/홀수 또는 절반 기준으로 좌/우에서 옴
              const fromLeft = (i % 2 === 0);
              const direction = fromLeft ? -1 : 1;
              const stagger = (i / Math.max(1, total - 1)) * 0.3;
              let dx = 0, alpha = 0;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeOutCubic(t);
                dx = direction * (1 - eu) * 80;
                alpha = eu;
              } else if (ph.stage === "hold") {
                dx = Math.sin(sec * 0.9 + i * 0.2) * 0.8 * direction;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
              } else {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeInCubic(t);
                dx = direction * eu * 80;
                alpha = 1 - eu;
              }
              return { dx, alpha };
            };
          } else if (holdSentenceStyle === "tumble") {
            // 회전하며 위에서 굴러떨어져 자리 잡음
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              const stagger = (i / Math.max(1, total - 1)) * 0.4;
              const direction = seed(i, 11.1) > 0.5 ? 1 : -1;
              let dy = 0, rot = 0, alpha = 0;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger * 0.5) / (1 - stagger * 0.5)));
                const eu = easeOutCubic(t);
                dy = -60 * (1 - eu);
                rot = (1 - eu) * Math.PI * 1.5 * direction;
                alpha = eu;
              } else if (ph.stage === "hold") {
                dy = Math.sin(sec * 0.8 + i * 0.2) * 0.8;
                rot = Math.sin(sec * 0.7 + i * 0.3) * 0.02;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
              } else {
                const t = ph.t;
                const eu = easeInCubic(t);
                dy = 60 * eu;
                rot = eu * Math.PI * 1.5 * direction;
                alpha = 1 - eu;
              }
              return { dy, rot, alpha };
            };
          } else if (holdSentenceStyle === "unfold") {
            // 펼쳐짐: 글자들이 가운데 한 점에 압축되어 있다가 자기 자리로 펼쳐짐
            // 책 펴는 듯한, 한 권의 응축된 것이 풀려나는 느낌
            wavePerChar = (i, total) => {
              const ph = phaseOf(cycleT);
              // 글자별 시간차 (가운데 글자가 먼저, 양 끝이 나중에 펼쳐짐)
              const center = (total - 1) / 2;
              const distFromCenter = Math.abs(i - center) / Math.max(1, center);
              const stagger = distFromCenter * 0.35;

              let amount, alpha, scale;
              if (ph.stage === "appear") {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeOutCubic(t);
                amount = 1 - eu;  // 1=압축, 0=펼침
                alpha = eu * 0.95;
                scale = 0.5 + eu * 0.5;
              } else if (ph.stage === "hold") {
                amount = 0;
                alpha = 0.86 + Math.sin(sec * 0.8 + i * 0.2 + b.phase) * 0.13;
                scale = 1.0;
              } else {
                const t = Math.max(0, Math.min(1, (ph.t - stagger) / (1 - stagger)));
                const eu = easeInCubic(t);
                amount = eu;
                alpha = (1 - eu) * 0.95;
                scale = 1 - eu * 0.5;
              }

              // 글자가 가운데로 끌려가는 방향 — 인덱스가 center보다 작으면 오른쪽으로, 크면 왼쪽으로
              const direction = i < center ? 1 : -1;
              const compressDist = (distFromCenter * 60 + 20) * amount;
              const dx = direction * compressDist;
              // 살짝 위로 압축됐다가 자리잡으며 내려옴
              const dy = amount * 4;
              return { dx, dy, alpha, scale };
            };
          }
          // ─────────────────────────────────────────────
          // SDAM 기억 정리 방법 10가지 — 한국어 낱자 단위 모션
          //   각 모션은 hold 중 cycleT(0~1)로 무한 루프됨
          //   sec(전체 경과 초)는 hold 시작 후 누적되어 모든 모션이 시간 기반으로 흐름
          // ─────────────────────────────────────────────
          else if (holdSentenceStyle === "distant-read") {
            // 01. 남의 일처럼 읽기 — 글자가 살짝 기울고, 좌→우로 천천히 흐르며 읽힘
            //  멀리서 누군가의 일기를 흘려읽듯, 글자가 한쪽으로 기울어진 채 sin 흐름
            wavePerChar = (i, total) => {
              // 인덱스 기반 흐름 위치 — 좌에서 우로 시간이 흐름
              const flowPos = (i / Math.max(1, total - 1)) - (sec * 0.18 % 1);
              const wave = Math.sin(flowPos * Math.PI * 3 + sec * 0.6);
              // 흐름의 현재 위치 근처 글자가 살짝 더 밝게
              const proximity = 1 - Math.min(1, Math.abs(flowPos % 1 - 0.5) * 2);
              const dy = wave * 1.6 + Math.sin(sec * 0.4 + i * 0.3) * 0.6;
              const dx = Math.cos(flowPos * Math.PI * 2 + sec * 0.4) * 1.0;
              const rot = -0.12 + Math.sin(sec * 0.3 + i * 0.15) * 0.02;  // 살짝 뒤로 기운 채 미세 흔들림
              const alpha = 0.55 + proximity * 0.35 + Math.sin(sec * 0.5 + i * 0.4) * 0.06;
              return { dx, dy, rot, alpha };
            };
          } else if (holdSentenceStyle === "scan") {
            // 02. 증거 자료 확인하기 — 좌→우 스캔 라이트
            //  스캔 위치 근처 글자는 또렷, 멀리는 흐림. 글자가 스캔에 의해 "확인"되는 느낌
            wavePerChar = (i, total) => {
              // 스캔 진행률 0~1 (3초 주기로 좌→우 → 다시 좌)
              const SCAN_PERIOD = 3.5;
              const scanT = (sec % SCAN_PERIOD) / SCAN_PERIOD;
              const myPos = total > 1 ? i / (total - 1) : 0.5;
              // 글자가 스캔 위치에 얼마나 가까운지 (0=정확히 위, 1=가장 먼 곳)
              const dist = Math.abs(myPos - scanT);
              // 스캔 폭 — 가우시안 형태로 부드럽게
              const proximity = Math.exp(-dist * dist * 35);
              const alpha = 0.18 + proximity * 0.82;
              // 스캔에 닿은 글자는 살짝 떨고, 위로 살짝 들림
              const dy = -proximity * 1.8;
              const scale = 1 + proximity * 0.08;
              // 미세 회전
              const rot = Math.sin(sec * 5 + i) * proximity * 0.04;
              return { dy, alpha, scale, rot };
            };
          } else if (holdSentenceStyle === "connect") {
            // 03. 남남인 사건 연결 — 흩어진 글자가 어색하게 자리 잡음
            //  사이클: 흩어짐(40%) → 어색한 연결(30%) → 정렬(30%, 살짝 어긋남)
            wavePerChar = (i, total) => {
              const angle = seed(i, 12.9898) * Math.PI * 2;
              const dist = 18 + seed(i, 78.233) * 14;
              const offX = Math.cos(angle) * dist;
              const offY = Math.sin(angle) * dist;
              // 글자별 도착 순서 (인덱스 순)
              const myT = total > 0 ? i / total : 0;
              let progress;
              if (cycleT < 0.40) {
                // 흩어진 상태에서 미세하게 떠다님
                progress = 0;
              } else if (cycleT < 0.70) {
                // 차례차례 자기 자리로 (어색한 도착)
                const local = (cycleT - 0.40) / 0.30;
                progress = Math.max(0, Math.min(1, local - myT * 0.5));
                // easeOutBack — 살짝 튕기며 안착
                progress = 1 + 2.2 * Math.pow(progress - 1, 3) + 1.2 * Math.pow(progress - 1, 2);
                progress = Math.max(0, Math.min(1, progress));
              } else {
                progress = 1;
              }
              const dx = offX * (1 - progress) + Math.sin(sec * 0.7 + i * 0.3) * 0.5 * progress;
              // 살짝 어긋난 안착 — 자리 잡았어도 미세하게 다른 글자보다 위/아래
              const settleY = Math.sin(seed(i, 47) * 10) * 1.5;
              const dy = offY * (1 - progress) + settleY * progress;
              const rot = (1 - progress) * (seed(i, 31) - 0.5) * 0.3;
              const alpha = 0.4 + progress * 0.55;
              return { dx, dy, rot, alpha };
            };
          } else if (holdSentenceStyle === "keyword") {
            // 04. 키워드로 요약하기 — 일부 글자만 키워드로 또렷, 나머지는 작은 점으로 축소
            //  키워드 선정: 인덱스 % 4 === 0 또는 1 (대략 50%) — 한국어는 띄어쓰기 위치를 알 수 없으니 인덱스 패턴
            wavePerChar = (i, total) => {
              // 키워드 여부: 시간에 따라 어떤 글자가 키워드가 될지 천천히 변함
              const keywordPhase = Math.floor(sec / 2.5);
              // 매 2.5초마다 어떤 인덱스가 키워드인지 패턴 변경
              const isKeyword = ((i + keywordPhase * 3) % 5) < 2;
              // 호흡: 키워드는 또렷+살짝 흔들림, 비키워드는 점으로 축소
              const breathe = Math.sin(sec * 0.9 + i * 0.2) * 0.05;
              const scale = isKeyword ? (1.0 + breathe) : 0.22;
              const alpha = isKeyword ? 0.92 + breathe : 0.55;
              const dy = isKeyword ? Math.sin(sec * 0.6 + i * 0.15) * 0.7 : 0;
              return { dy, alpha, scale };
            };
          } else if (holdSentenceStyle === "spotlight") {
            // 05. 눈앞에 있을 때만 작동 — 스포트라이트가 천천히 이동, 그 근처 글자만 또렷
            //  scan과 비슷하지만 더 좁은 spotlight + 글자가 빛 안쪽에서 또렷 (멀면 거의 안 보임)
            wavePerChar = (i, total) => {
              // 스포트라이트가 좌우로 천천히 왕복
              const lightPos = 0.5 + Math.sin(sec * 0.45) * 0.45;
              const myPos = total > 1 ? i / (total - 1) : 0.5;
              const dist = Math.abs(myPos - lightPos);
              // 빛 범위 — 더 좁게
              const inLight = Math.exp(-dist * dist * 80);
              const alpha = 0.08 + inLight * 0.90;
              const scale = 0.92 + inLight * 0.10;
              const dy = Math.sin(sec * 0.7 + i * 0.4) * 0.5 * inLight;
              return { dy, alpha, scale };
            };
          } else if (holdSentenceStyle === "signal") {
            // 06. 외부 신호로 불러오기 — 펄스 신호가 있고, 펄스 후 글자가 차례로 호출됨
            //  펄스 주기 + 글자별 호출 타이밍
            wavePerChar = (i, total) => {
              const PULSE_PERIOD = 1.6;
              const pulseT = (sec % PULSE_PERIOD) / PULSE_PERIOD;  // 0~1
              // 펄스: 0~0.15 강한 점멸, 0.15~1 점점 약화
              const pulseStrength = pulseT < 0.15
                ? Math.sin(pulseT / 0.15 * Math.PI)
                : 0;
              // 글자별 호출 지연 — 인덱스에 따라 다르게
              const myDelay = (i % 4) * 0.12;
              const myCallTime = (pulseT - myDelay + 1) % 1;  // 0~1로 조정
              let callVisibility;
              if (myCallTime < 0.10) {
                // 호출 직후 — 강하게 나타남
                callVisibility = 1;
              } else if (myCallTime < 0.55) {
                // 부드럽게 사라짐
                callVisibility = 1 - (myCallTime - 0.10) / 0.45;
              } else {
                callVisibility = 0;
              }
              const baseAlpha = 0.20;
              const alpha = baseAlpha + callVisibility * 0.75;
              const scale = 1 + callVisibility * 0.15 + pulseStrength * 0.08;
              const dy = -callVisibility * 1.2;
              return { dy, alpha, scale };
            };
          } else if (holdSentenceStyle === "logic") {
            // 07. 슬픔의 논리적 이해 — 글자가 가지런한 격자로 정렬되었다가 다시 문장으로
            //  사이클: 문장(30%) → 격자 정렬(40%) → 다시 문장(30%)
            wavePerChar = (i, total) => {
              // 격자 위치 — 단순 직선 위 균등 분포 (논리도식)
              const myT = total > 1 ? i / (total - 1) : 0.5;
              const gridX = (myT - 0.5) * 220;     // 가로로 펼쳐짐
              const gridY = Math.floor(i / 4) * 18 - (Math.floor(total / 4) * 18) / 2;  // 행 단위
              const gridRelativeX = gridX;
              const gridRelativeY = gridY - 0;

              let toGrid;
              if (cycleT < 0.30) {
                toGrid = 0;
              } else if (cycleT < 0.55) {
                toGrid = easeInOut((cycleT - 0.30) / 0.25);
              } else if (cycleT < 0.75) {
                toGrid = 1;
              } else {
                toGrid = 1 - easeInOut((cycleT - 0.75) / 0.25);
              }

              const dx = gridRelativeX * toGrid;
              const dy = gridRelativeY * toGrid;
              // 격자 상태에서 미세 호흡, 문장 상태에서 거의 정적
              const breathe = Math.sin(sec * 0.7 + i * 0.2) * 0.6;
              const alpha = 0.78 + Math.sin(sec * 0.6 + i * 0.15) * 0.15;
              const scale = 1 + breathe * 0.01 * toGrid;
              return { dx: dx + breathe * 0.3 * toGrid, dy, alpha, scale };
            };
          } else if (holdSentenceStyle === "label") {
            // 08. 감정에 이름표 달기 — 글자가 감정점(가상) 주변에 라벨처럼 모임 → 풀림 → 다시 모임
            //  감정점 3개 정도 가정. 글자들이 가까운 감정점에 흡인됨
            wavePerChar = (i, total) => {
              // 감정점 위치 (시간에 따라 천천히 떠다님)
              const emoPts = [
                { x: -90, y: -18, phase: 0 },
                { x: 0,   y: 20,  phase: 1.3 },
                { x: 90,  y: -15, phase: 2.6 },
              ];
              // 글자별 소속 감정점 (인덱스를 3으로 나눠)
              const myEmo = emoPts[i % emoPts.length];
              const emoX = myEmo.x + Math.sin(sec * 0.4 + myEmo.phase) * 6;
              const emoY = myEmo.y + Math.cos(sec * 0.35 + myEmo.phase) * 4;
              // 글자가 본 위치에서 감정점 방향으로 얼마나 끌리는지 (시간 기반 오실레이션)
              const attractT = (Math.sin(sec * 0.5 + i * 0.05) + 1) / 2;  // 0~1
              // 라벨이 감정점 가까이 매달림
              const labelOffsetX = (i % 3 - 1) * 4;  // 같은 감정점 라벨들끼리 살짝 흩어짐
              const labelOffsetY = Math.floor(i / 3) % 2 === 0 ? -8 : 8;
              const dx = (emoX + labelOffsetX) * attractT;
              const dy = (emoY + labelOffsetY) * attractT;
              const alpha = 0.65 + Math.sin(sec * 0.8 + i * 0.2) * 0.15 + attractT * 0.15;
              const scale = 0.92 + attractT * 0.08;
              return { dx, dy, alpha, scale };
            };
          } else if (holdSentenceStyle === "floorplan") {
            // 09. 공간 구조로 정리하기 — 글자들이 ㄱ/ㄴ자 평면도처럼 직각 배치
            //  사이클: 문장(25%) → 직각 평면도(50%) → 다시 문장(25%)
            wavePerChar = (i, total) => {
              // 평면도 위치 — 글자를 4개 "방"으로 나누어 직각 모서리에 배치
              const room = i % 4;
              const roomIdx = Math.floor(i / 4);
              // 4개 모서리: 좌상, 우상, 우하, 좌하
              const roomBaseX = [-70, 70, 70, -70][room];
              const roomBaseY = [-20, -20, 20, 20][room];
              // 각 방 안에서 글자 배치 (직선)
              const fpX = roomBaseX + (roomIdx % 3 - 1) * 14;
              const fpY = roomBaseY + Math.floor(roomIdx / 3) * 8;

              let toPlan;
              if (cycleT < 0.25) {
                toPlan = 0;
              } else if (cycleT < 0.45) {
                toPlan = easeInOut((cycleT - 0.25) / 0.20);
              } else if (cycleT < 0.75) {
                toPlan = 1;
              } else {
                toPlan = 1 - easeInOut((cycleT - 0.75) / 0.25);
              }

              const dx = fpX * toPlan;
              const dy = fpY * toPlan;
              // 평면도 상태에선 미세하게 정렬된 호흡
              const breathe = Math.sin(sec * 0.6 + i * 0.2) * 0.5;
              const alpha = 0.75 + breathe * 0.1;
              return { dx: dx + breathe * 0.3 * toPlan, dy, alpha };
            };
          } else if (holdSentenceStyle === "skeleton") {
            // 10. 데이터 포인트와 이야기의 뼈대 — 글자가 점으로 줄어들었다가 다시 살아남
            //  사이클: 문장(25%) → 점으로 축소(35%) → 점에서 살아남(15%) → 호흡(25%)
            wavePerChar = (i, total) => {
              let scale, alpha;
              if (cycleT < 0.25) {
                // 문장
                scale = 1;
                alpha = 0.85;
              } else if (cycleT < 0.50) {
                // 점으로 축소
                const u = (cycleT - 0.25) / 0.25;
                const eu = easeInOut(u);
                scale = 1 - eu * 0.82;  // 1 → 0.18 (점)
                alpha = 0.85 - eu * 0.15;
              } else if (cycleT < 0.60) {
                // 점 유지 (뼈대 상태)
                scale = 0.18;
                alpha = 0.70 + Math.sin(sec * 3 + i) * 0.10;  // 점이 깜빡임
              } else if (cycleT < 0.85) {
                // 점에서 글자로 재구성
                const u = (cycleT - 0.60) / 0.25;
                const eu = easeInOut(u);
                scale = 0.18 + eu * 0.82;
                alpha = 0.70 + eu * 0.20;
              } else {
                // 호흡
                scale = 1 + Math.sin(sec * 0.9 + i * 0.2) * 0.02;
                alpha = 0.90 + Math.sin(sec * 0.7 + i * 0.15) * 0.08;
              }
