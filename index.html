<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ───────── */
    @font-face {
      font-family: 'Eyja-Regular';
      src: url('./assets/fonnts_com-eyjaunlicensedtrial-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;        /* 완전히 하얀 바탕 */
      cursor: default;
      /* 드래그 시 텍스트 선택 방지 */
      -webkit-user-select: none;
      user-select: none;
      /* 트랙패드/스크롤 제스처 기본 동작 차단 */
      overscroll-behavior: none;
      touch-action: none;
    }

    /* ───────── 좌측 하단 HUD ─────────
       ohezin.kr/work 의 All / Index 와 동일 사양:
         font-family : Eyja-Regular, Eulyoo1945-Regular, serif
         font-size   : 15px
         line-height : 15px (= 1)
         color       : #000
    */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: #000;
      font-family: 'Eyja-Regular', 'Eulyoo1945-Regular', serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      letter-spacing: normal;
      white-space: nowrap;
    }
    .hud .row {
      display: block;
    }
    /* 숫자만 자간을 강하게 줄여 영문 비례에 맞춤
       (트라이얼 Eyja의 기본 숫자 트래킹이 살짝 넓음) */
    .hud .num {
      letter-spacing: -0.07em;
    }
    /* 영문(라벨) 다음에 오는 숫자와의 간격을 좁힘
       — 그냥 공백을 쓰면 너무 벌어져서 시각적으로 맞춰주는 보정 */
    .hud .num {
      margin-left: -0.22em;
    }
    /* 콜론(:) 다음에 오는 숫자는 살짝 띄움 — 콜론과 숫자가 들러붙지 않게 */
    .hud .num.after-colon {
      margin-left: 0.08em;
    }
  </style>
</head>
<body>

  <div class="hud" id="hud">
    <span class="row">Distance <span class="num" id="num-distance">100%</span></span>
    <span class="row">Position X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       상태값
       ─────────────────────────────────────────────
       distance : 확대율(%) — 드래그로 변경
       posX/posY: 위치     — 휠/트랙패드 스와이프로 변경
       ───────────────────────────────────────────── */
    let distance = 100;     // %
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    /* ── 숫자 포매터 ──
       Position 좌표는 항상 3자리 0-padding (음수면 - 부호 포함) */
    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
    }
    renderHUD();

    /* ─────────────────────────────────────────────
       1) 드래그 → 확대 (Distance 변화)
       ─────────────────────────────────────────────
       좌클릭 누르고 끌면, 끌어내린 거리만큼 distance 증가
       (위로 끌면 감소, 아래로 끌면 증가)
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragStartY = 0;
    let dragStartDistance = 100;

    window.addEventListener("mousedown", (e) => {
      // 좌클릭만
      if (e.button !== 0) return;
      isDragging = true;
      dragStartY = e.clientY;
      dragStartDistance = distance;
      document.body.style.cursor = "ns-resize";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      // 아래로 끌면 거리 ↑, 위로 끌면 거리 ↓ (1px = 1%)
      const dy = e.clientY - dragStartY;
      distance = Math.max(0, dragStartDistance + dy);
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "default";
    });

    /* ─────────────────────────────────────────────
       2) 트랙패드 스와이프 / 마우스 휠 → 위치 (Position 변화)
       ─────────────────────────────────────────────
       wheel 이벤트는 맥 트랙패드의 두 손가락 스와이프도
       함께 잡아준다 (deltaX, deltaY 모두 사용)
       ───────────────────────────────────────────── */
    window.addEventListener("wheel", (e) => {
      e.preventDefault();
      // 자연스러운 패닝 방향: 스와이프한 만큼 캔버스가 그쪽으로 움직인다고 생각
      posX -= e.deltaX;
      posY -= e.deltaY;
      renderHUD();
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치(모바일/태블릿) — 한 손가락 드래그 = 위치 이동,
                                두 손가락 핀치 = 확대
       ───────────────────────────────────────────── */
    let touchMode = null;        // 'pan' | 'pinch' | null
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        touchMode = "pinch";
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartDistance = distance;
      }
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      } else if (touchMode === "pinch" && e.touches.length === 2) {
        const d = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          distance = Math.max(0, pinchStartDistance * (d / pinchStartDist));
          renderHUD();
        }
      }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    /* 컨텍스트 메뉴 차단(우클릭으로 동작이 끊기는 것 방지) */
    window.addEventListener("contextmenu", (e) => e.preventDefault());
  </script>

</body>
</html>
