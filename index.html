<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ───────── */
    @font-face {
      font-family: 'Binomic';
      src: url('./assets/binomic-3.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Eulyoo1945-Regular';
      src: url('./assets/Eulyoo1945-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;        /* 완전히 하얀 바탕 */
      cursor: grab;
      /* 드래그 시 텍스트 선택 방지 */
      -webkit-user-select: none;
      user-select: none;
      /* 트랙패드/스크롤 제스처 기본 동작 차단 */
      overscroll-behavior: none;
      touch-action: none;
    }

    /* ───────── 좌측 하단 HUD ───────── */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: #ff3f51;
      font-family: 'Binomic', 'Eulyoo1945-Regular', serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      white-space: nowrap;
    }
    .hud .row {
      display: block;
    }

    /* ───────── Reveal Image ───────── */
    .reveal {
      position: fixed;
      z-index: 5;
      pointer-events: none;
    }
    .reveal-img-area {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .reveal-img-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    /* 펼쳐지는 흰 텍스트 박스 */
    .reveal-text-box {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      background: #ffffff;
      overflow: hidden;
      pointer-events: none;
      transform-origin: top left;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 75%,
        rgba(0,0,0,0) 100%);
    }
    .reveal-text-content {
      padding: 14px 16px;
      font-family: 'Binomic', 'Eulyoo1945-Regular', serif;
      font-size: 13px;
      line-height: 1.55;
      color: #ff3f51;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    /* 타자기 커서 */
    .reveal-text-content .caret {
      display: inline-block;
      width: 0.5em;
      height: 1em;
      margin-left: 1px;
      background: #ff3f51;
      vertical-align: -0.12em;
      animation: reveal-caret-blink 0.9s steps(2) infinite;
    }
    @keyframes reveal-caret-blink {
      to { opacity: 0; }
    }
    .reveal-img-source {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    /* ───────── 부피 텍스트 클라우드 ───────── */
    .text-volume {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      perspective: 900px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-volume-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .text-volume-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Binomic', 'Eulyoo1945-Regular', serif;
      font-size: 13px;
      line-height: 1;
      color: #ff3f51;
      white-space: pre;
      transform-origin: 0 0;
      will-change: transform, opacity;
    }

    /* ───────── 붕괴(decay) 텍스트 모션 ─────────
       28.png 전용. 떼면 출현. 페이즈:
       1) scattered (멀리 흩어짐)
       2) gathering (형상으로 끌려옴)
       3) forming   (잠깐 완성에 가까운 상태)
       4) escape    (핵심 단어들이 먼저 이탈)
       5) collapse  (글자 단위로 가속 이탈)
       6) silence   (잠깐 공백)
       다시 1로. 루프마다 형성시간 단축, 붕괴 가속.
    */
    .text-decay {
      position: fixed;
      pointer-events: none;
      z-index: 4;
      perspective: 700px;
      perspective-origin: 50% 50%;
      will-change: transform;
    }
    .text-decay-stage {
      position: absolute;
      left: 50%;
      top:  50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
    }
    .text-decay-glyph {
      position: absolute;
      left: 0;
      top:  0;
      font-family: 'Binomic', 'Eulyoo1945-Regular', serif;
      font-size: 13px;
      line-height: 1;
      color: #ff3f51;
      white-space: pre;
      transform-origin: 50% 50%;
      will-change: transform, opacity;
    }

    /* ───────── 확장 패널 ───────── */
    .expanded-panel {
      position: fixed;
      z-index: 50;
      pointer-events: auto;
      max-width: 90vw;
      max-height: 90vh;
      cursor: grab;
      opacity: 0;
      transform: scale(0.94);
      transition:
        opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .expanded-panel.is-visible {
      opacity: 1;
      transform: scale(1);
    }
    .expanded-panel.is-dragging { cursor: grabbing; }

    .expanded-panel-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
      user-select: none;
    }

    .expanded-panel-spotlight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: lighten;
      background-position: 50% 50%;
      background-repeat: no-repeat;
      background-image: radial-gradient(circle 280px at 50% 50%,
        rgba(255,255,255,0.85) 0%,
        rgba(255,255,255,0.55) 25%,
        rgba(255,255,255,0.25) 55%,
        rgba(255,255,255,0.05) 80%,
        rgba(255,255,255,0)    100%);
    }

    .expanded-panel-text-wrap {
      position: absolute;
      left: 12%;
      top:  14%;
      width: 76%;
      height: 72%;
      overflow-y: auto;
      overflow-x: hidden;
      cursor: text;
      -webkit-mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
              mask-image: linear-gradient(to bottom,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,1) 8%,
        rgba(0,0,0,1) 88%,
        rgba(0,0,0,0) 100%);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .expanded-panel-text-wrap::-webkit-scrollbar { display: none; }

    .expanded-panel-text {
      padding: 12px 18px 50px 18px;
      font-family: 'Binomic', 'Eulyoo1945-Regular', serif;
      font-size: 13px;
      line-height: 1.7;
      color: #ff3f51;
      white-space: pre-wrap;
      word-break: keep-all;
      mix-blend-mode: difference;
    }
  </style>
</head>
<body>

  <!-- reveal 인스턴스들은 JS가 동적으로 생성해 #reveal-root 안에 추가 -->
  <div id="reveal-root"></div>

  <div class="hud" id="hud">
    <span class="row">Distance <span class="num" id="num-distance">100%</span></span>
    <span class="row">Position X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       상태값
       ───────────────────────────────────────────── */
    let distance = 100;     // %
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
    }
    renderHUD();

    /* ─────────────────────────────────────────────
       1) 마우스 드래그 (잡고 끌기) → Position
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;

    const revealInstances = [];
    let activeHoldInstance = null;

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;

      if (currentPanel) {
        if (e.target.closest && e.target.closest(".expanded-panel")) return;
        closeExpandedPanel();
      }

      for (const inst of revealInstances) {
        if (inst.isInside(e.clientX, e.clientY)) {
          if (inst.expandable) {
            const data = inst.getExpandData();
            showExpandedPanel(data.filename, data.text, e.clientX, e.clientY);
            return;
          }
          activeHoldInstance = inst;
          inst.startHold();
          return;
        }
      }

      isDragging = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (activeHoldInstance) {
        activeHoldInstance.stopHold();
        activeHoldInstance = null;
      }

      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    window.addEventListener("blur", () => {
      if (activeHoldInstance) {
        activeHoldInstance.stopHold();
        activeHoldInstance = null;
      }
    });

    /* ─────────────────────────────────────────────
       2) wheel 이벤트 분기
       ───────────────────────────────────────────── */
    window.addEventListener("wheel", (e) => {
      e.preventDefault();

      if (e.ctrlKey) {
        const factor = Math.exp(-e.deltaY * 0.01);
        distance = Math.max(0, distance * factor);
      } else {
        const isTrackpadPan =
          Math.abs(e.deltaX) > 0 ||
          (e.deltaMode === 0 && Math.abs(e.deltaY) < 50);

        if (isTrackpadPan) {
          posX -= e.deltaX;
          posY -= e.deltaY;
        } else {
          const factor = Math.exp(-e.deltaY * 0.001);
          distance = Math.max(0, distance * factor);
        }
      }
      renderHUD();
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치(모바일/태블릿)
       ───────────────────────────────────────────── */
    let touchMode = null;
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        touchMode = "pinch";
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartDistance = distance;
      }
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      } else if (touchMode === "pinch" && e.touches.length === 2) {
        const d = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          distance = Math.max(0, pinchStartDistance * (d / pinchStartDist));
          renderHUD();
        }
      }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    window.addEventListener("contextmenu", (e) => e.preventDefault());

    /* ─────────────────────────────────────────────
       5) Google Sheet 연동
       ───────────────────────────────────────────── */
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1pintIO8VNpryzS56eqXaNjqzx5f3EeAV/gviz/tq?tqx=out:csv&gid=0";

    const SHEET_TARGET_ROW = 80;
    const SHEET_TARGET_COL_NAME = "기억 주제";

    const IMAGE_BASE_PATH = "./assets/";

    const revealImg = document.getElementById("reveal-img");

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') {
            cell += '"'; i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell); cell = "";
          } else if (ch === "\n") {
            row.push(cell); cell = "";
            rows.push(row); row = [];
          } else if (ch === "\r") {
            // 무시
          } else {
            cell += ch;
          }
        }
      }
      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    function pickRowFromSheet(rows, targetRow) {
      if (!rows || rows.length === 0) return null;
      const header = rows[0];
      const dataRow = rows[targetRow - 1];
      if (!dataRow) {
        console.warn(`[sheet] ${targetRow}행이 비어 있습니다.`);
        return null;
      }
      const obj = {};
      for (let i = 0; i < header.length; i++) {
        const key = (header[i] || "").trim();
        if (!key) continue;
        obj[key] = (dataRow[i] || "").trim();
      }
      return obj;
    }

    /* ─────────────────────────────────────────────
       Reveal 인스턴스 시스템
       ───────────────────────────────────────────── */

    const FRAME_COUNT = 8;
    const FRAME_INTERVAL_MS = 280;
    const TYPE_INTERVAL_MS  = 50;
    const TEXT_BOX_W = 280;
    const TEXT_BOX_H = 200;
    const REVEAL_INFLUENCE = 90;
    const POINT_LIFE = 140;
    const POINT_RADIUS = 75;

    /* 28.png 전용 hold 글리치 사이클 주기(ms) — 짧을수록 빨리 깜빡임 */
    const HOLD_PULSE_PERIOD_MS = 520;

    let mouseX = -9999, mouseY = -9999;
    window.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function createRevealInstance(config) {
      const { leftPct, topPct, size, sheetRow, root } = config;
      const interactive = config.interactive !== false;
      const expandable  = config.expandable === true;
      const framesCount = (config.framesCount != null) ? config.framesCount : FRAME_COUNT;
      /* hold 중에 알파가 사인파처럼 페이드 루프되는지 (28.png 전용) */
      const holdPulse   = config.holdPulse === true;
      /* 떼면 보여줄 outro 모션 종류: "volume" (기본) | "decay" */
      const outroMode   = config.outroMode || "volume";

      const wrap = document.createElement("div");
      wrap.className = "reveal";
      wrap.style.left   = `${leftPct}%`;
      wrap.style.top    = `${topPct}%`;
      wrap.style.width  = `${size}px`;
      wrap.style.height = `${size}px`;

      const textBox = document.createElement("div");
      textBox.className = "reveal-text-box";
      textBox.style.zIndex = "1";
      const textInner = document.createElement("div");
      textInner.className = "reveal-text-content";
      textBox.appendChild(textInner);

      const imgArea = document.createElement("div");
      imgArea.className = "reveal-img-area";
      imgArea.style.zIndex = "2";
      const canvas = document.createElement("canvas");
      imgArea.appendChild(canvas);

      wrap.appendChild(textBox);
      wrap.appendChild(imgArea);
      root.appendChild(wrap);

      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        const rect = imgArea.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width  = Math.round(rect.width  * dpr);
        canvas.height = Math.round(rect.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      const frames = [];
      let currentFrame = 0;
      let frameLoopTimer = null;

      function loadFrameSeries(baseFilename) {
        const dot = baseFilename.lastIndexOf(".");
        const name = dot === -1 ? baseFilename : baseFilename.slice(0, dot);
        const ext  = dot === -1 ? ""           : baseFilename.slice(dot);
        frames.length = 0;
        for (let i = 0; i < framesCount; i++) {
          const fname = (i === 0) ? `${name}${ext}` : `${name}-${i}${ext}`;
          const img = new Image();
          img.onerror = () => { img._broken = true; };
          img.src = IMAGE_BASE_PATH + fname;
          frames.push(img);
        }
        currentFrame = 0;
        console.info(`[reveal] frames for "${baseFilename}":`,
                     frames.map(im => im.src));
      }

      function nextValidFrame(from) {
        const n = frames.length;
        if (n === 0) return -1;
        for (let i = 1; i <= n; i++) {
          const idx = (from + i) % n;
          const im = frames[idx];
          if (!im._broken && im.complete && im.naturalWidth > 0) return idx;
          if (!im._broken && !im.complete) return idx;
        }
        const base = frames[0];
        if (base && !base._broken) return 0;
        return -1;
      }

      let fullText = "";
      let typedLen = 0;
      let typeTimer = null;

      function setText(text) {
        fullText = text || "";
        typedLen = 0;
        renderTypedText();
      }
      function renderTypedText() {
        const visible = fullText.slice(0, typedLen);
        textInner.textContent = visible;
        if (typedLen < fullText.length || isHolding) {
          const caret = document.createElement("span");
          caret.className = "caret";
          textInner.appendChild(caret);
        }
      }
      function startTyping() {
        if (typeTimer) return;
        typeTimer = setInterval(() => {
          if (typedLen < fullText.length) {
            typedLen++;
            renderTypedText();
          }
        }, TYPE_INTERVAL_MS);
      }
      function stopTyping() {
        if (typeTimer) { clearInterval(typeTimer); typeTimer = null; }
      }

      let isHolding = false;
      let isVolumeMode = false;
      /* hold 시작 시각 → pulse 페이즈 계산용 */
      let holdStartTime = 0;

      function startHold() {
        if (!interactive) return;
        if (isHolding) return;
        if (isVolumeMode) return;
        isHolding = true;
        holdStartTime = performance.now();

        if (!frameLoopTimer) {
          // holdPulse 인스턴스(28.png)는 frame도 더 빠르게 순환
          const interval = holdPulse ? 90 : FRAME_INTERVAL_MS;
          frameLoopTimer = setInterval(() => {
            if (frames.length > 0) {
              const next = nextValidFrame(currentFrame);
              if (next !== -1) currentFrame = next;
            }
          }, interval);
        }
      }

      let volumeRoot = null;
      let volumeStage = null;
      let volumeGlyphs = [];
      let volumeStartTime = 0;
      let volumeRafId = 0;
      let volX = 0, volY = 0;

      function buildVolumeText(text) {
        teardownVolumeText();
        if (!text || text.trim().length === 0) return;

        volumeRoot = document.createElement("div");
        volumeRoot.className = "text-volume";
        const r = wrap.getBoundingClientRect();
        volX = r.left + r.width / 2;
        volY = r.top  + r.height / 2;
        volumeRoot.style.left = `${volX}px`;
        volumeRoot.style.top  = `${volY}px`;
        volumeRoot.style.width  = "0px";
        volumeRoot.style.height = "0px";

        volumeStage = document.createElement("div");
        volumeStage.className = "text-volume-stage";
        volumeRoot.appendChild(volumeStage);
        document.body.appendChild(volumeRoot);

        const measure = document.createElement("span");
        measure.className = "text-volume-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        let runningX = 0;
        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch;
          const w = measure.getBoundingClientRect().width;
          charWidths.push(w);
        }
        document.body.removeChild(measure);
        const totalW = charWidths.reduce((a, b) => a + b, 0);
        const startX = -totalW / 2;

        volumeGlyphs = [];
        let cx = startX;
        for (let i = 0; i < text.length; i++) {
          const ch = text[i];
          const el = document.createElement("span");
          el.className = "text-volume-glyph";
          el.textContent = ch;
          volumeStage.appendChild(el);

          const flatX = cx;
          const flatY = 0;
          cx += charWidths[i];

          const u = Math.random();
          const v = Math.random();
          const theta = 2 * Math.PI * u;
          const phi   = Math.acos(2 * v - 1);
          const baseR = 80;
          const radiusMod = 1 + Math.sin(phi - 0.3) * 0.15
                              + Math.cos(theta * 2) * 0.06;
          const R = baseR * radiusMod;
          const sx = R * Math.sin(phi) * Math.cos(theta);
          const sy = R * Math.cos(phi) - 8;
          const sz = R * Math.sin(phi) * Math.sin(theta);

          volumeGlyphs.push({
            el,
            flatX, flatY,
            sphereX: sx, sphereY: sy, sphereZ: sz,
            phase: Math.random() * Math.PI * 2,
            flowSeed: Math.random() * 1000,
          });
        }

        volumeStartTime = performance.now();
        const tickVol = (now) => {
          if (!volumeRoot) return;
          updateVolume(now);
          volumeRafId = requestAnimationFrame(tickVol);
        };
        volumeRafId = requestAnimationFrame(tickVol);
      }

      function updateVolume(now) {
        const t = (now - volumeStartTime) / 1000;

        const r = wrap.getBoundingClientRect();
        volX = r.left + r.width / 2;
        volY = r.top  + r.height / 2;
        volumeRoot.style.left = `${volX}px`;
        volumeRoot.style.top  = `${volY}px`;

        const rotY = t * 12;
        const rotX = Math.sin(t * 0.15) * 8;
        volumeStage.style.transform =
          `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

        const morphCycle = (Math.sin(t * (Math.PI * 2 / 8)) + 1) / 2;
        const intro = Math.min(1, t / 1.5);
        const morph = morphCycle * intro;

        for (const g of volumeGlyphs) {
          const localMorph = Math.max(0, Math.min(1,
            morph + Math.sin(t * 0.5 + g.phase) * 0.15
          ));

          const flow = Math.sin(t * 0.3 + g.flowSeed) * 4;
          const sx = g.sphereX + Math.cos(g.flowSeed) * flow;
          const sy = g.sphereY + Math.sin(g.flowSeed * 1.3) * flow * 0.8;
          const sz = g.sphereZ + Math.cos(g.flowSeed * 0.7) * flow;

          const x = g.flatX * (1 - localMorph) + sx * localMorph;
          const y = g.flatY * (1 - localMorph) + sy * localMorph;
          const z =                          0 * (1 - localMorph) + sz * localMorph;

          const rotYRad = rotY * Math.PI / 180;
          const effectiveZ = z * Math.cos(rotYRad) + x * Math.sin(rotYRad);
          const depthN = (effectiveZ + 80) / 160;
          const opacity = 0.35 + Math.max(0, Math.min(1, depthN)) * 0.65;
          const scale   = 0.85 + Math.max(0, Math.min(1, depthN)) * 0.30;

          g.el.style.transform =
            `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, ${z.toFixed(2)}px) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      function teardownVolumeText() {
        if (volumeRafId) { cancelAnimationFrame(volumeRafId); volumeRafId = 0; }
        if (volumeRoot && volumeRoot.parentNode) {
          volumeRoot.parentNode.removeChild(volumeRoot);
        }
        volumeRoot = null;
        volumeStage = null;
        volumeGlyphs = [];
      }

      /* ─────────────────────────────────────────
         붕괴(decay) 텍스트 — 28.png 전용 outro
         ───────────────────────────────────────── */
      let decayRoot = null;
      let decayStage = null;
      let decayGlyphs = [];     // {el, ch, isCore, baseX, baseY, scatterX, scatterY, escapeDir, escapeSpeed, fallSeed, decayPhase}
      let decayWords = [];      // [{startIdx, endIdx, isCore}]
      let decayRafId = 0;
      let decayStartTime = 0;
      let decayLoopCount = 0;
      let decayLoopStart = 0;
      let decayCycleDuration = 0;

      /* 형상 좌표를 만들어내는 함수: 사람의 옆얼굴 실루엣을 닮은 점들 */
      function generateSilhouettePoints(count, variant) {
        // 하트 형상 점들 — 매개변수식 하트 곡선 + 채워진 내부의 일부 점
        // variant는 사이클마다 약간씩 다른 회전/스케일을 주기 위해서만 사용
        const points = [];
        const baseScale = 4.2;
        // 사이클마다 살짝 다른 무게중심 — 살아있는 느낌
        const wobble = (variant * 0.13) % 0.4;

        // 70%는 윤곽선 점, 30%는 내부 채움 점 → 평면 하트가 더 단단해 보임
        const outlineCount = Math.floor(count * 0.72);
        const fillCount = count - outlineCount;

        // 윤곽선
        for (let i = 0; i < outlineCount; i++) {
          const t = i / outlineCount;
          const a = t * Math.PI * 2;
          // 클래식 매개변수 하트 곡선
          // x = 16 sin³(t)
          // y = 13 cos(t) − 5 cos(2t) − 2 cos(3t) − cos(4t)
          const sx = 16 * Math.pow(Math.sin(a), 3);
          const sy = -(13 * Math.cos(a)
                     - 5  * Math.cos(2 * a)
                     - 2  * Math.cos(3 * a)
                     - 1  * Math.cos(4 * a));
          let x = sx * baseScale;
          let y = sy * baseScale - 5;
          // 약간의 자연스러운 비뚤어짐
          x += (Math.random() - 0.5) * 4;
          y += (Math.random() - 0.5) * 4;
          // 3D 깊이: 윤곽선 점은 표면이므로 z를 약간 두께감 있게 분포
          const z = (Math.random() - 0.5) * 18;
          points.push({ x, y, z });
        }

        // 내부 채움 — 하트 안쪽에서 무작위 점
        let placed = 0;
        let safety = 0;
        while (placed < fillCount && safety < fillCount * 30) {
          safety++;
          // 후보를 하트 바운딩 박스 안에서 뽑고, 하트 부등식으로 필터
          const rx = (Math.random() - 0.5) * 2;  // -1 ~ 1
          const ry = (Math.random() - 0.5) * 2;  // -1 ~ 1
          // 표준 하트 부등식: (x² + y² − 1)³ − x²·y³ ≤ 0
          // 여기서 y는 위가 양인 표준 좌표라 부호 뒤집어서 적용
          const X = rx;
          const Y = -ry; // 화면 좌표가 아래가 +이므로 반전
          const lhs = Math.pow(X * X + Y * Y - 1, 3) - X * X * Y * Y * Y;
          if (lhs <= 0) {
            const x = rx * 65;
            const y = ry * 60 - 5;
            // 내부 점은 z를 더 다양하게 → 3D 볼륨감
            const z = (Math.random() - 0.5) * 40;
            points.push({ x, y, z });
            placed++;
          }
        }
        // 안전망: 못 채운 만큼 윤곽 점 추가
        while (placed < fillCount) {
          const a = Math.random() * Math.PI * 2;
          const sx = 16 * Math.pow(Math.sin(a), 3);
          const sy = -(13 * Math.cos(a) - 5 * Math.cos(2*a) - 2 * Math.cos(3*a) - Math.cos(4*a));
          points.push({ x: sx * baseScale, y: sy * baseScale - 5, z: 0 });
          placed++;
        }

        return points;
      }

      function buildDecayText(text) {
        teardownDecayText();
        if (!text || text.trim().length === 0) return;

        decayRoot = document.createElement("div");
        decayRoot.className = "text-decay";
        const r = wrap.getBoundingClientRect();
        const cx0 = r.left + r.width / 2;
        const cy0 = r.top  + r.height / 2;
        decayRoot.style.left = `${cx0}px`;
        decayRoot.style.top  = `${cy0}px`;
        decayRoot.style.width  = "0px";
        decayRoot.style.height = "0px";

        decayStage = document.createElement("div");
        decayStage.className = "text-decay-stage";
        decayRoot.appendChild(decayStage);
        document.body.appendChild(decayRoot);

        // 핵심(이탈하는) 단어들 — 사용자가 지정한 것
        const CORE_WORDS = new Set([
          "see", "lost", "loved", "one", "relive", "quicker"
        ]);

        // 단어 단위 인덱스 산출 (공백 단위로 끊되, 글자 인덱스 기록)
        decayWords = [];
        {
          let i = 0;
          while (i < text.length) {
            // 공백 스킵
            while (i < text.length && /\s/.test(text[i])) i++;
            if (i >= text.length) break;
            const startIdx = i;
            while (i < text.length && !/\s/.test(text[i])) i++;
            const endIdx = i; // exclusive
            // 단어에서 알파벳만 추출해 비교
            const wordRaw = text.slice(startIdx, endIdx);
            const wordKey = wordRaw.replace(/[^A-Za-z]/g, "").toLowerCase();
            const isCore = CORE_WORDS.has(wordKey);
            decayWords.push({ startIdx, endIdx, isCore });
          }
        }

        // 글자 폭 측정
        const measure = document.createElement("span");
        measure.className = "text-decay-glyph";
        measure.style.position = "fixed";
        measure.style.visibility = "hidden";
        measure.style.left = "-9999px";
        document.body.appendChild(measure);

        // 한 줄 너비를 잡아 줄바꿈 처리: 박스 폭 ~ 360px
        const LINE_WIDTH = 360;
        const LINE_HEIGHT = 18;

        // 글자별 폭 미리 계산
        const charWidths = [];
        for (const ch of text) {
          measure.textContent = ch === " " ? "\u00a0" : ch;
          charWidths.push(measure.getBoundingClientRect().width);
        }
        document.body.removeChild(measure);

        // 단어 단위로 줄바꿈 처리
        const layout = []; // [{ch, lineX, lineY, isSpace, wordIdx, isCore}]
        let curX = 0;
        let curY = 0;
        for (let w = 0; w < decayWords.length; w++) {
          const word = decayWords[w];
          // 단어 너비 계산
          let wordWidth = 0;
          for (let i = word.startIdx; i < word.endIdx; i++) {
            wordWidth += charWidths[i];
          }
          // 공백(앞) 너비
          const spaceCh = (w === 0) ? "" : " ";
          const spaceW = (w === 0) ? 0 : charWidths[word.startIdx - 1] || 4;
          // 줄바꿈 판단
          if (curX + spaceW + wordWidth > LINE_WIDTH && curX > 0) {
            curX = 0;
            curY += LINE_HEIGHT;
          } else if (w > 0) {
            // 공백을 한 글자로 추가
            layout.push({
              ch: " ",
              lineX: curX,
              lineY: curY,
              isSpace: true,
              wordIdx: -1,
              isCore: false,
            });
            curX += spaceW;
          }
          // 단어 글자들 추가
          for (let i = word.startIdx; i < word.endIdx; i++) {
            layout.push({
              ch: text[i],
              lineX: curX,
              lineY: curY,
              isSpace: false,
              wordIdx: w,
              isCore: word.isCore,
            });
            curX += charWidths[i];
          }
        }

        // 전체 텍스트 박스를 중앙 정렬
        const totalH = curY + LINE_HEIGHT;
        const offsetX = -LINE_WIDTH / 2;
        const offsetY = -totalH / 2;

        // glyph 생성
        decayGlyphs = [];
        for (let i = 0; i < layout.length; i++) {
          const it = layout[i];
          if (it.isSpace) continue; // 공백은 시각 글리프 생성 안 함

          const el = document.createElement("span");
          el.className = "text-decay-glyph";
          el.textContent = it.ch;
          decayStage.appendChild(el);

          const baseX = it.lineX + offsetX;
          const baseY = it.lineY + offsetY;

          // 흩어진 시작 위치 (멀리, 랜덤)
          const scatterAngle = Math.random() * Math.PI * 2;
          const scatterDist  = 220 + Math.random() * 240;
          const scatterX = Math.cos(scatterAngle) * scatterDist;
          const scatterY = Math.sin(scatterAngle) * scatterDist * 0.7;

          // 이탈 방향 (랜덤)
          const escapeAngle = Math.random() * Math.PI * 2;
          const escapeSpeed = 80 + Math.random() * 120;

          decayGlyphs.push({
            el,
            ch: it.ch,
            wordIdx: it.wordIdx,
            isCore: it.isCore,
            baseX, baseY,
            scatterX, scatterY,
            escapeDX: Math.cos(escapeAngle),
            escapeDY: Math.sin(escapeAngle),
            escapeSpeed,
            phase: Math.random() * Math.PI * 2,
            // 핵심 단어는 이탈 시각이 빨라짐
            wordIdxRand: Math.random(),
          });
        }

        // 실루엣 점도 미리 만들어 둠 (루프마다 셔플)
        decayStartTime = performance.now();
        decayLoopStart = decayStartTime;
        decayLoopCount = 0;
        decayCycleDuration = 6500; // 첫 사이클: 6.5초

        const tickDecay = (now) => {
          if (!decayRoot) return;
          updateDecay(now);
          decayRafId = requestAnimationFrame(tickDecay);
        };
        decayRafId = requestAnimationFrame(tickDecay);
      }

      // 실루엣 좌표 캐시 (사이클당 1세트)
      let decayCachedSilhouette = null;
      let decayCachedVariant = -1;

      function updateDecay(now) {
        // 따라다니기
        const r = wrap.getBoundingClientRect();
        const cx0 = r.left + r.width / 2;
        const cy0 = r.top  + r.height / 2;
        decayRoot.style.left = `${cx0}px`;
        decayRoot.style.top  = `${cy0}px`;

        // 사이클 진행도
        const elapsed = now - decayLoopStart;
        let cycleT = elapsed / decayCycleDuration;
        if (cycleT >= 1) {
          // 다음 루프
          decayLoopCount++;
          // 형성 시간 단축, 붕괴 가속 — 사이클이 짧아짐
          decayCycleDuration = Math.max(3500, 6500 * Math.pow(0.85, decayLoopCount));
          decayLoopStart = now;
          decayCachedSilhouette = null; // 새 형상 셔플
          cycleT = 0;
        }

        // 페이즈 분배 (루프가 진행될수록 형상 시간↓, 붕괴 시간↓)
        // 0.00 - 0.10 : scattered
        // 0.10 - 0.40 : gathering (점점 짧아짐)
        // 0.40 - 0.50 : forming (잠깐 완성)
        // 0.50 - 0.62 : escape (핵심 단어 이탈)
        // 0.62 - 0.92 : collapse (모든 글자 가속 이탈)
        // 0.92 - 1.00 : silence
        const decayLoopFactor = Math.pow(0.88, decayLoopCount);
        const formingEnd = 0.40 + 0.10 * decayLoopFactor; // 점점 빨리 끝남
        const escapeStart = formingEnd;
        const escapeEnd   = escapeStart + 0.12 * decayLoopFactor;
        const collapseStart = escapeEnd;
        const collapseEnd   = 0.92;

        // 실루엣 좌표 보장
        if (!decayCachedSilhouette) {
          const variant = (decayLoopCount + decayCachedVariant + 1) % 3;
          decayCachedVariant = variant;
          decayCachedSilhouette = generateSilhouettePoints(decayGlyphs.length, variant);
          // 글자에 형상 점 매핑 (단어 순서대로 나란히 두면 단어가 형상에 줄지어 박힘 → 셔플)
          const idxs = decayGlyphs.map((_, i) => i);
          for (let i = idxs.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
          }
          for (let i = 0; i < decayGlyphs.length; i++) {
            const sp = decayCachedSilhouette[idxs[i]];
            decayGlyphs[i].silX = sp.x;
            decayGlyphs[i].silY = sp.y;
            decayGlyphs[i].silZ = sp.z || 0;
          }
        }

        // forming 페이즈에서 쓸 전역 3D 회전 — 모든 글리프가 같은 회전 적용
        // 사이클 내에서 한 번 빙 돌도록
        let formRotY = 0;       // 라디안
        let formRotX = 0;
        let heartbeatScale = 1; // 심장박동 펄스
        if (cycleT >= formingEnd && cycleT < escapeStart) {
          const u = (cycleT - formingEnd) / Math.max(0.0001, escapeStart - formingEnd);
          // Y축 회전 — 0 → 2π (한 바퀴)
          formRotY = u * Math.PI * 2;
          // X축은 살짝만 기울이는 정도
          formRotX = Math.sin(u * Math.PI) * 0.25;
          // 심장박동: 사이클 내에 두 번 두근(빠르게 부풀고 줄어듦)
          // u 에 대해 [0~0.18]에서 첫 비트, [0.32~0.45]에서 두 번째 비트, 나머지는 정상
          const beat = (t0, t1, peak) => {
            if (u < t0 || u > t1) return 0;
            const v = (u - t0) / (t1 - t0);
            // 빠른 어택, 천천히 릴리스
            if (v < 0.25) return (v / 0.25) * peak;
            return (1 - (v - 0.25) / 0.75) * peak;
          };
          heartbeatScale = 1 + beat(0.05, 0.22, 0.18) + beat(0.36, 0.50, 0.14);
        } else if (cycleT >= escapeStart && cycleT < escapeEnd) {
          // 형상이 무너지기 시작할 때도 회전이 계속 — 자연스럽게 멈추지 않게
          const u = (cycleT - escapeStart) / (escapeEnd - escapeStart);
          formRotY = Math.PI * 2 + u * Math.PI * 0.3;
          formRotX = (1 - u) * 0.12;
        }

        const cosY = Math.cos(formRotY), sinY = Math.sin(formRotY);
        const cosX = Math.cos(formRotX), sinX = Math.sin(formRotX);

        for (const g of decayGlyphs) {
          let x, y, z = 0, opacity;

          if (cycleT < 0.10) {
            // scattered: 흩어진 위치, 매우 희미
            const u = cycleT / 0.10;
            const drift = Math.sin(now * 0.001 + g.phase) * 6;
            x = g.scatterX + drift;
            y = g.scatterY + Math.cos(now * 0.001 + g.phase) * 4;
            opacity = 0.08 + u * 0.07;
          } else if (cycleT < formingEnd) {
            // gathering: 흩어진 → 하트 형상 (z 깊이까지)
            const u = (cycleT - 0.10) / (formingEnd - 0.10);
            const eu = 1 - Math.pow(1 - u, 3);
            x = g.scatterX * (1 - eu) + g.silX * eu;
            y = g.scatterY * (1 - eu) + g.silY * eu;
            z = g.silZ * eu;
            opacity = 0.15 + eu * 0.55;
          } else if (cycleT < escapeStart) {
            // forming: 하트가 3D로 한 바퀴 회전 + 심장박동 펄스
            // (미세 떨림 제거)
            const sx = g.silX * heartbeatScale;
            const sy = g.silY * heartbeatScale;
            const sz = g.silZ * heartbeatScale;
            // X축 회전 적용 (y, z 변환)
            const ry  = sy * cosX - sz * sinX;
            const rz1 = sy * sinX + sz * cosX;
            // Y축 회전 적용 (x, z 변환)
            const rx  = sx * cosY + rz1 * sinY;
            const rz2 = -sx * sinY + rz1 * cosY;
            x = rx;
            y = ry;
            z = rz2;
            // 깊이감 — 뒤에 있는 글자는 살짝 흐리게
            const depthN = (z + 30) / 60;
            opacity = 0.55 + Math.max(0, Math.min(1, depthN)) * 0.40;
          } else if (cycleT < escapeEnd) {
            // escape: 핵심 단어 먼저 빠짐. 나머지는 회전을 유지하면서 자기 자리
            const u = (cycleT - escapeStart) / (escapeEnd - escapeStart);
            if (g.isCore) {
              const eu = u * u;
              const flyDist = g.escapeSpeed * eu * 1.6;
              x = g.silX + g.escapeDX * flyDist;
              y = g.silY + g.escapeDY * flyDist - eu * 30;
              z = g.silZ * (1 - eu);
              opacity = (1 - eu) * 0.85;
            } else {
              // 회전 잔여
              const sx = g.silX, sy = g.silY, sz = g.silZ;
              const ry  = sy * cosX - sz * sinX;
              const rz1 = sy * sinX + sz * cosX;
              const rx  = sx * cosY + rz1 * sinY;
              const rz2 = -sx * sinY + rz1 * cosY;
              x = rx;
              y = ry;
              z = rz2;
              const depthN = (z + 30) / 60;
              opacity = (0.55 + Math.max(0, Math.min(1, depthN)) * 0.40) * (1 - u * 0.15);
            }
          } else if (cycleT < collapseEnd) {
            // collapse: 가속 이탈
            const u = (cycleT - collapseStart) / (collapseEnd - collapseStart);
            const startOffset = g.wordIdxRand * 0.25;
            const localU = Math.max(0, (u - startOffset) / Math.max(0.0001, 1 - startOffset));
            const localAccel = Math.pow(localU, 2.4);
            const baseDist = g.escapeSpeed * (g.isCore ? 2.0 : 1.4);
            const flyDist = baseDist * localAccel * (1 + decayLoopCount * 0.25);
            x = g.silX + g.escapeDX * flyDist;
            y = g.silY + g.escapeDY * flyDist - localAccel * 18;
            z = g.silZ * (1 - localAccel);
            opacity = (1 - localAccel) * 0.78;
            if (g.isCore) {
              const extra = (cycleT - escapeEnd) / Math.max(0.0001, collapseEnd - escapeEnd);
              const ext = extra * extra * 1.8;
              x += g.escapeDX * g.escapeSpeed * ext;
              y += g.escapeDY * g.escapeSpeed * ext - ext * 20;
              opacity = Math.max(0, opacity - extra * 0.3);
            }
          } else {
            // silence
            x = g.silX + g.escapeDX * 600;
            y = g.silY + g.escapeDY * 600;
            z = 0;
            opacity = 0;
          }

          // 깊이에 따라 살짝 스케일 변화 — 더 입체적으로
          const scale = 0.85 + Math.max(0, Math.min(1, (z + 40) / 80)) * 0.30;

          g.el.style.transform =
            `translate3d(${x.toFixed(2)}px, ${y.toFixed(2)}px, ${z.toFixed(2)}px) ` +
            `scale(${scale.toFixed(3)})`;
          g.el.style.opacity = opacity.toFixed(3);
        }
      }

      function teardownDecayText() {
        if (decayRafId) { cancelAnimationFrame(decayRafId); decayRafId = 0; }
        if (decayRoot && decayRoot.parentNode) {
          decayRoot.parentNode.removeChild(decayRoot);
        }
        decayRoot = null;
        decayStage = null;
        decayGlyphs = [];
        decayWords = [];
        decayCachedSilhouette = null;
      }

      function stopHold() {
        if (!isHolding) return;
        isHolding = false;

        if (frameLoopTimer) { clearInterval(frameLoopTimer); frameLoopTimer = null; }

        if (fullText && fullText.trim().length > 0) {
          isVolumeMode = true;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          trail.length = 0;
          if (outroMode === "decay") {
            buildDecayText(fullText);
          } else {
            buildVolumeText(fullText);
          }
        }
      }

      function isInside(x, y) {
        if (!interactive && !expandable) return false;
        const r = imgArea.getBoundingClientRect();
        return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
      }

      let expandImageFile = "";
      let expandText = "";
      function setExpandData(filename, text) {
        expandImageFile = filename || "";
        expandText = text || "";
      }
      function getExpandData() {
        return { filename: expandImageFile, text: expandText };
      }

      const trail = [];
      let prevMX = -9999, prevMY = -9999;

      function pushTrailPoints(fromX, fromY, toX, toY) {
        const dx = toX - fromX, dy = toY - fromY;
        const dist = Math.hypot(dx, dy);
        const steps = Math.max(1, Math.ceil(dist / 6));
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          trail.push({
            x: fromX + dx * t,
            y: fromY + dy * t,
            age: 0,
            maxAge: POINT_LIFE + (Math.random() - 0.5) * 40,
            radius: POINT_RADIUS + (Math.random() - 0.5) * 22,
            driftSeed: Math.random() * Math.PI * 2,
            driftAmt:  6 + Math.random() * 8,
          });
        }
        if (trail.length > 700) trail.splice(0, trail.length - 700);
      }

      function tick() {
        if (isVolumeMode) {
          requestAnimationFrame(tick);
          return;
        }

        const rect = imgArea.getBoundingClientRect();

        const dx = Math.max(rect.left - mouseX, 0, mouseX - rect.right);
        const dy = Math.max(rect.top  - mouseY, 0, mouseY - rect.bottom);
        const distOutside = Math.hypot(dx, dy);
        const inInfluence = distOutside <= REVEAL_INFLUENCE;

        if (inInfluence) {
          const lx = mouseX - rect.left;
          const ly = mouseY - rect.top;
          if (prevMX > -9000) {
            const plx = prevMX - rect.left;
            const ply = prevMY - rect.top;
            pushTrailPoints(plx, ply, lx, ly);
          } else {
            pushTrailPoints(lx, ly, lx, ly);
          }
          prevMX = mouseX; prevMY = mouseY;
        } else {
          prevMX = -9999; prevMY = -9999;
        }

        const W = rect.width, H = rect.height;
        ctx.clearRect(0, 0, W, H);

        const frameImg = frames[currentFrame];
        const frameReady = frameImg && frameImg.complete && frameImg.naturalWidth > 0;

        // hold 중인 28.png 전용 글리치 모션 파라미터
        // 단순 페이드가 아니라: 빠른 깜빡임 + RGB 분리 + 스캔라인 절단 + 위치 흔들림 + 스케일 펄스
        let holdAlpha = 1;
        let glitchOffsetX = 0, glitchOffsetY = 0;
        let glitchScale = 1;
        let glitchSliceY = -1;     // -1이면 슬라이스 비활성
        let glitchSliceH = 0;
        let glitchSliceShift = 0;
        let glitchChromaR = 0, glitchChromaB = 0;
        let glitchHardCut = false; // 한 사이클의 짧은 순간 완전히 사라지는 깜빡임

        if (holdPulse && isHolding) {
          const now = performance.now();
          const elapsedHold = now - holdStartTime;
          const phase = (elapsedHold % HOLD_PULSE_PERIOD_MS) / HOLD_PULSE_PERIOD_MS;

          // 알파: 톱니파 비슷한 빠른 깜빡임 (확 어두워졌다 확 밝아짐)
          // phase 0~0.15 : 갑자기 dim
          // phase 0.15~0.55 : 다시 회복
          // phase 0.55~0.65 : 한 번 더 짧게 dim
          // phase 0.65~1.0 : 밝게 유지하며 미세 떨림
          if (phase < 0.15) {
            holdAlpha = 0.18 + (phase / 0.15) * 0.55;
          } else if (phase < 0.55) {
            holdAlpha = 0.73 + ((phase - 0.15) / 0.40) * 0.27;
          } else if (phase < 0.65) {
            const u = (phase - 0.55) / 0.10;
            holdAlpha = 1.0 - Math.sin(u * Math.PI) * 0.55;
          } else {
            holdAlpha = 0.92 + Math.sin(phase * 60) * 0.06;
          }

          // 사이클 내 짧은 hard cut (한 번씩 완전히 사라짐)
          // 매 사이클 시작 직후 짧은 구간
          if (phase < 0.04) glitchHardCut = true;
          // 사이클 후반 어딘가에 한 번 더 짧게
          if (phase > 0.58 && phase < 0.605) glitchHardCut = true;

          // 위치 흔들림: 빠른 노이즈성 진동 — 사이클당 6~8회 흔들리는 듯
          glitchOffsetX = Math.sin(elapsedHold * 0.045) * 6
                        + Math.sin(elapsedHold * 0.13) * 3;
          glitchOffsetY = Math.cos(elapsedHold * 0.038) * 4
                        + Math.cos(elapsedHold * 0.17) * 2;

          // 스케일 펄스 — 사이클마다 한 번 살짝 부풀고 줄어듦
          glitchScale = 1 + Math.sin(phase * Math.PI * 2) * 0.06;

          // 슬라이스(스캔라인 끊김): 사이클당 두 번 정도, 짧은 순간만 발동
          // pseudo-random: 사이클 인덱스 기반 시드
          const cycleIdx = Math.floor(elapsedHold / HOLD_PULSE_PERIOD_MS);
          const seedA = (Math.sin(cycleIdx * 12.9898) * 43758.5453) % 1;
          const seedB = (Math.sin(cycleIdx * 78.233 + 1.7) * 43758.5453) % 1;
          const sa = Math.abs(seedA);
          const sb = Math.abs(seedB);
          // 첫 슬라이스: phase 0.20~0.30
          if (phase > 0.20 && phase < 0.30) {
            glitchSliceY = sa * H;
            glitchSliceH = 6 + sa * 18;
            glitchSliceShift = (sa - 0.5) * 30;
          }
          // 두 번째 슬라이스: phase 0.70~0.78
          else if (phase > 0.70 && phase < 0.78) {
            glitchSliceY = sb * H;
            glitchSliceH = 4 + sb * 14;
            glitchSliceShift = (sb - 0.5) * 24;
          }

          // RGB 크로마틱 분리 — 흔들림에 비례
          const chromaAmt = (Math.abs(glitchOffsetX) + Math.abs(glitchOffsetY)) * 0.18;
          glitchChromaR = chromaAmt;
          glitchChromaB = -chromaAmt;
        }

        if (frameReady && trail.length > 0 && !glitchHardCut) {
          for (let i = trail.length - 1; i >= 0; i--) {
            const p = trail[i];
            p.age++;
            if (p.age >= p.maxAge) { trail.splice(i, 1); continue; }

            const life = p.age / p.maxAge;
            let alpha;
            if (life < 0.35) {
              const t = life / 0.35;
              const eased = t * t * t * (t * (t * 6 - 15) + 10);
              alpha = eased * 0.7;
            } else {
              const t = (life - 0.35) / 0.65;
              alpha = Math.pow(1 - t, 2.2) * 0.7;
            }
            alpha *= holdAlpha;
            if (alpha < 0.005) continue;

            const drift = p.driftAmt * Math.sin(p.driftSeed + p.age * 0.025);
            const drift2= p.driftAmt * Math.cos(p.driftSeed * 1.3 + p.age * 0.02);
            const px = p.x + drift  * 0.6;
            const py = p.y + drift2 * 0.6;
            const r  = p.radius;

            const grad = ctx.createRadialGradient(px, py, 0, px, py, r);
            grad.addColorStop(0,    `rgba(0,0,0,${alpha})`);
            grad.addColorStop(0.18, `rgba(0,0,0,${alpha * 0.92})`);
            grad.addColorStop(0.40, `rgba(0,0,0,${alpha * 0.65})`);
            grad.addColorStop(0.65, `rgba(0,0,0,${alpha * 0.30})`);
            grad.addColorStop(0.85, `rgba(0,0,0,${alpha * 0.08})`);
            grad.addColorStop(1,    `rgba(0,0,0,0)`);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalCompositeOperation = "source-in";

          if (holdPulse && isHolding) {
            // 글리치 모드: 변형된 transform으로 메인 이미지 + 크로마틱 분리 + 슬라이스 시프트
            const cx = W / 2, cy = H / 2;

            // 1) 메인 본체 (스케일 + 오프셋)
            ctx.save();
            ctx.translate(cx + glitchOffsetX, cy + glitchOffsetY);
            ctx.scale(glitchScale, glitchScale);
            ctx.translate(-cx, -cy);
            ctx.drawImage(frameImg, 0, 0, W, H);
            ctx.restore();

            // 2) 크로마틱 분리 (R 채널 시뮬레이션 - 빨강 톤으로 살짝 옆에 한 번 더)
            if (Math.abs(glitchChromaR) > 0.5) {
              ctx.save();
              ctx.globalCompositeOperation = "lighter";
              ctx.globalAlpha = 0.35;
              ctx.translate(cx + glitchOffsetX + glitchChromaR, cy + glitchOffsetY);
              ctx.scale(glitchScale, glitchScale);
              ctx.translate(-cx, -cy);
              ctx.drawImage(frameImg, 0, 0, W, H);
              ctx.restore();

              ctx.save();
              ctx.globalCompositeOperation = "lighter";
              ctx.globalAlpha = 0.35;
              ctx.translate(cx + glitchOffsetX + glitchChromaB, cy + glitchOffsetY);
              ctx.scale(glitchScale, glitchScale);
              ctx.translate(-cx, -cy);
              ctx.drawImage(frameImg, 0, 0, W, H);
              ctx.restore();
            }

            // 3) 슬라이스 시프트 (스캔라인 끊김) — 가로 띠 한 줄을 옆으로 밀어냄
            if (glitchSliceY >= 0 && glitchSliceH > 0) {
              ctx.save();
              ctx.beginPath();
              ctx.rect(0, glitchSliceY, W, glitchSliceH);
              ctx.clip();
              ctx.translate(glitchSliceShift, 0);
              ctx.drawImage(frameImg, 0, 0, W, H);
              ctx.restore();
            }
          } else {
            ctx.drawImage(frameImg, 0, 0, W, H);
          }

          ctx.globalCompositeOperation = "source-over";
        }

        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);

      const instance = {
        loadFrameSeries,
        setText,
        isInside,
        startHold,
        stopHold,
        expandable,
        setExpandData,
        getExpandData,
      };
      revealInstances.push(instance);
      return instance;
    }

    /* ─────────────────────────────────────────────
       시트 데이터 → 인스턴스에 적용
       ───────────────────────────────────────────── */
    const root = document.getElementById("reveal-root");
    const inst79 = createRevealInstance({
      leftPct: 60, topPct: 35, size: 120,
      sheetRow: 80,
      root,
    });
    const inst10 = createRevealInstance({
      leftPct: 28, topPct: 65, size: 120,
      sheetRow: 11,
      interactive: false,
      expandable: true,
      framesCount: 1,
      root,
    });
    /* 28.png 인스턴스 — hold 시 페이드 루프, 떼면 붕괴 텍스트 모션 */
    const inst28 = createRevealInstance({
      leftPct: 18, topPct: 22, size: 120,
      sheetRow: 29,             // 28.png는 시트 29행 (헤더가 1행이므로 데이터 28번째)
      root,
      holdPulse: true,
      outroMode: "decay",
    });
    const allInstances = [
      { inst: inst79, row: 80 },
      { inst: inst10, row: 11 },
      { inst: inst28, row: 29 },
    ];

    /* ─────────────────────────────────────────────
       확장 패널 시스템
       ───────────────────────────────────────────── */
    let currentPanel = null;

    function showExpandedPanel(filename, text, originX, originY) {
      if (currentPanel) closeExpandedPanel();

      const dot = filename.lastIndexOf(".");
      const name = dot === -1 ? filename : filename.slice(0, dot);
      const ext  = dot === -1 ? ""       : filename.slice(dot);
      const expandedFilename = `${name}-1${ext}`;

      const panel = document.createElement("div");
      panel.className = "expanded-panel";

      const img = document.createElement("img");
      img.className = "expanded-panel-image";
      img.alt = "";
      img.draggable = false;
      img.src = IMAGE_BASE_PATH + expandedFilename;

      const spotlight = document.createElement("div");
      spotlight.className = "expanded-panel-spotlight";

      const textWrap = document.createElement("div");
      textWrap.className = "expanded-panel-text-wrap";
      const txt = document.createElement("div");
      txt.className = "expanded-panel-text";
      txt.textContent = text || "";
      textWrap.appendChild(txt);

      panel.appendChild(img);
      panel.appendChild(spotlight);
      panel.appendChild(textWrap);
      document.body.appendChild(panel);

      let spotTargetX = 50, spotTargetY = 50;
      let spotCurrX   = 50, spotCurrY   = 50;
      const updateSpotlightTarget = (e) => {
        const r = panel.getBoundingClientRect();
        spotTargetX = ((e.clientX - r.left) / r.width)  * 100;
        spotTargetY = ((e.clientY - r.top)  / r.height) * 100;
      };
      panel.addEventListener("mousemove", updateSpotlightTarget);

      let spotRafId = 0;
      const tickSpotlight = () => {
        spotCurrX += (spotTargetX - spotCurrX) * 0.18;
        spotCurrY += (spotTargetY - spotCurrY) * 0.18;
        spotlight.style.backgroundImage =
          `radial-gradient(circle 280px at ${spotCurrX.toFixed(2)}% ${spotCurrY.toFixed(2)}%, ` +
          `rgba(255,255,255,0.85) 0%, ` +
          `rgba(255,255,255,0.55) 25%, ` +
          `rgba(255,255,255,0.25) 55%, ` +
          `rgba(255,255,255,0.05) 80%, ` +
          `rgba(255,255,255,0) 100%)`;
        spotRafId = requestAnimationFrame(tickSpotlight);
      };
      spotRafId = requestAnimationFrame(tickSpotlight);

      const positionPanel = () => {
        const naturalW = img.naturalWidth  || 800;
        const naturalH = img.naturalHeight || 600;
        const maxW = window.innerWidth  * 0.55;
        const maxH = window.innerHeight * 0.65;
        const ratio = Math.min(maxW / naturalW, maxH / naturalH, 1);
        const w = naturalW * ratio;
        const h = naturalH * ratio;
        panel.style.width  = `${w}px`;
        panel.style.height = `${h}px`;

        let px = (originX || window.innerWidth  / 2) - w / 2;
        let py = (originY || window.innerHeight / 2) - h / 2;
        px = Math.max(8, Math.min(window.innerWidth  - w - 8, px));
        py = Math.max(8, Math.min(window.innerHeight - h - 8, py));
        panel.style.left = `${px}px`;
        panel.style.top  = `${py}px`;
      };

      if (img.complete && img.naturalWidth > 0) {
        positionPanel();
      } else {
        img.addEventListener("load", positionPanel);
        img.addEventListener("error", positionPanel);
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(() => panel.classList.add("is-visible"));
      });

      let dragging = false;
      let dragOffsetX = 0, dragOffsetY = 0;
      panel.addEventListener("mousedown", (e) => {
        if (e.button !== 0) return;
        if (textWrap.contains(e.target)) {
          e.stopPropagation();
          return;
        }
        dragging = true;
        const r = panel.getBoundingClientRect();
        dragOffsetX = e.clientX - r.left;
        dragOffsetY = e.clientY - r.top;
        panel.classList.add("is-dragging");
        e.stopPropagation();
        e.preventDefault();
      });
      const onMove = (e) => {
        if (!dragging) return;
        const w = panel.offsetWidth;
        const h = panel.offsetHeight;
        let nx = e.clientX - dragOffsetX;
        let ny = e.clientY - dragOffsetY;
        nx = Math.max(80 - w, Math.min(window.innerWidth  - 80, nx));
        ny = Math.max(0,      Math.min(window.innerHeight - 40, ny));
        panel.style.left = `${nx}px`;
        panel.style.top  = `${ny}px`;
      };
      const onUp = () => {
        if (!dragging) return;
        dragging = false;
        panel.classList.remove("is-dragging");
      };
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);

      panel.addEventListener("wheel", (e) => e.stopPropagation());

      currentPanel = {
        el: panel,
        cleanup: () => {
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
          if (spotRafId) cancelAnimationFrame(spotRafId);
        },
      };
    }

    function closeExpandedPanel() {
      if (!currentPanel) return;
      const { el, cleanup } = currentPanel;
      el.classList.remove("is-visible");
      cleanup();
      currentPanel = null;
      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, 600);
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeExpandedPanel();
    });

    function applyRowsToInstances(rows) {
      for (const { inst, row } of allInstances) {
        const item = pickRowFromSheet(rows, row);
        if (!item) {
          let fb = "79.png";
          if (row === 11) fb = "10.png";
          else if (row === 29) fb = "28.png";
          inst.loadFrameSeries(fb);
          inst.setText("");
          if (inst.expandable && inst.setExpandData) inst.setExpandData(fb, "");
          continue;
        }
        let defaultFile = "79.png";
        if (row === 11) defaultFile = "10.png";
        else if (row === 29) defaultFile = "28.png";
        const filename = item[SHEET_TARGET_COL_NAME] || defaultFile;
        inst.loadFrameSeries(filename);
        inst.setText(item["당사자의 직접 설명"] || "");
        if (inst.expandable && inst.setExpandData) {
          inst.setExpandData(filename, item["About"] || "");
        }
        console.info(`[sheet] row ${row} →`, item);
      }
    }

    function applyFallbackAll() {
      inst79.loadFrameSeries("79.png");
      inst79.setText(
        "I can imagine an apple in front of me. " +
        "I know where the skin is. I know how big it is. I can't see it."
      );
      inst10.loadFrameSeries("10.png");
      inst10.setText("");
      inst28.loadFrameSeries("28.png");
      inst28.setText(
        "Without the ability to see the lost loved one or relive times with them, they do tend fade from mind quicker."
      );
      console.info("[sheet] fallback (시트 미연결) — 임시 텍스트 사용");
    }

    if (!SHEET_CSV_URL) {
      applyFallbackAll();
    } else {
      fetch(SHEET_CSV_URL)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(text => {
          const rows = parseCSV(text);
          applyRowsToInstances(rows);
        })
        .catch(err => {
          console.warn("[sheet] fetch 실패 — fallback:", err);
          applyFallbackAll();
        });
    }
  </script>
