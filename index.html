<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ───────── */
    @font-face {
      font-family: 'Eyja-Regular';
      src: url('./assets/fonnts_com-eyjaunlicensedtrial-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;        /* 완전히 하얀 바탕 */
      cursor: grab;
      /* 드래그 시 텍스트 선택 방지 */
      -webkit-user-select: none;
      user-select: none;
      /* 트랙패드/스크롤 제스처 기본 동작 차단 */
      overscroll-behavior: none;
      touch-action: none;
    }

    /* ───────── 좌측 하단 HUD ─────────
       ohezin.kr/work 의 All / Index 와 동일 사양:
         font-family : Eyja-Regular, Eulyoo1945-Regular, serif
         font-size   : 15px
         line-height : 15px (= 1)
         color       : #000
    */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: #000;
      font-family: 'Eyja-Regular', 'Eulyoo1945-Regular', serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      letter-spacing: normal;
      white-space: nowrap;
    }
    .hud .row {
      display: block;
    }
    /* 숫자만 자간을 강하게 줄여 영문 비례에 맞춤
       (트라이얼 Eyja의 기본 숫자 트래킹이 살짝 넓음) */
    .hud .num {
      letter-spacing: -0.07em;
    }
    /* 영문(라벨) 다음에 오는 숫자와의 간격을 좁힘
       — 그냥 공백을 쓰면 너무 벌어져서 시각적으로 맞춰주는 보정 */
    .hud .num {
      margin-left: -0.22em;
    }
    /* 콜론(:) 다음에 오는 숫자는 살짝 띄움 — 콜론과 숫자가 들러붙지 않게 */
    .hud .num.after-colon {
      margin-left: 0.08em;
    }

    /* ───────── Hover Image (79-03.png) ─────────
       평소엔 보이지 않다가 마우스가 hotspot 영역에 들어오면
       부드럽게 떠오르며 커서를 살짝 따라옴 (Immersive Garden 스타일).
       hotspot 자체는 시각적으로 없음 (투명) — 사용자가 화면을
       스캔하다가 우연히 발견하는 구조.
    */
    .hotspot {
      position: fixed;
      /* 화면 중앙 부근 — 너무 멀지 않은 곳에 약간 비스듬히.
         translate(-50%,-50%)로 정확한 중심 정렬 */
      left: 56%;
      top: 48%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      z-index: 5;
      pointer-events: auto;     /* hover 감지 */
      cursor: grab;             /* 본문 기본 커서와 동일하게 유지 */
    }
    /* 이미지 컨테이너 — 부드러운 motion을 위해 pointer-events 차단 */
    .reveal {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 6;
      pointer-events: none;
      will-change: transform, opacity, filter;
      opacity: 0;
      transition:
        opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
        filter  0.9s cubic-bezier(0.16, 1, 0.3, 1);
      filter: blur(18px);
    }
    .reveal.is-visible {
      opacity: 1;
      filter: blur(0);
    }
    .reveal img {
      display: block;
      width: 320px;             /* 이미지 표시 크기 */
      height: auto;
      max-width: 40vw;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
    /* 사용자가 hotspot 위에 있다는 미세한 시각적 단서 — 커서를 숨겼으니
       대신 부드러운 그림자처럼 보이게 (필수는 아님). */
  </style>
</head>
<body>

  <!-- 호버 감지용 보이지 않는 핫스팟 (화면 중앙 부근) -->
  <div class="hotspot" id="hotspot" aria-hidden="true"></div>

  <!-- 마우스 위치를 따라가며 떠오르는 이미지
       src 는 시트 80행 H열(기억 주제) 값을 fetch 후 동적으로 주입.
       fetch 전 빈 상태에서도 레이아웃이 깨지지 않도록 src 비워둠. -->
  <div class="reveal" id="reveal">
    <img id="reveal-img" alt="" draggable="false" />
  </div>

  <div class="hud" id="hud">
    <span class="row">Distance <span class="num" id="num-distance">100%</span></span>
    <span class="row">Position X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       상태값
       ─────────────────────────────────────────────
       distance : 확대율(%) — 휠/핀치로 변경
       posX/posY: 위치     — 마우스 드래그/트랙패드 슬라이딩으로 변경
       ───────────────────────────────────────────── */
    let distance = 100;     // %
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    /* ── 숫자 포매터 ──
       Position 좌표는 항상 3자리 0-padding (음수면 - 부호 포함) */
    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
    }
    renderHUD();

    /* ─────────────────────────────────────────────
       1) 마우스 드래그 (잡고 끌기) → Position
       ─────────────────────────────────────────────
       마우스를 누른 채 끌면 끄는 방향대로 위치가 이동
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;     // 좌클릭만
      isDragging = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      // 끄는 방향으로 위치 이동 (캔버스를 손으로 잡아 끄는 느낌)
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    /* ─────────────────────────────────────────────
       2) wheel 이벤트 분기
          - 마우스 휠 / 트랙패드 핀치  → Distance (줌)
          - 트랙패드 두 손가락 슬라이딩 → Position (이동)
       ─────────────────────────────────────────────
       브라우저는 트랙패드 핀치를 ctrlKey === true 로 표시한
       wheel 이벤트로 보내준다 (Chrome/Safari/Firefox 공통).
       이걸로 핀치(줌)와 슬라이딩(패닝)을 구분.
       ───────────────────────────────────────────── */
    window.addEventListener("wheel", (e) => {
      e.preventDefault();

      if (e.ctrlKey) {
        // ── 트랙패드 핀치: 손가락 모으면 줌아웃, 벌리면 줌인 ──
        // deltaY가 음수면 핀치아웃(확대), 양수면 핀치인(축소)
        const factor = Math.exp(-e.deltaY * 0.01);
        distance = Math.max(0, distance * factor);
      } else {
        // ── 일반 마우스 휠: 줌 (위로 = 줌인, 아래로 = 줌아웃) ──
        // 트랙패드 두 손가락 수직 스크롤도 여기로 옴 → 어떻게 분기할지 결정 필요
        // 휠은 deltaY 값이 보통 100 단위로 큰 step이 들어오고,
        // 트랙패드는 작고 연속적인 값이 deltaX/deltaY 둘 다로 들어옴.
        // → deltaX 가 의미있게 있거나, 작은 픽셀단위 deltaY 면 패닝으로 간주
        const isTrackpadPan =
          Math.abs(e.deltaX) > 0 ||                          // 가로 성분 있음
          (e.deltaMode === 0 && Math.abs(e.deltaY) < 50);    // 픽셀모드 + 작은값

        if (isTrackpadPan) {
          // 트랙패드 두 손가락 슬라이딩 → Position
          posX -= e.deltaX;
          posY -= e.deltaY;
        } else {
          // 진짜 마우스 휠 → Distance 줌
          // 위로(▲ deltaY 음수) = 줌인, 아래로(▼ deltaY 양수) = 줌아웃
          const factor = Math.exp(-e.deltaY * 0.001);
          distance = Math.max(0, distance * factor);
        }
      }
      renderHUD();
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치(모바일/태블릿)
          - 한 손가락 드래그 → Position
          - 두 손가락 핀치  → Distance
       ───────────────────────────────────────────── */
    let touchMode = null;        // 'pan' | 'pinch' | null
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        touchMode = "pinch";
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartDistance = distance;
      }
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      } else if (touchMode === "pinch" && e.touches.length === 2) {
        const d = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          distance = Math.max(0, pinchStartDistance * (d / pinchStartDist));
          renderHUD();
        }
      }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    /* 컨텍스트 메뉴 차단(우클릭으로 동작이 끊기는 것 방지) */
    window.addEventListener("contextmenu", (e) => e.preventDefault());

    /* ─────────────────────────────────────────────
       5) Google Sheet 연동
       ─────────────────────────────────────────────
       흐름:
         1. CSV 게시 URL을 fetch
         2. CSV 파싱
         3. 80행을 객체로 변환 — { "기억 형식": "...", "기억 조직 방식": "...",
                                    "기억 주제": "79.png", ... }
         4. "기억 주제" 값(파일명)을 ./assets/ 폴더 경로로 prefix → <img src>
         5. 같은 행 객체는 currentItem 으로 보관 — 추후 모션/텍스트 모듈에서 참조

       시트 게시 방법:
         Google Sheets → 파일 → 공유 → 웹에 게시
         → 형식: '쉼표로 구분된 값(.csv)'
         → 시트: 해당 시트만 선택
         → 게시 후 나오는 URL을 SHEET_CSV_URL 에 붙여넣기

       URL이 비어 있으면 fetch를 건너뛰고 fallback(./assets/79.png) 표시 →
       개발 중에도 화면이 정상 동작.
       ───────────────────────────────────────────── */
    const SHEET_CSV_URL = "";   // ← 여기에 게시된 CSV URL을 붙여넣기

    // 시트의 어느 행/열을 쓸지 — 1-based (스프레드시트 좌표 그대로)
    const SHEET_TARGET_ROW = 80;       // 80행
    const SHEET_TARGET_COL_NAME = "기억 주제";   // H열 헤더

    // 이미지 파일명을 어디 폴더에서 찾을지
    const IMAGE_BASE_PATH = "./assets/";

    const revealImg = document.getElementById("reveal-img");

    /* 간단한 CSV 파서 — 셀 안의 콤마/줄바꿈/이스케이프된 따옴표 모두 처리 */
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
          if (ch === '"' && text[i + 1] === '"') {       // 이스케이프된 ""
            cell += '"'; i++;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
        } else {
          if (ch === '"') {
            inQuotes = true;
          } else if (ch === ",") {
            row.push(cell); cell = "";
          } else if (ch === "\n") {
            row.push(cell); cell = "";
            rows.push(row); row = [];
          } else if (ch === "\r") {
            // 무시 (CRLF 처리)
          } else {
            cell += ch;
          }
        }
      }
      // 마지막 셀/행 flush
      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        rows.push(row);
      }
      return rows;
    }

    /* 시트의 한 행 전체를 {헤더명: 값} 객체로 변환 */
    function pickRowFromSheet(rows, targetRow) {
      if (!rows || rows.length === 0) return null;
      const header = rows[0];
      // targetRow 는 1-based. 헤더가 1행이므로, 데이터행 80 → rows[79]
      const dataRow = rows[targetRow - 1];
      if (!dataRow) {
        console.warn(`[sheet] ${targetRow}행이 비어 있습니다.`);
        return null;
      }
      const obj = {};
      for (let i = 0; i < header.length; i++) {
        const key = (header[i] || "").trim();
        if (!key) continue;
        obj[key] = (dataRow[i] || "").trim();
      }
      return obj;
    }

    /* 행 데이터 → 화면 적용
       지금은 이미지만 다루지만, 같은 객체에 "기억 형식", "기억 조직 방식" 등이
       함께 들어 있어서 다음 단계에서 모션/텍스트/관계로 자유롭게 확장 가능. */
    let currentItem = null;   // 시트에서 가져온 현재 행 — 추후 다른 모듈에서 참조

    function applyItem(item) {
      if (!item) return;
      currentItem = item;

      // 이미지 — 파일명만 시트에 들어옴 (예: "79.png")
      const filename = item[SHEET_TARGET_COL_NAME];
      if (filename) {
        revealImg.src = IMAGE_BASE_PATH + filename;
        console.info(`[sheet] reveal image: ${revealImg.src}`);
      } else {
        applyFallback();
      }

      // 디버깅 — 같은 행의 다른 값들도 콘솔에 보여줌 (다음 단계 확장 시 참고용)
      console.info("[sheet] full row:", item);
    }

    /* fallback — fetch 실패, URL 미설정, 또는 행이 비어있을 때 */
    function applyFallback() {
      revealImg.src = IMAGE_BASE_PATH + "79.png";
      console.info("[sheet] fallback (./assets/79.png) 사용.");
    }

    if (!SHEET_CSV_URL) {
      // URL 미설정 — fallback 으로 화면은 정상 표시
      applyFallback();
    } else {
      fetch(SHEET_CSV_URL)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.text();
        })
        .then(text => {
          const rows = parseCSV(text);
          const item = pickRowFromSheet(rows, SHEET_TARGET_ROW);
          if (item) applyItem(item);
          else      applyFallback();
        })
        .catch(err => {
          console.warn("[sheet] fetch 실패 — fallback 사용:", err);
          applyFallback();
        });
    }

    /* ─────────────────────────────────────────────
       6) Reveal 이미지 (마우스 호버 모션)
       ───────────────────────────────────────────── */
    const hotspot = document.getElementById("hotspot");
    const reveal  = document.getElementById("reveal");

    // 목표 좌표(target) — 마우스 실제 위치
    // 현재 좌표(current) — 화면에 보이는 위치 (lerp로 따라감)
    let tx = window.innerWidth * 0.56;
    let ty = window.innerHeight * 0.48;
    let cx = tx, cy = ty;

    // 표시 상태
    let isHovering = false;
    // 등장 진행도 0→1 (스케일/회전 보간용)
    let appear = 0;

    // 어디서든 마우스 위치 추적 (호버 시작 전부터 자연스러운 시작점 잡기 위함)
    window.addEventListener("mousemove", (e) => {
      tx = e.clientX;
      ty = e.clientY;
    });

    hotspot.addEventListener("mouseenter", () => {
      isHovering = true;
      reveal.classList.add("is-visible");
    });
    hotspot.addEventListener("mouseleave", () => {
      isHovering = false;
      reveal.classList.remove("is-visible");
    });

    // RAF 루프 — lerp으로 부드럽게 위치/스케일/회전 보간
    function lerp(a, b, t) { return a + (b - a) * t; }

    function tickReveal() {
      // 위치 lerp — 0.12 정도면 적당한 관성 (값이 작을수록 더 미끈하게 따라옴)
      cx = lerp(cx, tx, 0.12);
      cy = lerp(cy, ty, 0.12);

      // 등장 진행도 보간 (스프링처럼 부드럽게)
      const target = isHovering ? 1 : 0;
      appear = lerp(appear, target, 0.08);

      // 스케일 0.85 → 1.0
      const scale = 0.85 + appear * 0.15;
      // 미세한 회전 — 마우스가 오른쪽으로 갈수록 살짝 기울어지는 패럴랙스 효과
      const rot = (cx - window.innerWidth / 2) / window.innerWidth * 6;  // ±3deg
      // 마우스 속도에 따른 추가적인 미세 오프셋 (드리프트 느낌)
      const driftX = (tx - cx) * 0.3;
      const driftY = (ty - cy) * 0.3;

      reveal.style.transform =
        `translate(${cx - 160 + driftX}px, ${cy - 160 + driftY}px) ` +
        `scale(${scale.toFixed(3)}) ` +
        `rotate(${rot.toFixed(2)}deg)`;

      requestAnimationFrame(tickReveal);
    }
    requestAnimationFrame(tickReveal);
  </script>

</body>
