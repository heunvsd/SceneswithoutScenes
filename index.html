<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSD3_C375039</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ───────── 로컬 폰트 ───────── */
    @font-face {
      font-family: 'Eyja-Regular';
      src: url('./assets/fonnts_com-eyjaunlicensedtrial-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'NewCenturySchoolbook';
      src: url('./assets/New Century Schoolbook Roman.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;        /* 완전히 하얀 바탕 */
      cursor: grab;
      /* 드래그 시 텍스트 선택 방지 */
      -webkit-user-select: none;
      user-select: none;
      /* 트랙패드/스크롤 제스처 기본 동작 차단 */
      overscroll-behavior: none;
      touch-action: none;
    }

    /* ───────── 좌측 하단 HUD ─────────
       ohezin.kr/work 의 All / Index 와 동일 사양:
         font-family : Eyja-Regular, Eulyoo1945-Regular, serif
         font-size   : 15px
         line-height : 15px (= 1)
         color       : #000
    */
    .hud {
      position: fixed;
      left: 16px;
      bottom: 14px;
      z-index: 10;
      pointer-events: none;
      color: #000;
      font-family: 'Eyja-Regular', 'Eulyoo1945-Regular', serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      letter-spacing: normal;
      white-space: nowrap;
    }
    .hud .row {
      display: block;
    }
    /* 숫자만 자간을 강하게 줄여 영문 비례에 맞춤
       (트라이얼 Eyja의 기본 숫자 트래킹이 살짝 넓음) */
    .hud .num {
      letter-spacing: -0.07em;
    }
    /* 영문(라벨) 다음에 오는 숫자와의 간격을 좁힘
       — 그냥 공백을 쓰면 너무 벌어져서 시각적으로 맞춰주는 보정 */
    .hud .num {
      margin-left: -0.22em;
    }
    /* 콜론(:) 다음에 오는 숫자는 살짝 띄움 — 콜론과 숫자가 들러붙지 않게 */
    .hud .num.after-colon {
      margin-left: 0.08em;
    }
  </style>
</head>
<body>

  <div class="hud" id="hud">
    <span class="row">Distance <span class="num" id="num-distance">100%</span></span>
    <span class="row">Position X:<span class="num after-colon" id="num-pos-x">000</span> Y:<span class="num after-colon" id="num-pos-y">000</span></span>
  </div>

  <script>
    /* ─────────────────────────────────────────────
       상태값
       ─────────────────────────────────────────────
       distance : 확대율(%) — 휠/핀치로 변경
       posX/posY: 위치     — 마우스 드래그/트랙패드 슬라이딩으로 변경
       ───────────────────────────────────────────── */
    let distance = 100;     // %
    let posX = 0;
    let posY = 0;

    const numDistance = document.getElementById("num-distance");
    const numPosX     = document.getElementById("num-pos-x");
    const numPosY     = document.getElementById("num-pos-y");

    /* ── 숫자 포매터 ──
       Position 좌표는 항상 3자리 0-padding (음수면 - 부호 포함) */
    function fmt3(n) {
      const s = Math.trunc(n);
      const sign = s < 0 ? "-" : "";
      const abs = Math.abs(s).toString().padStart(3, "0");
      return sign + abs;
    }

    function renderHUD() {
      numDistance.textContent = `${Math.round(distance)}%`;
      numPosX.textContent = fmt3(posX);
      numPosY.textContent = fmt3(posY);
    }
    renderHUD();

    /* ─────────────────────────────────────────────
       1) 마우스 드래그 (잡고 끌기) → Position
       ─────────────────────────────────────────────
       마우스를 누른 채 끌면 끄는 방향대로 위치가 이동
       ───────────────────────────────────────────── */
    let isDragging = false;
    let dragLastX = 0, dragLastY = 0;

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;     // 좌클릭만
      isDragging = true;
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      document.body.style.cursor = "grabbing";
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      // 끄는 방향으로 위치 이동 (캔버스를 손으로 잡아 끄는 느낌)
      posX += (e.clientX - dragLastX);
      posY += (e.clientY - dragLastY);
      dragLastX = e.clientX;
      dragLastY = e.clientY;
      renderHUD();
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;
      document.body.style.cursor = "grab";
    });

    /* ─────────────────────────────────────────────
       2) wheel 이벤트 분기
          - 마우스 휠 / 트랙패드 핀치  → Distance (줌)
          - 트랙패드 두 손가락 슬라이딩 → Position (이동)
       ─────────────────────────────────────────────
       브라우저는 트랙패드 핀치를 ctrlKey === true 로 표시한
       wheel 이벤트로 보내준다 (Chrome/Safari/Firefox 공통).
       이걸로 핀치(줌)와 슬라이딩(패닝)을 구분.
       ───────────────────────────────────────────── */
    window.addEventListener("wheel", (e) => {
      e.preventDefault();

      if (e.ctrlKey) {
        // ── 트랙패드 핀치: 손가락 모으면 줌아웃, 벌리면 줌인 ──
        // deltaY가 음수면 핀치아웃(확대), 양수면 핀치인(축소)
        const factor = Math.exp(-e.deltaY * 0.01);
        distance = Math.max(0, distance * factor);
      } else {
        // ── 일반 마우스 휠: 줌 (위로 = 줌인, 아래로 = 줌아웃) ──
        // 트랙패드 두 손가락 수직 스크롤도 여기로 옴 → 어떻게 분기할지 결정 필요
        // 휠은 deltaY 값이 보통 100 단위로 큰 step이 들어오고,
        // 트랙패드는 작고 연속적인 값이 deltaX/deltaY 둘 다로 들어옴.
        // → deltaX 가 의미있게 있거나, 작은 픽셀단위 deltaY 면 패닝으로 간주
        const isTrackpadPan =
          Math.abs(e.deltaX) > 0 ||                          // 가로 성분 있음
          (e.deltaMode === 0 && Math.abs(e.deltaY) < 50);    // 픽셀모드 + 작은값

        if (isTrackpadPan) {
          // 트랙패드 두 손가락 슬라이딩 → Position
          posX -= e.deltaX;
          posY -= e.deltaY;
        } else {
          // 진짜 마우스 휠 → Distance 줌
          // 위로(▲ deltaY 음수) = 줌인, 아래로(▼ deltaY 양수) = 줌아웃
          const factor = Math.exp(-e.deltaY * 0.001);
          distance = Math.max(0, distance * factor);
        }
      }
      renderHUD();
    }, { passive: false });

    /* ─────────────────────────────────────────────
       3) 터치(모바일/태블릿)
          - 한 손가락 드래그 → Position
          - 두 손가락 핀치  → Distance
       ───────────────────────────────────────────── */
    let touchMode = null;        // 'pan' | 'pinch' | null
    let lastTouchX = 0, lastTouchY = 0;
    let pinchStartDist = 0;
    let pinchStartDistance = 100;

    function touchDistance(t1, t2) {
      const dx = t1.clientX - t2.clientX;
      const dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        touchMode = "pinch";
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartDistance = distance;
      }
    }, { passive: false });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      if (touchMode === "pan" && e.touches.length === 1) {
        const t = e.touches[0];
        posX += (t.clientX - lastTouchX);
        posY += (t.clientY - lastTouchY);
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        renderHUD();
      } else if (touchMode === "pinch" && e.touches.length === 2) {
        const d = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          distance = Math.max(0, pinchStartDistance * (d / pinchStartDist));
          renderHUD();
        }
      }
    }, { passive: false });

    window.addEventListener("touchend", (e) => {
      if (e.touches.length === 0) touchMode = null;
      else if (e.touches.length === 1) {
        touchMode = "pan";
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }
    });

    /* 컨텍스트 메뉴 차단(우클릭으로 동작이 끊기는 것 방지) */
    window.addEventListener("contextmenu", (e) => e.preventDefault());
  </script>

</body>
</html>
